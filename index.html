function getSafeModeProgressMove(allBoards, probs, options = {}) {
  const {
    requireGuaranteedBlue = true,
    minBlueChance = 0.75,
    maxBluePenalty = 0.04,
    minClarityGain = 2.0
  } = options;

  const unknown = getUnknownTiles();

  const safeBlueChance = i => 1 - probs[i];

  const safestTile = chooseBestSafeCandidate(unknown, allBoards, probs);
  const safestBlueChance = safestTile !== null
    ? safeBlueChance(safestTile)
    : 0;

  const progressTiles = unknown.filter(i => {
    const score = scoreCollapseForTile(allBoards, i, probs);

    if (score.expectedRemaining >= allBoards.length) return false;

    if (requireGuaranteedBlue && safeBlueChance(i) < 1) return false;

    if (!requireGuaranteedBlue) {
      const blueChance = safeBlueChance(i);

      if (blueChance < minBlueChance) return false;
      if (blueChance < safestBlueChance - maxBluePenalty) return false;

      const clarityGain = allBoards.length / score.expectedRemaining;
      if (clarityGain < minClarityGain) return false;
    }

    return true;
  });

  if (!progressTiles.length) return null;

  const partialTiles = getPartialShipTiles();

  const partialCandidates = progressTiles
    .filter(i => partialTiles.has(i));

if (partialCandidates.length) {
  const tile = chooseBestProgressCandidate(partialCandidates, allBoards, probs);

  return withSafeMoveReason(
    makeMoveObject(tile),
    "This tile helps narrow the possible position of an incomplete rare ship."
  );
}

  const rareCandidates = progressTiles
    .map(i => ({
      i,
      rareP: getUnfoundRareProbability(i, allBoards)
    }))
    .filter(x => x.rareP > 0);

if (rareCandidates.length) {
  const getScore = makeCollapseScoreGetter(allBoards, probs);

  let bestRare = null;
  let bestRareP = -Infinity;
  let bestExpectedRemaining = Infinity;

  let baselineExpected = Infinity;

  for (const candidate of rareCandidates) {
    const expectedRemaining =
      getScore(candidate.i).expectedRemaining;

    if (candidate.rareP >= 0.2 && expectedRemaining < baselineExpected) {
      baselineExpected = expectedRemaining;
    }

    if (
      expectedRemaining < bestExpectedRemaining ||
      (
        expectedRemaining === bestExpectedRemaining &&
        candidate.rareP > bestRareP
      )
    ) {
      bestRare = candidate;
      bestRareP = candidate.rareP;
      bestExpectedRemaining = expectedRemaining;
    }
  }
  
  const improvement =
    baselineExpected < Infinity
      ? baselineExpected / bestExpectedRemaining
      : 1;

  if (improvement < 1.6) {
    bestRare = rareCandidates.reduce((best, c) =>
      (c.rareP > (best?.rareP ?? -Infinity)) ? c : best
    , null);
  }

  return withSafeMoveReason(
    makeMoveObject(bestRare.i),
    improvement >= 1.4
      ? `This tile significantly reduces board uncertainty while still offering a ${(bestRare.rareP * 100).toFixed(1)}% rare chance.`
      : `This tile has the best chance to reveal an unfound rare ship (${(bestRare.rareP * 100).toFixed(1)}%).`
  );
}

const tile = chooseBestProgressCandidate(progressTiles, allBoards, probs);
const getScore = makeCollapseScoreGetter(allBoards, probs);
const score = getScore(tile);

return withSafeMoveReason(
  makeMoveObject(tile),
  `This tile reduces board uncertainty the most, from ${allBoards.length} possible boards to about ${score.expectedRemaining.toFixed(1)} expected boards.`
);
}

function withSafeMoveReason(move, reason) {
  return {
    ...move,
    reason
  };
}

function chooseBestProgressCandidate(tiles, allBoards, probs) {
  let bestTile = null;
  let bestScore = Infinity;
  let bestProb = Infinity;

  for (const tile of tiles) {
    const score = scoreCollapseForTile(allBoards, tile, probs).expectedRemaining;
    const p = probs[tile];

    if (
      score < bestScore ||
      (score === bestScore && p < bestProb)
    ) {
      bestTile = tile;
      bestScore = score;
      bestProb = p;
    }
  }

  return bestTile;
}

function chooseBestSafeCandidate(tiles, allBoards, probs) {
  return [...tiles].sort((a, b) => {
    if (probs[a] !== probs[b]) return probs[a] - probs[b];

    return (
      scoreCollapseForTile(allBoards, a, probs).expectedRemaining -
      scoreCollapseForTile(allBoards, b, probs).expectedRemaining
    );
  })[0];
}

function getUnfoundRareProbability(tile, allBoards) {
  const foundColors = getFoundColors();
  let count = 0;

  for (const board of allBoards) {
    const color = getBoardColorAt(board, tile);

    if (!color) continue;

    const isUnfoundRare =
      isAnonymousRareShip(color) ||
      (RARE_COLORS.includes(color) && !foundColors.has(color));

    if (isUnfoundRare) count++;
  }

  return count / allBoards.length;
}

function getCandidateUnfoundColorBonus(tileIndex, allBoards){
  if (allBoards === appState.allBoards && unfoundBonusCache) {
    return unfoundBonusCache[tileIndex] || 0;
  }

  if(!allBoards || allBoards.length === 0) return 0;

  const foundColors = getFoundColors();
  const unfoundHitsByColor = {};

  for(const board of allBoards){
    const color = getBoardColorAt(board, tileIndex);

    if(!color) continue;
    if(isRareShipId(color)) continue;
    if(foundColors.has(color)) continue;

    unfoundHitsByColor[color] =
      (unfoundHitsByColor[color] || 0) + 1;
  }

  let bonus = 0;

  for(const color in unfoundHitsByColor){
    bonus += unfoundHitsByColor[color] / allBoards.length;
  }

  return bonus;
}

function buildCandidates(probs) {
  return probs
    .map((p, i) => {
      const candidate = { p, i };
      const buckets = outcomeBucketsCache?.[i];

      if (buckets && appState.allBoards?.length) {
        let expectedRemaining = 0;

        for (const key in buckets) {
          const count = buckets[key];
          const outcomeChance = count / appState.allBoards.length;

          expectedRemaining += outcomeChance * count;
        }

        candidate.expectedRemaining = expectedRemaining;
      }

      return candidate;
    })
.filter(c =>
  !grid[c.i] &&
  !(shouldForceHeuristics() && c.p >= 0.999)
);
}

function findGuaranteedMove(candidates, huntMode) {
  const guaranteedHit = candidates.find(c => c.p === 1);
  const guaranteedMiss = candidates.find(c => c.p === 0);

  if(!huntMode){
    return guaranteedMiss;
  }

  if (shouldForceHeuristics()) {
    return null;
  }

  if(isEarlyGame()){
    return null;
  }

  return guaranteedHit;
}

function getCandidateReduction(c) {
  const totalBoards = appState.allBoards?.length || 0;

  if (
    totalBoards > 0 &&
    Number.isFinite(c.expectedRemaining)
  ) {
    return 1 - (c.expectedRemaining / totalBoards);
  }

  return 2 * c.p * (1 - c.p);
}

function getSafestMove(candidates) {
  if (!candidates.length) return null;

  const minRisk = Math.min(...candidates.map(c => c.p));

  const RISK_BAND = 0.015;

  const safePool = candidates.filter(c =>
    c.p <= minRisk + RISK_BAND
  );

  function beatsCurrentBest(candidate, currentBest) {
    const candidateReduction =
      getCandidateReduction(candidate);

    const bestReduction =
      getCandidateReduction(currentBest);

    if (
      candidateReduction <= bestReduction + 0.000001
    ) {
      return false;
    }

    const extraRisk =
      candidate.p - currentBest.p;

    if (extraRisk <= 0.005) {
      return true;
    }

    if (extraRisk <= 0.01) {
      return (
        candidateReduction >=
        bestReduction * 1.015
      );
    }

    return (
      candidateReduction >=
      bestReduction * 1.03
    );
  }

  let best = safePool[0];

  for (const candidate of safePool.slice(1)) {
    if (beatsCurrentBest(candidate, best)) {
      best = candidate;
    }
  }

  return best;
}

function scoreStrategicCandidate(c, huntMode) {
  const p = c.p;
  const hitChance = p;
  const missChance = 1 - p;

  const reduction = getCandidateReduction(c);

  const canUseUnfoundBonus =
    appState.allBoards &&
    appState.allBoards.length > 0;

  const unfoundColorBonus = canUseUnfoundBonus
    ? getCandidateUnfoundColorBonus(c.i, appState.allBoards)
    : 0;

  const partialTiles = getPartialShipTiles();
  const phase = getGamePhase();

  let score = 0;

  if (huntMode) {
    score += reduction * 1.35;
    score += hitChance * 0.65;
    score += unfoundColorBonus * 0.85;
    score -= missChance * 0.20;

    if (phase === "early") {
      score += unfoundColorBonus * 0.65;
      score += reduction * 0.25;
    }

    if (phase === "late") {
      score += hitChance * 0.35;
      score -= missChance * 0.15;
    }
  } else {
    score += reduction * 1.20;
    score += unfoundColorBonus * 0.35;
    score -= hitChance * 0.45;
  }

  if (partialTiles.has(c.i) && phase !== "late") {
    score -= 0.08;
  }

if (
    huntMode &&
    phase === "early" &&
    isAdjacentToKnown(c.i)
  ) {
    const hasNonAdjacentCandidate = appState.probs
      ?.some((p, i) =>
        !grid[i] &&
        p > 0 &&
        p < 1 &&
        !isAdjacentToKnown(i)
      );

    if (hasNonAdjacentCandidate) {
      score -= 100;
    }
  }

  return score;
}

function rankCandidates(candidates, huntMode) {
  candidates.forEach(c => {
    c.reduction = getCandidateReduction(c);
    c.score = scoreStrategicCandidate(c, huntMode);
  });

  candidates.sort((a, b) => {
    const scoreDiff = b.score - a.score;
    if (Math.abs(scoreDiff) > 0.000001) return scoreDiff;

    const reductionDiff = b.reduction - a.reduction;
    if (Math.abs(reductionDiff) > 0.000001) return reductionDiff;

    return b.p - a.p;
  });
}

function selectTopMoves(candidates, huntMode) {
  let safest = !huntMode
    ? getSafestMove(candidates)
    : null;

  let strategicPool = [...candidates];

  if (safest) {
    strategicPool = strategicPool.filter(c => c.i !== safest.i);
  }

  const topMoves = strategicPool
    .slice(0, 2)
    .map(m => ({ ...m, type: 'top' }));

  if (safest) {
    safest = { ...safest, type: 'safe' };
  }

  return { topMoves, safest };
}

  const allMoves = [...topMoves];
  if (safest) allMoves.push(safest);

  lastProbs = probs;

  appState.probs = probs;
  appState.topMoves = allMoves;
  appState.isGuaranteed = false;
}

  const specialMessages = [];

  if (context.missEndsGame) {
    specialMessages.push(buildMissEndCard(context));
  }

  specialMessages.push(equivalenceHTML);

  const rainbowCard = buildRainbowCandidateCard(
    appState.probs,
    context
  );

  if (rainbowCard) {
    specialMessages.push(rainbowCard);
  }

  renderInfoMessages(specialMessages);
  return;
}

  if (handleStaticModes(messages, context)) {
    renderInfoMessages(messages);
    return;
  }

if (handleKnownBoardInfo(messages)) {
  renderInfoMessages(messages);
  return;
}

appendSetupMessages(messages, context);
appendOpeningHint(messages, context);
appendPreGameMessages(messages, context);
const forcedHits = getAutoFillForcedHits();

const blockDecisionsForForcedHits =
  context.missEndsGame &&
  forcedHits.length > 0;

if (!blockDecisionsForForcedHits) {
  appendSafeModeProgressCard(messages);
  appendNormalClarityMoveCard(messages);
}

if (appState.probs) {
  if (handleEndgameInfo(messages, box, context)) return;
}

if (
  appState.probs &&
  appState.topMoves?.length
) {
if (
  !blockDecisionsForForcedHits &&
  handleNoEquivalencePlanInfo(messages)
) {
  renderInfoMessages(messages);
  return;
}

if (handleGuaranteedInfo(messages)) {
  appendUncertaintyMoveCard(messages, context);
  renderInfoMessages(messages);
  appendRainbowCandidateCard(messages, context);
  return;
}

if (!blockDecisionsForForcedHits) {
  appendStrategyMessages(messages, context);
}
}

appendRainbowCandidateCard(messages, context);
appendUncertaintyMoveCard(messages, context);
appendFallback(messages);

renderInfoMessages(messages);
}

function getTileColorProbability(tileIndex, color){
  const buckets = outcomeBucketsCache?.[tileIndex];
  const total = appState.allBoards?.length || 0;

  if(!buckets || total === 0) return 0;

  return (buckets[color] || 0) / total;
}

function getRainbowCandidateTiles(probs) {
  const knownRainbowTiles = [];

  for (let i = 0; i < 25; i++) {
    if (grid[i] === "rainbow") {
      knownRainbowTiles.push(i);
    }
  }

  if (knownRainbowTiles.length === 0) return [];

  if (knownRainbowTiles.length >= getShipSize("rainbow")) {
    return [];
  }

  const tiles = new Set();

  for (const i of knownRainbowTiles) {
    for (const ni of getOrthogonalNeighbors(i)) {
      if (grid[ni] === null) {
        tiles.add(ni);
      }
    }
  }

  const candidates = [...tiles]
    .map(i => {
      const [r, c] = indexToCoord(i);
      const forcedColor = appState.forcedTiles?.[i] || null;
      const rainbowChance = getTileColorProbability(i, "rainbow");

      return {
        i,
        row: r + 1,
        col: c + 1,
        p: rainbowChance,
        forcedColor
      };
    })
    .filter(tile => {
      if(tile.forcedColor && tile.forcedColor !== "rainbow") return false;
      return tile.p > 0;
    })
    .sort((a, b) => b.p - a.p);

  const guaranteedRainbow = candidates.filter(tile => tile.p === 1);

  if(guaranteedRainbow.length > 0){
    return guaranteedRainbow;
  }

  return candidates;
}

function handleEndgameInfo(messages, box, context) {
  if (!appState.isTrueEndgame) return false;

  const forcedHits = getAutoFillForcedHits();

  if (
    (forcedHits.length > 0 && context?.missEndsGame) ||
    hasGuaranteedUnknownHits()
  ) {
    return false;
  }

  const play = DOM.playBoard;
  clearRecommendations();

  let [b1, b2] = appState.allBoards;
  let candidates = [];

const { huntMode } = getGameContext();

for (let i = 0; i < 25; i++) {
  if (grid[i]) continue;

  const c1 = getBoardColorAt(b1, i);
  const c2 = getBoardColorAt(b2, i);

  if (c1 === c2) continue;

  const p = appState.probs?.[i] ?? 0;

  if (huntMode) {
    if (p > 0) candidates.push(i);
  } else {
    if (p < 1) candidates.push(i);
  }
}

if (candidates.length === 0) {
  return false;
}

const displayCandidates =
  collapseFinalMoveCandidatesByOutcome(candidates, b1, b2);

  displayCandidates.forEach(i => {

  if (appState.forcedTiles) {

  }).join("<br>");

  messages.push(
    makeCard(

      "info-purple"
    )
  );

renderInfoMessages(messages);
return true;
}

function collapseFinalMoveCandidatesByOutcome(candidates, b1, b2){
  const groups = {};

  for(const i of candidates){
    const key = `${getBoardColorAt(b1, i) || 0}|${getBoardColorAt(b2, i) || 0}`;

    if(!groups[key]){
      groups[key] = [];
    }

    groups[key].push(i);
  }

  return Object.values(groups).map(group => group[0]);
}

  let usedRare = getUsedRare();

function isColorDisabled(color, counts, usedRare){

  if(color === 'miss' && getRemainingBlueTiles() <= 0){
    return true;
  }

  if(getShipSize(color) && counts[color] >= getShipSize(color)){
    return true;
  }

  if(RARE_COLORS.includes(color)){
  
if (!isRareColorAllowedByMode(color)) {
  return true;
}

    if(rareCount !== null){
      const isUsed = counts[color] > 0;
      const orangeReserved = counts.orange === 0 ? 1 : 0;
      const effectiveUsedRare = usedRare.length + orangeReserved;

      if(
        !isUsed &&
        color !== 'orange' &&
        effectiveUsedRare >= rareCount
      ){
        return true;
      }
    }
  }

  return false;
}

function applyEquivalenceDimming() {

  const placedMask =
    gridMask || cellsToMask(
      grid
        .map((cell, i) => cell !== null ? i : null)
        .filter(i => i !== null)
    );

  let forcedBlueMask = 0;

  if (appState.forcedTiles) {
    for (const [i, color] of Object.entries(appState.forcedTiles)) {
      if (color === 'miss' && grid[i] === null) {
        forcedBlueMask |= CELL_MASKS[i];
      }
    }
  }

  forEachMaskBit(placedMask, i => {
    play[i].classList.add('equivalence-placed-dim');
  });

  forEachMaskBit(forcedBlueMask, i => {
    play[i].classList.add('equivalence-stripe-dim');
  });
}

function canShowHeatmapPreview(tileIndex) {
  return (
    currentMode !== MODE.GAME_OVER &&

    appState.allBoards &&

    appState.probs &&
    selectedColor &&

  );
}

function getScenarioBoardsForSelectedColor(tileIndex) {
  return appState.allBoards.filter(board =>
    boardTileMatchesSelectedColor(board, tileIndex, selectedColor)
  );
}

function boardTileMatchesSelectedColor(board, tileIndex, color) {
  const boardColor = getBoardColorAt(board, tileIndex);

  if (color === 'miss') {
    return !boardColor;
  }

  if (boardColor === color) {
    return true;
  }

const selectedIsUnfoundRare =
  canAnonymousRareRepresentColor(color);

  if (
    selectedIsUnfoundRare &&
    isAnonymousRareShip(boardColor)
  ) {
    return true;
  }

  return false;
}

function buildPreviewHeatmapState(tileIndex, scenarioBoards) {
  const probs = computePreviewProbs(scenarioBoards);
  const context = getPreviewGameContext(tileIndex, scenarioBoards);

  return {
    probs,
    huntMode: context.huntMode,
    mode: context.mode,
    label: context.label
  };
}

function getPreviewGameContext(tileIndex, scenarioBoards) {
  const current = getHitMissCounts();

  const hits =
    selectedColor === 'miss'
      ? current.hits
      : current.hits + 1;

  const misses =
    selectedColor === 'miss'
      ? current.misses + 1
      : current.misses;

  const naturalAggressive = hits >= 5 && misses >= 3;

  let huntMode = naturalAggressive;

  if (rareCount >= 4) {
    const defaultStartMode = "aggressive";
    const startMode = forcedStartMode || defaultStartMode;

    huntMode =
      startMode === "aggressive" ||
      naturalAggressive;
  }

  const remainingBlue =
    getRemainingBlueTiles() - (selectedColor === 'miss' ? 1 : 0);

  const allShipsComplete = scenarioBoards.length > 0 &&
    scenarioBoards.every(board => {
      for (let i = 0; i < 25; i++) {
        if (i === tileIndex) continue;
        if (grid[i] !== null) continue;
        if (getBoardColorAt(board, i)) return false;
      }
      return true;
    });

  const tracking = getShipTracking();
  const allShipsAlreadyComplete =
    tracking.incomplete === 0 &&
    tracking.unfound === 0;

  if (
    selectedColor === 'miss' &&
    !allShipsAlreadyComplete &&
    hits >= 5 &&
    misses > 3
  ) {
    return {
      huntMode,
      mode: MODE.GAME_OVER,
      label: "Preview: Game Over"
    };
  }

  if (!huntMode && remainingBlue === 0) {
    return {
      huntMode,
      mode: MODE.ALL_HITS,
      label: "Preview: All Hits"
    };
  }

  if (huntMode && allShipsComplete) {
    return {
      huntMode,
      mode: MODE.ALL_MISSES,
      label: "Preview: All Misses"
    };
  }

  return {
    huntMode,
    mode: MODE.NORMAL,
    label: huntMode
      ? "Preview Mode: Aggressive (Non-blue Hunting)"
      : "Preview Mode: Safe (Blue Hunting)"
  };
}

function computePreviewProbs(boards) {
  const counts = Array(25).fill(0);

  if (!boards || boards.length === 0) {
    return counts;
  }

  for (const board of boards) {
    for (let i = 0; i < 25; i++) {
      if (getBoardColorAt(board, i)) counts[i]++;
    }
  }

  return counts.map(c => c / boards.length);
}

function highlightRecommendations(probs) {
  if (!isNormalMode()) return;

  lastSpecialGroup = null;

  const play = DOM.playBoard;
  clearRecommendations();
  
  if (
  appState.forcedTiles &&
  grid.every((cell, i) => cell !== null || appState.forcedTiles[i])
) {
  appState.probs = probs;
  appState.topMoves = null;
  appState.isGuaranteed = false;
  return;
}

  const context = getRecommendationContext();
let candidates = buildCandidates(probs);

const guaranteed = findGuaranteedMove(candidates, context.huntMode);

if (guaranteed) {
  applyGuaranteedMove(guaranteed, probs, play);
  return;
}

candidates = candidates.filter(c =>
  !appState.forcedTiles?.[c.i]
);

candidates = candidates.filter(c =>

    ? c.p < 1
    : c.p > 0
);

  rankCandidates(candidates, context.huntMode);

  const { topMoves, safest } = selectTopMoves(candidates, context.huntMode);

function applyGuaranteedMove(move, probs, play) {
  const cell = play[move.i];

  cell.classList.add('recommended-best');

  const forcedColor = appState.forcedTiles?.[move.i];

  if(move.p === 1 && !forcedColor){
    cell.classList.add('guaranteed-unknown');
  }

  lastProbs = probs;
  lastTopMoves = [move];
  lastGuaranteed = true;

  appState.probs = probs;
  appState.topMoves = [move];
  appState.isGuaranteed = true;
}

function isSameMove(a, b) {
  return !!a && !!b && a.i === b.i;
}

function getDisplayedRecommendations(
  topMovesArg = appState.topMoves || [],
  safestArg = undefined
) {
  const topMoves = topMovesArg || [];

  const safest =
    safestArg !== undefined
      ? safestArg
      : topMoves.find(m => m.type === "safe") || null;

  const strategicMoves = topMoves.filter(m => m.type !== "safe");

  const best =
    strategicMoves.find(m => !isSameMove(m, safest)) || null;

  const isDisplayableAlternative = move =>
    move &&
    !isSameMove(move, best) &&
    !isSameMove(move, safest);

  const collapseAlternative =
    isDisplayableAlternative(appState.collapseMove)
      ? appState.collapseMove
      : null;

  const rankedAlternative =
    strategicMoves.find(m => isDisplayableAlternative(m)) || null;

  const alternative = collapseAlternative || rankedAlternative;

  const alternativeType = collapseAlternative
    ? (
        collapseAlternative.isFutureCollapse
          ? "futureCollapse"
          : "collapse"
      )
    : (
        rankedAlternative
          ? "ranked"
          : null
      );

  return {
    safest,
    best,
    alternative,
    alternativeType,
    collapseAlternative,
    rankedAlternative
  };
}

function applyHighlights(play, topMoves, safest) {
  const {
    best,
    alternative,
    safest: displayedSafest
  } = getDisplayedRecommendations(topMoves, safest);

  if (best) {
    play[best.i].classList.add('recommended-best');
  }

  if (alternative) {
    play[alternative.i].classList.add('recommended-second');
  }

  if (displayedSafest) {
    play[displayedSafest.i].classList.add('recommended-safe');
  }
}

function getTileOverlapCount(tile, data) {
  return (data.shipMap?.[tile] || []).length;
}

function getTileAverageEV(tile, data) {
  return data.evMap?.[tile]?.weightedEV || 0;
}

function getHighestEVTile(tiles, data) {
  let bestEV = -Infinity;
  let bestTiles = [];

  for (const tile of tiles) {
    const ev = getTileAverageEV(tile, data);

    if (ev > bestEV) {
      bestEV = ev;
      bestTiles = [tile];
    } else if (ev === bestEV) {
      bestTiles.push(tile);
    }
  }

  return bestTiles.length === 1 ? bestTiles[0] : null;
}

function getBestCollapseTile(tiles, data) {
  if (!tiles?.length || !data?.allBoards?.length) return null;

  const EPS = 0.000001;

  let bestExpectedRemaining = Infinity;
  let bestTiles = [];

  for (const tile of tiles) {
    const collapse = scoreCollapseForTile(
      data.allBoards,
      tile,
      data.probs
    );

    const expected = collapse.expectedRemaining;

    if (expected < bestExpectedRemaining - EPS) {
      bestExpectedRemaining = expected;
      bestTiles = [tile];
    } else if (Math.abs(expected - bestExpectedRemaining) <= EPS) {
      bestTiles.push(tile);
    }
  }

  return bestTiles.length === 1 ? bestTiles[0] : null;
}

function formatEquivalenceMoveLine(
  tile,
  data,
  highestEVTile = null,
  bestCollapseTile = null
) {
  const [r, c] = indexToCoord(tile);
  const overlap = getTileOverlapCount(tile, data);
  const ev = getTileAverageEV(tile, data);

  const overlapText =
    overlap > 1
      ? `${overlap}-Ship Overlap; `
      : "No overlap; ";

let coordClass = "coord-good";

if (tile === highestEVTile) {
  coordClass = "coord-high-ev";
}

if (tile === bestCollapseTile) {
  coordClass = "coord-progress";
}

const labels = [];

const isHighestEV = tile === highestEVTile;
const isBestCollapse = tile === bestCollapseTile;

if (isHighestEV && isBestCollapse) {
  labels.push("Highest EV AND Best board reduction");
} else {
  if (isHighestEV) {
    labels.push("Highest EV");
  }

  if (isBestCollapse) {
    labels.push("Best board reduction");
  }
}

const labelText = labels.length
  ? `<div style="
       font-size:12px;
       font-weight:bold;
       opacity:0.9;
       margin-bottom:2px;
     ">
       ${labels.map(x => `${x}:`).join("<br>")}
     </div>`
  : "";

const collapse = scoreCollapseForTile(
  data.allBoards,
  tile,
  data.probs
);

const reductionPercent =
  data.allBoards?.length
    ? (
        (
          (data.allBoards.length - collapse.expectedRemaining) /
          data.allBoards.length
        ) * 100
      )
    : null;

const reductionText =
  reductionPercent !== null
    ? `
        <div style="
          margin-left:14px;
          margin-top:2px;
          font-size:12px;
          opacity:0.82;
        ">
          ↳ Expected Board Reduction: ${reductionPercent.toFixed(1)}%
        </div>
      `
    : "";

return `
  ${labelText}

  <span class="${coordClass}">
    Row ${r + 1}, Col ${c + 1}
  </span>

function forEachMaskBit(mask, fn) {
  while (mask) {
    const bit = mask & -mask;
    fn(BIT_INDEX[bit]);
    mask &= mask - 1;
  }
}

function countMaskBits(mask) {
  let count = 0;

  while (mask) {
    count++;
    mask &= mask - 1;
  }

  return count;
}

function getGridStats(){
  if(gridStatsCache) return gridStatsCache;

  const colorCounts = {};
  const colorMasks = {};
  const foundColors = new Set();

  for(const color in SHIPS){
    colorCounts[color] = 0;
    colorMasks[color] = 0;
  }

  let hits = 0;
  let misses = 0;
  let occupiedMask = 0;
  let missMask = 0;

  for(let i = 0; i < 25; i++){
    const color = grid[i];

    if(color === null) continue;

    const mask = CELL_MASKS[i];

    if(color === 'miss'){
      misses++;
      missMask |= mask;
      continue;
    }

    hits++;
    occupiedMask |= mask;

    colorCounts[color] = (colorCounts[color] || 0) + 1;
    colorMasks[color] = (colorMasks[color] || 0) | mask;
    foundColors.add(color);
  }

  gridStatsCache = {
    hits,
    misses,
    occupiedMask,
    missMask,
    colorCounts,
    colorMasks,
    foundColors
  };

  return gridStatsCache;
}

function maskToCells(mask){
  const cells = [];

  while(mask){
    const bit = mask & -mask;
    cells.push(BIT_INDEX[bit]);
    mask &= mask - 1;
  }

  return cells;
}

function getOrthogonalNeighbors(i) {
  const [r, c] = indexToCoord(i);

  return [
    [r - 1, c],
    [r + 1, c],
    [r, c - 1],
    [r, c + 1]
  ]
    .filter(([rr, cc]) => rr >= 0 && rr < SIZE && cc >= 0 && cc < SIZE)
    .map(([rr, cc]) => coordToIndex(rr, cc));
}

function coordToIndex(r,c){return r*5+c;}

function indexToCoord(i){return [Math.floor(i/5),i%5];}

function isAdjacentToKnown(i){
  const [r,c] = indexToCoord(i);

  const dirs = [
    [1,0],[-1,0],
    [0,1],[0,-1]
  ];

  for (let [dr,dc] of dirs){
    const rr = r + dr;
    const cc = c + dc;

    if(rr < 0 || cc < 0 || rr >= 5 || cc >= 5) continue;

    const ni = coordToIndex(rr,cc);

    if(grid[ni] && grid[ni] !== 'miss'){
      return true;
    }
  }

  return false;
}

masks[ship] = (masks[ship] || 0) | CELL_MASKS[i];

function canPlaceWithSameShipOverlap(
  placement,
  ship,
  occupiedMask,
  shipMasks,
  knownMissMask = 0
){
  const placementMask = getPlacementMask(placement);
  const ownShipMask = shipMasks[ship] || 0;
  const occupiedByOtherShips = occupiedMask & ~ownShipMask;

  if((placementMask & knownMissMask) !== 0) return false;
  if((placementMask & occupiedByOtherShips) !== 0) return false;

  return true;
}

function makeMaskBoard(shipMasks, hitMask){

  };

function isMaskBoard(board){

}

function maskBoardKey(board){

function getBoardColorAt(board, i){
  if (!isMaskBoard(board)) {
    return board[i] || null;
  }

const mask = CELL_MASKS[i];

  for (const color in board.colorMasks) {
    if (board.colorMasks[color] & mask) {
      return color;
    }
  }

  return null;
}

function boardToMask(board){
  if (isMaskBoard(board)) {
    return board.hitMask;
  }

  let mask = 0;

  for(let i = 0; i < 25; i++){
    if(board[i]){

  }

function clearColorMaskCache(){

}

function getKnownMaskCached(color){

}

function respectsKnownMask(placement, color){
  const knownMask = getKnownMaskCached(color);
  const placementMask = getPlacementMask(placement);

  return (placementMask & knownMask) === knownMask;
}

function getColorMaskCached(color){
  if(colorMaskCache[color] !== undefined){

function prepareSortedShips() {
  const ships = getShipList();

  ships.sort((a, b) => {
    const scoreA = getPlacementsCached(a).length - getKnownCellsCached(a).length * 5;
    const scoreB = getPlacementsCached(b).length - getKnownCellsCached(b).length * 5;

    if(scoreA !== scoreB) return scoreA - scoreB;

    const aRare = a.startsWith('rare_');
    const bRare = b.startsWith('rare_');

    if(aRare && !bRare) return 1;
    if(bRare && !aRare) return -1;

    return 0;
  });

  return ships;
}

function buildPlacementsMap(ships) {
  const map = {};

  for (let ship of ships) {
    const placements = getPlacementsCached(ship);
    if (placements.length === 0) return null;

    map[ship] = placements;
  }

  return map;
}

function createBitWriter(){
  let bits = [];

  return {
    write(value, bitCount){
      for(let i = bitCount - 1; i >= 0; i--){
        bits.push((value >> i) & 1);
      }
    },

    toBase64(){
      let bytes = [];
	  
      for(let i = 0; i < bits.length; i += 8){
        let byte = 0;
        for(let j = 0; j < 8; j++){
          byte <<= 1;
          if(i + j < bits.length && bits[i + j]) byte |= 1;
        }
        bytes.push(byte);
      }

      return btoa(String.fromCharCode(...bytes));
    }
  };
}

function createBitReader(base64){
  function safeBase64Decode(str){
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while(str.length % 4) str += '=';
  return atob(str);
}

const binary = safeBase64Decode(base64);

  let bits = [];

  for(let i = 0; i < binary.length; i++){
    let byte = binary.charCodeAt(i);
    for(let j = 7; j >= 0; j--){
      bits.push((byte >> j) & 1);
    }
  }

  let index = 0;

  return {
    read(bitCount){
      let value = 0;
      for(let i = 0; i < bitCount; i++){
        value = (value << 1) | bits[index++];
      }
      return value;
    }
  };
}

function encodeGame(){
  const movesToEncode = getMovesForCurrentGrid();
  const writer = createBitWriter();

  writer.write(1, 3);

  writer.write(rareCount, 3);
  const modeBit = forcedStartMode === "aggressive" ? 1 : 0;
writer.write(modeBit, 1);

  writer.write(movesToEncode.length, 5);

movesToEncode.forEach(m => {
  writer.write(m.index, 5);
  writer.write(COLOR_TO_ID[m.newColor], 4);
});

  return writer.toBase64();
}

function decodeGame(hash){
  const reader = createBitReader(hash);

  const version = reader.read(3);
  const rareCountVal = reader.read(3);
  const modeVal = reader.read(1) ? "aggressive" : "safe";

  const moveCount = reader.read(5);

  let moves = [];

  for(let i = 0; i < moveCount; i++){
    const index = reader.read(5);
    const colorId = reader.read(4);

    moves.push({
      index,
      color: ID_TO_COLOR[colorId]
    });
  }

  return { moves, rareCountVal, modeVal };
}

function loadFromHash(hash){
  try {
    isLoadingHash = true;

    const decoded = decodeGame(hash);
    const loadedMoves = decoded.moves;
    const rareCountVal = decoded.rareCountVal;
    const modeVal = decoded.modeVal;

    resetAll();

rareCount = rareCountVal;
forcedStartMode = modeVal || "aggressive";
updateTopInfoVisibility();

    document.querySelectorAll('[onclick^="setRare"]').forEach(b=>{
      b.classList.remove('active-btn');
    });

    document
      .querySelector(`[onclick="setRare(${rareCountVal},this)"]`)
      ?.classList.add('active-btn');

    updateModeButtons();
    updateBoardLock();

    loadedMoves.forEach(m => {
      selectedColor = m.color;
      placeColor(m.index);
    });

    selectedColor = null;
    redoStack = [];

    isLoadingHash = false;

    render();
    updateColorAvailability();
    runSimulation();
    renderUI();
    updateBoardLock();

  } catch(e){
    isLoadingHash = false;
    showError("Invalid code");
  }
}

function getMovesForCurrentGrid(){
  const encoded = [];
  const encodedGrid = Array(25).fill(null);

  for(const move of moves){
    encoded.push(move);
    encodedGrid[move.index] = move.newColor;
  }

  for(let i = 0; i < 25; i++){
    if(grid[i] !== encodedGrid[i]){
      encoded.push({
        index: i,
        prevColor: encodedGrid[i],
        newColor: grid[i]
      });
    }
  }

  return encoded;
}

  );

  if (!canToggle) return;

  targetRareShipsMode = !targetRareShipsMode;

  runSimulation();
  renderUI();
};

window.toggleColorblindMode = function(btn){
  colorblindMode = !colorblindMode;

  btn.classList.toggle('active-btn', colorblindMode);
};

window.toggleGambaHighlight = function() {
  showGambaHighlight = !showGambaHighlight;
  renderUI();
};

window.selectColor = function(c,e){
if(e.target.classList.contains('disabled')) return;

selectedColor = c;
  document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('selected'));
  e.target.classList.add('selected');
  updateBoardLock();
  updateColorAvailability();
  
  const hasStarted = grid.some(c => c !== null);

if(!hasStarted){
  updateInfoBox();
}

}

window.toggleHeatmapMode = function() {
  if (!appState.allBoards || !tileEVStatsCache) return;
  if (heatmapPreviewActive) return;

  if (heatmapMode === "probability") {
    heatmapMode = "ev";
  } else if (heatmapMode === "ev") {
    heatmapMode = "rare";
  } else {
    heatmapMode = "probability";
  }

  renderSelectedHeatmap();
};

window.setRare = function(n,btn){
  if(configLocked) return;
  
exactResultCache.clear();
clearPlacementsCache();

rareCount = n;
updateTopInfoVisibility();

forcedStartMode = getDefaultModeForRareCount(n);

updateModeButtons();

  document.querySelectorAll('[onclick^="setRare"]').forEach(b=>b.classList.remove('active-btn'));
  btn.classList.add('active-btn');

  updateBoardLock();

  if(!isStateValid()){
    showError("Too many rare colors placed for this setting.");
    return;
  }

  runSimulation(); 
  renderUI(); 
  updateColorAvailability();
}

window.setMode = function(mode, btn){
  if(rareCount === null) return;

  forcedStartMode = mode;
  exactResultCache.clear();

  clearPlacementsCache();
  appState = createEmptyAppState();

  updateModeButtons();

  runSimulation();
  renderUI();
  updateColorAvailability();
};

window.generateHash = function(){
  const input = document.getElementById('hashInput');
  input.value = encodeGame();
  input.select();
};

window.loadHash = function(){
  const input = document.getElementById('hashInput');
  const hash = input.value.trim();

  if(!hash){
    showError("Enter a code first");
    return;
  }

  loadFromHash(hash);
};

// ===============================
// T.17 INITIALIZATION
// ===============================

function createBoards(){
  const play=document.getElementById('playBoard');
  const heat=document.getElementById('heatmap');

  play.innerHTML='';
  heat.innerHTML='';

for(let i=0;i<25;i++){
  let cell=document.createElement('div');
  cell.className='cell';
  cell.onclick=()=>handleCellClick(i);
cell.addEventListener('mouseenter', event => {
  queueHeatmapPreview(i);

  const recommendationLabel = getRecommendationTooltipForPlayTile(i);

  if (recommendationLabel) {
    showColorTooltip(recommendationLabel, event);
    return;
  }

  const color = getTooltipColorForPlayTile(i);
  showColorTooltip(getColorTooltipLabel(color), event);
});

cell.addEventListener('mousemove', moveColorTooltip);

cell.addEventListener('mouseleave', () => {
  cancelHeatmapPreview();
  hideColorTooltip();
});
  play.appendChild(cell);

  let h=document.createElement('div');
  h.className='cell';
  heat.appendChild(h);
}
}

function bindColorblindTooltips() {
  DOM_LISTS.colorButtons.forEach(btn => {
    btn.addEventListener('mouseenter', event => {
      showColorTooltip(
        getColorTooltipLabel(btn.dataset.color),
        event
      );
    });

    btn.addEventListener('mousemove', moveColorTooltip);
    btn.addEventListener('mouseleave', hideColorTooltip);
  });
}

function cacheDomLists(){
  DOM_LISTS.colorButtons = [...document.querySelectorAll('.color-btn')];
  DOM_LISTS.rareButtons = [...document.querySelectorAll('[onclick^="setRare"]')];
  DOM_LISTS.modeButtons = [...document.querySelectorAll('[onclick^="setMode"]')];
}

DOM.playBoard = document.getElementById('playBoard').children;
DOM.heatmap = document.getElementById('heatmap').children;
DOM.heatmapTitle = document.getElementById('heatmapTitle');
DOM.heatmapSubtitle = document.getElementById('heatmapSubtitle');
DOM.heatmapToggleBtn = document.getElementById('heatmapToggleBtn');
DOM.infoBox = document.getElementById('infoBox');
DOM.topInfoBox = document.getElementById('topInfoBox');
DOM.confidence = document.getElementById('confidence');
DOM.modeLabel = document.getElementById('modeLabel');

cacheDomLists();

bindColorblindTooltips();

createBoards();
updateBoardLock();
updateInfoBox();
updateTopInfoVisibility();

};
</script>

<div class="sharebar">
  <div class="section" style="width:100%;">
    <span class="label">Share Code:</span>

    <input id="hashInput" placeholder="Paste or generate code">

    <button class="active-btn" onclick="generateHash()">Generate</button>
    <button onclick="loadHash()">Load</button>
  </div>
</div>

<div id="colorTooltip" class="color-tooltip"></div>

</body>
</html>
