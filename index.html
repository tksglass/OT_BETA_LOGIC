<script>
window.onload = function(){

// ===============================
// T.01 CONFIG / CONSTANTS
// ===============================

const SIZE=5;
const SHIPS={
  teal:4,
  green:3,
  yellow:3,

  orange:2,
  red:2,
  black:2,
  white:2,
  rainbow:2,
};
const RARE_COLORS=['orange','red','black','white','rainbow'];

const TILE_EV = {
  miss: 10,
  teal: 20,
  green: 35,
  yellow: 55,
  orange: 90,
  white: 100,
  black: 120,
  red: 150,
  rainbow: 500
};

const MODE = {
  NORMAL: 0,
  ALL_HITS: 1,
  ALL_MISSES: 2,
  TOUCH_GRASS: 3,
  GAME_OVER: 4
};

const MAX_MISSES = 5;

const PRECALC_BOARD_LIMIT = 2500;
const PRECALC_MAX_DEPTH = 10;
const PRECALC_UNKNOWN_TILE_LIMIT = 12;

const COLOR_TO_ID = {
  teal: 0,
  green: 1,
  yellow: 2,
  orange: 3,
  red: 4,
  black: 5,
  white: 6,
  rainbow: 7,
  miss: 8
};

const ID_TO_COLOR = Object.fromEntries(
  Object.entries(COLOR_TO_ID).map(([k,v]) => [v,k])
);

const DOM = {
  playBoard: null,
  heatmap: null,
  heatmapTitle: null,
  heatmapSubtitle: null,
  heatmapToggleBtn: null,
  infoBox: null,
  topInfoBox: null,
  confidence: null,
  modeLabel: null
};

function buildRawPlacements(size){
  const placements = [];

  for(let r = 0; r < SIZE; r++){
    for(let c = 0; c < SIZE; c++){
      for(let horiz of [true, false]){
        const cells = [];

        for(let k = 0; k < size; k++){
          const rr = r + (horiz ? 0 : k);
          const cc = c + (horiz ? k : 0);

          if(rr >= SIZE || cc >= SIZE){
            cells.length = 0;
            break;
          }

          cells.push(coordToIndex(rr, cc));
        }

        if(cells.length === size){
          const mask = cellsToMask(cells);
          let diagonalMask = 0;

          for(const i of cells){
            diagonalMask |= DIAGONAL_MASKS[i];
          }

          placements.push({
            cells,
            horiz,
            key: cells[0],
            mask,
            diagonalMask
          });
        }
      }
    }
  }

  return placements;
}

const DIAGONALS = Array.from({ length: 25 }, (_, i) => {
  const [r, c] = [Math.floor(i / 5), i % 5];

  return [
    [r - 1, c - 1],
    [r - 1, c + 1],
    [r + 1, c - 1],
    [r + 1, c + 1]
  ].filter(([dr, dc]) => dr >= 0 && dc >= 0 && dr < 5 && dc < 5)
   .map(([dr, dc]) => dr * 5 + dc);
});

const BIT_INDEX = {};

for(let i = 0; i < 25; i++){
  BIT_INDEX[1 << i] = i;
}

const DIAGONAL_MASKS = Array(25).fill(0);

for(let i = 0; i < 25; i++){
  let [r,c] = [Math.floor(i / 5), i % 5];

  let mask = 0;

  const dirs = [
    [r-1,c-1],[r-1,c+1],
    [r+1,c-1],[r+1,c+1]
  ];

  for(let [dr,dc] of dirs){
    if(dr>=0 && dc>=0 && dr<5 && dc<5){
      mask |= (1 << (dr * 5 + dc));
    }
  }

  DIAGONAL_MASKS[i] = mask;
}

const RAW_PLACEMENTS = {
  2: buildRawPlacements(2),
  3: buildRawPlacements(3),
  4: buildRawPlacements(4)
};

// ===============================
// T.02 GLOBAL STATE
// ===============================

let currentMode = MODE.NORMAL;

let grid = Array(25).fill(null);

let appState = createEmptyAppState();

let moves = [];
let redoStack = [];
let history = [];

let rareCount = null;
let selectedColor = null;
let forcedStartMode = null;

let lastProbs = null;
let lastTopMoves = null;
let lastSpecialGroup = null;

let placementsCache = {};
let knownCellsCache = {};
let colorMaskCache = {};
let gridStatsCache = null;
let gridMask = 0;
let outcomeBucketsCache = null;
let tileShipSizesCache = null;
let unfoundBonusCache = null;
let tileEVStatsCache = null;
let hitCountsCache = null;
let rareUnfoundCountsCache = null;
let hitMasksCache = null;
let equivalenceGroupsCache = null;
let precalcContextCache = null;

let configLocked = false;
let isLoadingHash = false;

let hoverPreviewTimer = null;
let lastHoveredTile = null;
let heatmapPreviewActive = false;
let heatmapMode = "probability";
let lastAutoFillHitCount = 0;

const DOM_LISTS = {
  colorButtons: null,
  rareButtons: null,
  modeButtons: null
};

// ===============================
// T.03 ACTIONS
// ===============================

function placeColor(i) {
  if (isGameOver()) return;
  if (!canPlaceColor()) return;

const prevSnapshot = {
  currentMode,
  appState: deepClone(appState),
  lastSpecialGroup,
  lastProbs,
  lastTopMoves
};

  const historySnapshot = createHistorySnapshot();

  const prevColor = grid[i];
  const newColor = toggleColor(i);

resetModeAndCache();
ensureConfigLocked();
setGridCell(i, newColor);

const { hits, misses } = getHitMissCounts();

if (shouldEndGameOnMiss({
  newColor,
  hits,
  misses
})) {
  commitAcceptedMove({
    index: i,
    prevColor,
    newColor,
    historySnapshot
  });
  return;
}

if (!isValidPlacement(i, prevColor)) {
    grid[i] = prevColor;

    currentMode = prevSnapshot.currentMode;
    appState = prevSnapshot.appState;
    lastSpecialGroup = prevSnapshot.lastSpecialGroup;
    lastProbs = prevSnapshot.lastProbs;
    lastTopMoves = prevSnapshot.lastTopMoves;

    clearPlacementsCache();
    render();
    renderUI();
    updateColorAvailability();
    return;
  }

  commitAcceptedMove({
  index: i,
  prevColor,
  newColor,
  historySnapshot
});
}

function handleCellClick(i){
  if(currentMode === MODE.GAME_OVER) return;
  if(rareCount === null) return;

  const forced = appState.forcedTiles?.[i];

  const canAutoPlaceForced =
    forced &&
    grid[i] === null &&
    !isAnonymousRareShip(forced);

  if(canAutoPlaceForced){

    const prevSelected = selectedColor;
    const prevGrid = grid[i];

    selectedColor = forced;

    placeColor(i);

    const success = grid[i] !== prevGrid;

    selectedColor = prevSelected;

    if(!success){
      placeColor(i);
    }

    return;
  }

  placeColor(i);
}

function toggleColor(i) {
  const isSameColor = grid[i] === selectedColor;
  return isSameColor ? null : selectedColor;
}

function setGridCell(index, value) {
  grid[index] = value;
}

function recordMove(index, prevColor, newColor) {
  const move = { index, prevColor, newColor };

  moves.push(move);
  redoStack = [];
}

window.autoPlaceGuaranteedHits = function(){
  if (currentMode === MODE.GAME_OVER) return;
  if (rareCount === null) return;
  if (!appState.forcedTiles) return;
  
  const btn = document.getElementById('autoHitsBtn');
btn?.classList.remove('pulse');

  const forcedHits = Object.entries(appState.forcedTiles)
    .map(([index, color]) => ({
      index: Number(index),
      color
    }))
    .filter(({ index, color }) =>
      grid[index] === null &&
      color &&
      color !== 'miss' &&
      !isAnonymousRareShip(color)
    );

  if (forcedHits.length === 0) return;

  const historySnapshot = createHistorySnapshot();

  isLoadingHash = true;

  try {
    ensureConfigLocked();

    for (const { index, color } of forcedHits) {
      const prevColor = grid[index];

      grid[index] = color;
      recordMove(index, prevColor, color);
    }

    saveHistorySnapshot(historySnapshot);
    redoStack = [];
  } finally {
    isLoadingHash = false;
  }

  clearPlacementsCache();
  render();

  appState = createEmptyAppState();

  runSimulation();
  updateColorAvailability();
  renderUI();
  updateBoardLock();
};

window.undoMove = function(){
  if(history.length === 0) return;

  const lastMove = moves.pop();
  if(!lastMove) return;

  redoStack.push(lastMove);

  const prev = history.pop();

  grid = prev ? [...prev.grid] : Array(25).fill(null);
  rareCount = prev?.rareCount ?? null;
  forcedStartMode = prev?.forcedStartMode ?? null;
appState = prev?.appState
  ? deepClone(prev.appState)
  : createEmptyAppState();
  currentMode = prev?.currentMode ?? MODE.NORMAL;

  clearPlacementsCache();

  render();
  updateColorAvailability();
  runSimulation();
  renderUI();
  updateBoardLock();
};

window.redoMove = function(){
  if(redoStack.length === 0) return;

  const move = redoStack.pop();

history.push({
  grid: [...grid],
  rareCount,
  forcedStartMode,
  appState: deepClone(appState),
  currentMode
});

  grid[move.index] = move.newColor;

  moves.push(move);

  clearPlacementsCache();

  render();
  updateColorAvailability();
  runSimulation();
  renderUI();
  updateBoardLock();
};

window.resetAll = function(){

  grid = Array(25).fill(null);
  selectedColor = null;
  rareCount = null;
  forcedStartMode = null;
  history = [];
  updateTopInfoVisibility();
  

DOM_LISTS.colorButtons.forEach(b=>{
  b.classList.remove('selected','disabled');
});

DOM_LISTS.rareButtons.forEach(b=>{
  b.classList.remove('active-btn');
});

document.getElementById('modeSafe')?.classList.remove('active-btn');
document.getElementById('modeAggressive')?.classList.remove('active-btn');

  render();
  const heat = DOM.heatmap;
for(let i=0;i<25;i++){
  heat[i].style.background = '';
  heat[i].textContent = '';
}

setTextIfChanged(DOM.heatmapTitle, "Heatmap");
DOM.heatmapSubtitle.classList.remove('error');

setTextIfChanged(DOM.heatmapSubtitle, "");

heatmapPreviewActive = false;
heatmapMode = "probability";
lastHoveredTile = null;
updateHeatmapToggle();

  DOM.confidence.textContent = "";
  DOM.modeLabel.textContent = "";
currentMode = MODE.NORMAL;

appState = createEmptyAppState();
gridStatsCache = null;
DOM.infoBox.innerHTML = "";

lastSpecialGroup = null;

updateInfoBox();

  updateBoardLock();

clearRecommendations();

lastProbs = null;
lastTopMoves = null;
moves = [];
redoStack = [];

configLocked = false;

updateModeButtons();

DOM_LISTS.rareButtons.forEach(b=>{
  b.classList.remove('disabled');
});

lastAutoFillHitCount = 0;
updateAutoHitsButton();

}

// ===============================
// T.04 FLOW CONTROLLERS
// ===============================

function getAutoFillForcedHits() {
  if (!appState.forcedTiles) return [];

  return Object.entries(appState.forcedTiles)
    .map(([index, color]) => ({
      index: Number(index),
      color
    }))
    .filter(({ index, color }) =>
      grid[index] === null &&
      color &&
      color !== 'miss' &&
      !isAnonymousRareShip(color)
    );
}

function updateAutoHitsButton() {
  const btn = document.getElementById('autoHitsBtn');
  if (!btn) return;

  const count = getAutoFillForcedHits().length;

  btn.disabled = count === 0;
  btn.textContent = count > 0 ? `Fill Hits (${count})` : 'Fill Hits';

  const hasNewForcedHits = count > lastAutoFillHitCount;

  btn.classList.toggle('pulse', hasNewForcedHits && count > 0);

  lastAutoFillHitCount = count;
}

function isGameOver() {
  const gameOver = currentMode === MODE.GAME_OVER;
  return gameOver;
}

function canPlaceColor() {
  const hasColor = !!selectedColor;
  const hasRareConfig = rareCount !== null;

  return hasColor && hasRareConfig;
}

function resetModeAndCache() {
  currentMode = MODE.NORMAL;
  clearPlacementsCache();
  
  appState.specialGroup = null;
  appState.forcedTiles = null;
  appState.collapseMove = null;
appState.noEquivalencePlan = null;
appState.uncertaintyMove = null;
appState.clarityMove = null;
}

function ensureConfigLocked() {
  if (configLocked) return;

  configLocked = true;
  lockConfigUI();
}

function saveHistorySnapshot(snapshot = createHistorySnapshot()) {
  history.push(snapshot);
}

function createHistorySnapshot() {
  return {
    grid: [...grid],
    rareCount,
    forcedStartMode,
    appState: deepClone(appState),
    currentMode
  };
}

function deepClone(obj) {
  if (obj === null || obj === undefined) return obj;

  return {
    ...obj,

    probs: obj.probs ? [...obj.probs] : null,

    topMoves: obj.topMoves
      ? obj.topMoves.map(move => ({ ...move }))
      : null,

    specialGroup: obj.specialGroup
      ? {
          ...obj.specialGroup,
          tiles: obj.specialGroup.tiles
            ? [...obj.specialGroup.tiles]
            : obj.specialGroup.tiles
        }
      : null,

    forcedTiles: obj.forcedTiles
      ? { ...obj.forcedTiles }
      : obj.forcedTiles,

    collapseMove: obj.collapseMove
      ? { ...obj.collapseMove }
      : obj.collapseMove,

allBoards: obj.allBoards
  ? obj.allBoards.map(board =>
      isMaskBoard(board)
        ? {
            __maskBoard: true,
            hitMask: board.hitMask,
            colorMasks: { ...board.colorMasks }
          }
        : [...board]
    )
  : obj.allBoards,

    winStrategy: obj.winStrategy
      ? {
          ...obj.winStrategy,
          line: obj.winStrategy.line
            ? [...obj.winStrategy.line]
            : obj.winStrategy.line
        }
      : obj.winStrategy,

    noEquivalencePlan: obj.noEquivalencePlan
      ? JSON.parse(JSON.stringify(obj.noEquivalencePlan))
      : obj.noEquivalencePlan,

    uncertaintyMove: obj.uncertaintyMove
      ? { ...obj.uncertaintyMove }
      : obj.uncertaintyMove
  };
}

function commitAcceptedMove(move) {
  saveHistorySnapshot(move.historySnapshot);

  recordMove(move.index, move.prevColor, move.newColor);

  const { hits, misses } = getHitMissCounts();
  const tracking = getShipTracking();

  if (shouldEndGameOnMiss({
    newColor: move.newColor,
    hits,
    misses,
    tracking
  })) {
    handleGameOver();
    return;
  }

  finalizePlacement();
}

function finalizePlacement() {
  render();

  appState = createEmptyAppState();

  runSimulation();
  updateColorAvailability();
  renderUI();
}

function handleGameOver() {
  currentMode = MODE.GAME_OVER;

  clearSelectedColor();

  appState = {
    ...createEmptyAppState(),
    guaranteedColors: null
  };

  render();
  renderUI();
}

function shouldEndGameOnMiss({ newColor, hits, misses }) {
  return (
    newColor === 'miss' &&
    hits >= 5 &&
    misses > 3
  );
}

function isValidPlacement(i, prevColor) {
  if (!isStateValid()) {
    grid[i] = prevColor;
    return false;
  }

  for (let s of getShipList()) {
    if (getPlacementsCached(s).length === 0) {
      grid[i] = prevColor;
      return false;
    }
  }

  if (!hasAnyValidBoard()) {
    grid[i] = prevColor;
    return false;
  }

  return true;
}

function createEmptyAppState(){
  return {
    probs: null,
    topMoves: null,
    isTrueEndgame: false,
    isGuaranteed: false,
    specialGroup: null,
	safeOverride: false,
    collapseMove: null,
    noEquivalencePlan: null,
	safeOverrideSource: null,
    clarityMove: null,
    uncertaintyMove: null
  };
}

function clearPlacementsCache() {
  placementsCache = {};
  clearKnownCellsCache();
  clearColorMaskCache();
  gridStatsCache = null;
  outcomeBucketsCache = null;
  tileShipSizesCache = null;
  unfoundBonusCache = null;
tileEVStatsCache = null;
hitCountsCache = null;
rareUnfoundCountsCache = null;
hitMasksCache = null;
equivalenceGroupsCache = null;
precalcContextCache = null;
}

// ===============================
// T.05 VALIDATION
// ===============================

function isStateValid(){
  const { colorCounts, colorMasks } = getGridStats();

  for(let c in SHIPS){
    if(colorCounts[c] > SHIPS[c]) return false;
  }

 let usedRare = 0;
for(const c of RARE_COLORS){
  if(colorCounts[c] > 0) usedRare++;
}

if(rareCount !== null && usedRare > rareCount) return false;

if(
  rareCount !== null &&
  colorCounts.orange === 0 &&
  usedRare >= rareCount
){
  return false;
}

  for(let color in SHIPS){
    const colorMask = colorMasks[color] || 0;

    for(let mask = colorMask; mask; mask &= mask - 1){
      const bit = mask & -mask;
      const i = BIT_INDEX[bit];

      if((DIAGONAL_MASKS[i] & colorMask) !== 0){
        return false;
      }
    }

    const cells = maskToCells(colorMask);

    if(cells.length <= 1) continue;

    let rows = cells.map(i => indexToCoord(i)[0]);
    let cols = cells.map(i => indexToCoord(i)[1]);

    let sameRow = rows.every(r => r === rows[0]);
    let sameCol = cols.every(c => c === cols[0]);

    if(!(sameRow || sameCol)) return false;

    if(sameRow){
      let min = Math.min(...cols);
      let max = Math.max(...cols);
      if(max - min + 1 > getShipSize(color)) return false;
    }

    if(sameCol){
      let min = Math.min(...rows);
      let max = Math.max(...rows);
      if(max - min + 1 > getShipSize(color)) return false;
    }
  }

  return true;
}

function isBoardValid(board, final=false){

  if (!matchesKnownGrid(board)) return false;

  let ships = getShipList();

  for (let color of ships){
    let cells = getBoardCells(board, color);

    if (isRare(color)) {
      if (!validateRareCells(cells, final)) return false;
      continue;
    }

    if (!validateShipSize(cells, color, final)) return false;
    if (!validateNoDiagonalTouch(board, cells, color)) return false;
    if (!validateLineShape(board, cells, color)) return false;
  }

  return true;
}

function matchesKnownGrid(board){
  for(let i=0;i<25;i++){
    if(grid[i] && grid[i] !== 'miss'){
      if(board[i] !== grid[i]) return false;
    }
    if(grid[i] === 'miss'){
      if(board[i]) return false;
    }
  }
  return true;
}

function getBoardCells(board, color){
  const cells = [];
for (let i = 0; i < 25; i++) {
  if (board[i] === color) cells.push(i);
}
return cells;
}

function isRare(color){
  return RARE_COLORS.includes(color);
}

function validateRareCells(cells, final){
  if(final && cells.length !== 2) return false;
  if(!final && cells.length > 2) return false;
  return true;
}

function validateShipSize(cells, color, final){
  if(final){
    if(cells.length === 0) return true;
    return cells.length === getShipSize(color);
  }
  return cells.length <= getShipSize(color);
}

function validateNoDiagonalTouch(board, cells, color){
  for(let i of cells){
for (let ni of DIAGONALS[i]) {
  if (board[ni] === color) return false;
}
  }
  return true;
}

function validateLineShape(board, cells, color){
  if(cells.length <= 1) return true;

  let coords = cells.map(i=>indexToCoord(i));
  let rows = coords.map(x=>x[0]);
  let cols = coords.map(x=>x[1]);

  let sameRow = rows.every(r=>r===rows[0]);
  let sameCol = cols.every(c=>c===cols[0]);

  if(!(sameRow||sameCol)) return false;

  if(sameRow){
    let r=rows[0];
    let min=Math.min(...cols);
    let max=Math.max(...cols);

    for(let c=min;c<=max;c++){
      if(board[coordToIndex(r,c)] !== color) return false;
    }

    return (max-min+1) === cells.length;
  }

  if(sameCol){
    let c=cols[0];
    let min=Math.min(...rows);
    let max=Math.max(...rows);

    for(let r=min;r<=max;r++){
      if(board[coordToIndex(r,c)] !== color) return false;
    }

    return (max-min+1) === cells.length;
  }

  return true;
}

function hasAnyValidBoard(){
  let ships = getShipList();

  let placementsMap = {};
  for(let s of ships){
    let p = getPlacementsCached(s);
    if(p.length === 0) return false;
    placementsMap[s] = p;
  }

  let board = Array(25).fill(null);
  const knownMissMask = getKnownMissMask();

  function dfs(index, occupiedMask = 0){
    if(index === ships.length){
      return isBoardValid(board, true);
    }

    let ship = ships[index];

    for(let opt of placementsMap[ship]){
      const placementMask = opt.mask;

      if((placementMask & knownMissMask) !== 0) continue;
      if((placementMask & occupiedMask) !== 0) continue;

      const cells = placementCells(opt);

for (const i of cells) {
  board[i] = ship;
}

if(dfs(index + 1, occupiedMask | placementMask)) return true;

for (const i of cells) {
  board[i] = null;
}
    }

    return false;
  }

  return dfs(0);
}

// ===============================
// T.06 SHIP PLACEMENT
// ===============================

function isAnonymousRareShip(ship){
  return !!ship && ship.startsWith('rare_');
}

function getShipSize(color){
  if(color.startsWith('rare_')) return 2;
  return SHIPS[color];
}

function getShipList(){
  let ships = ['teal','green','yellow'];

  let used = getUsedRare();

  if (!used.includes('orange')) {
    used = ['orange', ...used];
  }

  let remaining = Math.max(0, rareCount - used.length);

  ships.push(...used);

  for(let i = 0; i < remaining; i++){
    ships.push(`rare_${i}`);
  }

  return ships;
}

function isFirstAnonymousRareInList(ship, remainingShips){
  if(!isAnonymousRareShip(ship)) return true;

  for(const s of remainingShips){
    if(isAnonymousRareShip(s)){
      return s === ship;
    }
  }

  return true;
}

function getKnownCells(color){
  if(color.startsWith('rare_')) return [];

  const mask = getGridStats().colorMasks[color] || 0;
  const cells = [];

  for(let i = 0; i < 25; i++){
    if(mask & cellMask(i)) cells.push(i);
  }

  return cells;
}

function getDirectionConstraint(cells){
  if(cells.length < 2) return 'any';
  let rows=cells.map(i=>indexToCoord(i)[0]);
  let cols=cells.map(i=>indexToCoord(i)[1]);
  if(rows.every(r=>r===rows[0])) return 'horizontal';
  if(cols.every(c=>c===cols[0])) return 'vertical';
  return 'any';
}

function getValidPlacements(color){
const size = getShipSize(color);
const known = getKnownCellsCached(color);
const direction = getDirectionConstraint(known);

const placements = [];

for(const placement of RAW_PLACEMENTS[size]){
  const { cells, horiz } = placement;

  if(!respectsDirection(direction, horiz)) continue;
  if(!respectsKnownMask(placement, color)) continue;
  if(!isPlacementValid(cells, color)) continue;
  if(!passesDiagonalRulePlacement(placement, color)) continue;

  placements.push(placement);
}

  return placements;
}

function respectsDirection(direction, horiz){
  if(direction==='horizontal' && !horiz) return false;
  if(direction==='vertical' && horiz) return false;
  return true;
}

function isPlacementValid(cells, color){
  for(let i of cells){
    if(grid[i] && grid[i] !== 'miss'){
      if(color.startsWith('rare_')) return false;
      if(grid[i] !== color) return false;
    }
  }
  return true;
}

function passesDiagonalRulePlacement(placement, color){
  const colorMask = getColorMaskCached(color);

  return (placement.diagonalMask & colorMask) === 0;
}

function getPlacementsCached(color){
  if(!placementsCache[color]){
    placementsCache[color] = getValidPlacements(color);
  }
  return placementsCache[color];
}

// ===============================
// T.07 GAME STATE
// ===============================

function getDefaultModeForRareCount(n) {
  return n <= 3 ? "safe" : "aggressive";
}

function getFoundColors(){
  return getGridStats().foundColors;
}

function getGamePhase(){
  const { hits, misses } = getHitMissCounts();
  const foundColors = getFoundShipColorCount();

  if(hits < 5 && foundColors < 3){
    return "early";
  }

  if(hits >= 5 || misses >= 2 || foundColors >= 5){
    return "late";
  }

  return "mid";
}

function isEarlyGame(){
  const { hits, misses } = getHitMissCounts();
  const foundColors = getFoundShipColorCount();

  return hits < 5 && foundColors < 3;
}

function getFoundShipColorCount(){
  return getFoundColors().size;
}

function isNormalMode() {
  return currentMode === MODE.NORMAL;
}

function getGameContext() {
  const { hits, misses } = getHitMissCounts();

  const naturalAggressive = hits >= 5 && misses >= 3;
  const defaultMode = getDefaultModeForRareCount(rareCount);
  const mode = forcedStartMode || defaultMode;

  const huntMode =
    mode === "aggressive" ||
    naturalAggressive;

  return {
    hits,
    misses,
    huntMode
  };
}

function getHitMissCounts() {
  const { hits, misses } = getGridStats();
  return { hits, misses };
}

function getShipTracking(){
  const { colorCounts } = getGridStats();

  let incomplete = 0;

  for(let color in SHIPS){
    const count = colorCounts[color] || 0;

    if(count > 0 && count < getShipSize(color)){
      incomplete++;
    }
  }

  let ships = getShipList();
  let used = {};

  ships.forEach(s=>{
    used[s] = (used[s] || 0) + 1;
  });

  let unfound = 0;

  for(let ship in used){
    let placed = colorCounts[ship] || 0;

    if(placed === 0){
      unfound += used[ship];
    }
  }

  return { incomplete, unfound };
}

function getRemainingBlueTiles(){
  const totalCells = 25;

  let shipCells = 0;
  for(let color in SHIPS){
    shipCells += getShipSize(color);
  }

  let totalShips = 0;
  let ships = getShipList();

ships.forEach(s => {
  totalShips += getShipSize(s);
});

  const totalBlue = totalCells - totalShips;

  const { misses: currentMisses } = getHitMissCounts();

  return totalBlue - currentMisses;
}

function getUsedRare(){
  const { colorCounts } = getGridStats();

  return RARE_COLORS.filter(c => colorCounts[c] > 0);
}

function getPartialShipTiles(){
  let partialTiles = new Set();
  const { occupiedMask, missMask } = getGridStats();
  const knownMask = occupiedMask | missMask;

  for(let color in SHIPS){
    if(getShipSize(color) !== 2) continue;

    let known = getKnownCellsCached(color);

    if(known.length === 1){
      let placements = getPlacementsCached(color);

      placements.forEach(p => {
        const unknownPlacementMask = p.mask & ~knownMask;

        for(let mask = unknownPlacementMask; mask; mask &= mask - 1){
          const bit = mask & -mask;
          partialTiles.add(BIT_INDEX[bit]);
        }
      });
    }
  }

  return partialTiles;
}

// ===============================
// T.08 SIMULATION 
// ===============================

function runSimulation(){

  if (shouldSkipSimulation()) return;

  if (handleFullBoard()) return;

  if (!ensureNormalMode()) return;

  prepareSimulation();

  if (!validateStateOrAbort()) return;

  const context = buildSimulationContext();

  if (handleForcedModes(context)) return;

  resetHeatmapUI();

  if (rareCount === null) return;

  if (shouldRunExactSolver(context)) {
    runExactSolver();
    return;
  }

  const result = runMonteCarlo(context);

  finalizeSimulation(result);
}

function shouldSkipSimulation() {
  const isGameOverMode = currentMode === MODE.GAME_OVER;
  return isLoadingHash || isGameOverMode;
}

function handleFullBoard() {
  const isFull = grid.every(cell => cell !== null);
  if (!isFull) return false;

  currentMode = MODE.TOUCH_GRASS;
  appState = createEmptyAppState();

  renderUI();
  return true;
}

function ensureNormalMode() {
  const isNormal = currentMode === MODE.NORMAL;

  if (!isNormal) {
    clearPlacementsCache();
    return false;
  }

  return true;
}

function prepareSimulation() {
  lastSpecialGroup = null;
  lastGuaranteed = false;
  
  appState.specialGroup = null; 
  appState.forcedTiles = null;
  
  clearRecommendations();
}

function validateStateOrAbort() {
  if (isLoadingHash) return false;

  const hasStarted = grid.some(cell => cell !== null);
  if (!hasStarted) return false;

  const valid = isStateValid();

  if (!valid) {
    appState = createEmptyAppState();
    showError("Current board is invalid.");
    return false;
  }

  return true;
}

function buildSimulationContext() {
  const { hits, misses, huntMode } = getGameContext();

  let placedTiles = 0;
  for(let i = 0; i < 25; i++){
    if(grid[i] !== null) placedTiles++;
  }

  const remainingBlue = getRemainingBlueTiles();
  const tracking = getShipTracking();

  return {
    hits,
    misses,
    huntMode,
    remainingBlue,
    tracking,
    placedTiles
  };
}

function handleForcedModes(ctx) {
  const noBlueRemaining = ctx.remainingBlue === 0;
  const allShipsDone =
    ctx.tracking.incomplete === 0 &&
    ctx.tracking.unfound === 0;

  if (!ctx.huntMode && noBlueRemaining) {
    currentMode = MODE.ALL_HITS;
    appState = createEmptyAppState();
    renderUI();
    return true;
  }

  if (ctx.huntMode && allShipsDone) {
    currentMode = MODE.ALL_MISSES;
    appState = createEmptyAppState();
    renderUI();
    return true;
  }

  return false;
}

function resetHeatmapUI() {
  const heat = DOM.heatmap;

  for (let i = 0; i < 25; i++) {
    setBackgroundIfChanged(heat[i], '');
    setTextIfChanged(heat[i], '');
  }
}

function shouldRunExactSolver(ctx) {
  let exactThreshold = 5;

  if (rareCount === 4) {
    exactThreshold = 3;
  } else if (rareCount === 3) {
    exactThreshold = 3;
  } else if (rareCount <= 2) {
    exactThreshold = 2;
  }

  return ctx.placedTiles >= exactThreshold;
}

// ===============================
// T.09 MCMC
// ===============================

function runMonteCarlo(ctx) {
  appState.forcedTiles = null;

  const counts = Array(25).fill(0);
  let valid = 0;
  let attempts = 0;
  const seen = new Set();

  const NUM_CHAINS =
    ctx.placedTiles >= 4 ? 2 : 4;

  const MAX_ATTEMPTS = 7000;
  const TARGET_VALID = 4000;

  const ships = prepareSortedShips();
  const placementsMap = buildPlacementsMap(ships);

  if (!placementsMap) {
    return { counts, valid, attempts };
  }

  while (attempts < MAX_ATTEMPTS && valid < TARGET_VALID) {
    attempts++;

    const chains = initializeChains(ships, placementsMap, NUM_CHAINS);
    if (chains.length === 0) continue;

    runMCMCLoops(chains, ships, placementsMap);

    valid += collectSamples(chains, counts, seen, valid);
  }

  return { counts, valid, attempts };
}

function backtrackPlace(ships, placementsMap, index, board, occupiedMask = 0){
  if(index === ships.length) return true;

  let ship = ships[index];
  let options = shuffle([...placementsMap[ship]]);

  for(let opt of options){
    const cells = placementCells(opt);
    const placementMask = opt.mask;

if(index > 0 && getShipType(ships[index]) === getShipType(ships[index-1])){
  let prevShip = ships[index-1];
  let minPrev = Infinity;

  for(let i = 0; i < 25; i++){
    if(board[i] === prevShip){
      minPrev = i;
      break;
    }
  }

  if(minPrev !== Infinity){
    let minCurr = placementKey(opt);

    if(minCurr < minPrev) continue;
  }
}

    if(placementMask & occupiedMask) continue;

    for (const i of cells) {
  board[i] = ship;
}

    if(backtrackPlace(
      ships,
      placementsMap,
      index + 1,
      board,
      occupiedMask | placementMask
    )) {
      return true;
    }

    for (const i of cells) {
  board[i] = null;
}
  }

  return false;
}

function finalizeSimulation({ counts, valid, attempts }) {
  const probs = counts.map(c => (valid ? c / valid : 0));

appState = {
  ...createEmptyAppState(),
  probs
};

  DOM.confidence.textContent =
    `Valid boards: ${valid} (in ${attempts} chains)`;
}

function mcmcStep(board, ships, placementsMap){
  let newBoard = [...board];

  let k = 2 + Math.floor(Math.random() * 2);
  let chosen = shuffle([...ships]).slice(0, k);

  let occupiedMask = boardToMask(newBoard);
  let shipMasks = buildShipMasks(newBoard);

  for(let ship of chosen){
    let known = getKnownCellsCached(ship);
    let knownMask = cellsToMask(known);

    for(let i=0;i<25;i++){
      if(newBoard[i] === ship && !(knownMask & cellMask(i))){
        const mask = cellMask(i);

        newBoard[i] = null;
        occupiedMask &= ~mask;
        shipMasks[ship] &= ~mask;
      }
    }

    let options = shuffle([...placementsMap[ship]]);

    for(let opt of options){
      if(
        !canPlaceWithSameShipOverlap(
          opt,
          ship,
          occupiedMask,
          shipMasks
        )
      ){
        continue;
      }

      const cells = placementCells(opt);
      const placementMask = opt.mask;

      for (const i of cells) {
  newBoard[i] = ship;
}

      occupiedMask |= placementMask;
      shipMasks[ship] = (shipMasks[ship] || 0) | placementMask;

      break;
    }
  }

  return newBoard;
}

function scoreBoard(board){
  let score = 0;

  for(let i = 0; i < 25; i++){
    if(grid[i] && grid[i] !== 'miss'){
      if(board[i] === grid[i]) score += 3;
      else score -= 10;
    }

    if(grid[i] === 'miss' && board[i]){
      score -= 10;
    }
  }

  return score;
}

function initializeChains(ships, placementsMap, numChains) {
  const chains = [];

  for (let c = 0; c < numChains; c++) {
    const board = Array(25).fill(null);

    if (!backtrackPlace(ships, placementsMap, 0, board)) continue;

    chains.push({
      board,
      temperature: 0.7 + Math.random() * 0.6
    });
  }

  return chains;
}

function getShipType(ship){
  return ship.startsWith('rare_') ? 'rare' : ship;
}

function runMCMCLoops(chains, ships, placementsMap) {
  const STEPS = 30;
  const COOLING = 0.98;

  for (let step = 0; step < STEPS; step++) {
    for (let chain of chains) {
      const newBoard = mcmcStep(chain.board, ships, placementsMap);
      const oldScore = chain.score ?? scoreBoard(chain.board);
      const newScore = scoreBoard(newBoard);

      if (newScore >= oldScore) {
        chain.board = newBoard;
        chain.score = newScore;
      } else {
        const prob = Math.exp((newScore - oldScore) / chain.temperature);
        if (Math.random() < prob) {
          chain.board = newBoard;
          chain.score = newScore;
        }
      }

      chain.temperature *= COOLING;
    }
  }
}

function collectSamples(chains, counts, seen, validSoFar) {
  let newValid = 0;

  for (let chain of chains) {
    const board = chain.board;

    if (
  validSoFar > 0 &&
  validSoFar % 500 === 0 &&
  !isBoardValid(board, true)
) continue;

    const key = boardKey(board);
    if (seen.has(key)) continue;

    seen.add(key);
    newValid++;

    for (let i = 0; i < 25; i++) {
      if (board[i]) counts[i]++;
    }
  }

  return newValid;
}

// ===============================
// T.10 EXACT SOLVER
// ===============================

function runExactSolver() {

  resetExactSolverState();
  appState.forcedTiles = null;

  const { ships, placementsMap } = prepareExactSolver();
  if (!ships) return;

  const { counts, valid, allBoards } =
    enumerateAllBoards(ships, placementsMap);

const probs = computeProbabilities(counts, valid);

const exactCaches = buildExactCaches(allBoards);

outcomeBucketsCache = exactCaches.outcomeBuckets;
tileShipSizesCache = exactCaches.tileShipSizes;
unfoundBonusCache = exactCaches.unfoundBonus;
tileEVStatsCache = exactCaches.tileEVStats;
hitCountsCache = exactCaches.hitCounts;
rareUnfoundCountsCache = exactCaches.rareUnfoundCounts;
hitMasksCache = exactCaches.hitMasks;
equivalenceGroupsCache = exactCaches.equivalenceGroups;

appState.allBoards = allBoards;
appState.probs = probs;

appState.forcedTiles = computeForcedTiles(allBoards);

renderSelectedHeatmap();

if (handleGuaranteedMove(probs, allBoards)) {
  updateExactSolverUI(valid);
  return;
}

if (handleTwoBoardEndgame(valid, probs, allBoards)) {
  updateExactSolverUI(valid);
  return;
}

const effectiveUnknownTiles = getEffectiveUnknownTilesForPrecalc();

if (
  allBoards.length <= PRECALC_BOARD_LIMIT &&
  effectiveUnknownTiles.length <= PRECALC_UNKNOWN_TILE_LIMIT
) {
  const noEquivalencePlan = findNoEquivalenceStrategy(allBoards, probs);

  if (noEquivalencePlan && noEquivalencePlan.length) {
    applyNoEquivalencePlan(noEquivalencePlan, probs, allBoards);
    updateExactSolverUI(valid);
    return;
  }

  appState.uncertaintyMove =
    getBestUncertaintyRemovalMove(allBoards, probs);
}

const analysis = analyzeEquivalence(allBoards, probs);
analysis.collapseMove = getBestTwoStepCollapseMove(allBoards, probs);

const { huntMode } = getGameContext();

let normalClarityMove = null;

const { hits, misses } = getHitMissCounts();

if (
  !huntMode &&
  hits >= 4 &&
  misses < 2 &&
  !appState.isGuaranteed &&
  !appState.isTrueEndgame
) {

normalClarityMove = getSafeModeProgressMove(allBoards, probs, {
  requireGuaranteedBlue: false,
  minBlueChance: 0,
  maxBluePenalty: 1,
  minClarityGain: 1.0
});

  if (normalClarityMove) {
    appState.safeOverride = false;
    appState.safeOverrideSource = "generalClarity";
    appState.clarityMove = normalClarityMove;
  }
}

const bestProb = analysis.bestGroup.length
  ? probs[analysis.bestGroup[0]]
  : null;

if (
  !shouldForceHeuristics() &&
  huntMode &&
  !isEarlyGame() &&
  analysis.bestGroup.length >= 2 &&
  bestProb < 1
) {
  applyEquivalenceResult(analysis, probs);
  updateExactSolverUI(valid);
  return;
}

applyEquivalenceResult(analysis, probs);

updateExactSolverUI(valid);
}

function resetExactSolverState() {
  lastSpecialGroup = null;
  lastGuaranteed = false;
}

function prepareExactSolver() {
  const ships = prepareSortedShips();

  const placementsMap = {};

  for (const ship of ships) {
    const placements = getPlacementsCached(ship);

    if (placements.length === 0) return {};

    placementsMap[ship] = placements;
  }

  return { ships, placementsMap };
}

function getEquivalenceGroups(allBoards){
  if (allBoards === appState.allBoards && equivalenceGroupsCache) {
    return equivalenceGroupsCache;
  }

  const hitMasks = allBoards.map(boardToMask);
  return buildEquivalenceGroupsFromHitMasks(hitMasks);
}

function canPlaceShip(
  board,
  placement,
  ship,
  occupiedMask,
  knownMissMask,
  shipMasks = {}
){
  const mask = placement.mask;
  const shipMask = shipMasks[ship] || 0;

  if((mask & knownMissMask) !== 0) return false;
  if((mask & occupiedMask) !== 0) return false;

  if((placement.diagonalMask & shipMask) !== 0) return false;

  return true;
}

function getLegalPlacementsForShip(
  ship,
  placements,
  board,
  occupiedMask,
  knownMissMask,
  lastRarePlacementKey,
  remainingShips,
  shipMasks
){
  if(!isFirstAnonymousRareInList(ship, remainingShips)){
    return null;
  }

  const isAnonymousRare = isAnonymousRareShip(ship);
  const legal = [];

  for(const placement of placements){
    const keyForPlacement = placementKey(placement);

    if(
      isAnonymousRare &&
      keyForPlacement < lastRarePlacementKey
    ){
      continue;
    }

if(
  canPlaceShip(
    board,
    placement,
    ship,
    occupiedMask,
    knownMissMask,
    shipMasks
  )
){
  legal.push(placement);
}
  }

  return legal;
}

function buildExactCaches(allBoards) {
  const outcomeBuckets = Array.from({ length: 25 }, () => ({}));
  const tileSizeShipSets = Array.from({ length: 25 }, () => ({}));
  const unfoundCounts = Array.from({ length: 25 }, () => ({}));
  const tileEVTotals = Array(25).fill(0);
const tileHitEVTotals = Array(25).fill(0);
const tileHitCounts = Array(25).fill(0);
const hitMasks = [];
const hitCounts = Array(25).fill(0);
const rareUnfoundCounts = Array(25).fill(0);

  const foundColors = getFoundColors();

  for (const board of allBoards) {
    const hitMask = boardToMask(board);

    for (let i = 0; i < 25; i++) {
      const color = getBoardColorAt(board, i);
      const key = color || 0;

      if (!outcomeBuckets[i][key]) {
        outcomeBuckets[i][key] = 0;
      }

      outcomeBuckets[i][key]++;

      tileEVTotals[i] += getOutcomeEV(color);

if (!color) continue;

hitCounts[i]++;

if (
  isRareShipId(color) &&
  (
    isAnonymousRareShip(color) ||
    !foundColors.has(color)
  )
) {
  rareUnfoundCounts[i]++;
}

tileHitEVTotals[i] += getOutcomeEV(color);
tileHitCounts[i]++;

      if (grid[i]) continue;

      const size = getShipSize(color);

      if (!tileSizeShipSets[i][size]) {
        tileSizeShipSets[i][size] = new Set();
      }

      tileSizeShipSets[i][size].add(color);

      if (
        !isRareShipId(color) &&
        !foundColors.has(color)
      ) {
        unfoundCounts[i][color] =
          (unfoundCounts[i][color] || 0) + 1;
      }
    }

    hitMasks.push(hitMask);
  }

  const tileShipSizes = {};
  const unfoundBonus = Array(25).fill(0);
  const tileEVStats = {};

  for (let i = 0; i < 25; i++) {
    if (grid[i]) continue;

    tileShipSizes[i] = expandTileSizeShipSets(tileSizeShipSets[i]);

    tileEVStats[i] = {
      avgHitEV: tileHitCounts[i]
        ? tileHitEVTotals[i] / tileHitCounts[i]
        : 0,
      weightedEV: allBoards.length
        ? tileEVTotals[i] / allBoards.length
        : 0
    };

    for (const color in unfoundCounts[i]) {
      unfoundBonus[i] += unfoundCounts[i][color] / allBoards.length;
    }
  }

return {
  outcomeBuckets,
  tileShipSizes,
  unfoundBonus,
  tileEVStats,
  hitCounts,
  rareUnfoundCounts,
  hitMasks,
  equivalenceGroups: buildEquivalenceGroupsFromHitMasks(hitMasks)
};
}

function getOutcomeEV(color) {
  if (!color) return TILE_EV.miss;

  if (TILE_EV[color] !== undefined) {
    return TILE_EV[color];
  }

  if (isAnonymousRareShip(color)) {
    return getAverageUnfoundRareEV();
  }

  return 0;
}

function getAverageUnfoundRareEV() {
  const foundColors = getFoundColors();

  const availableRareColors = RARE_COLORS.filter(color =>
    !foundColors.has(color)
  );

  if (!availableRareColors.length) return 0;

  const total = availableRareColors.reduce(
    (sum, color) => sum + TILE_EV[color],
    0
  );

  return total / availableRareColors.length;
}

function getTileEVStats(allBoards) {
  if (allBoards === appState.allBoards && tileEVStatsCache) {
    return tileEVStatsCache;
  }

  return buildTileEVStats(allBoards);
}

function buildTileEVStats(allBoards) {
  const stats = {};

  for (let i = 0; i < 25; i++) {
    if (grid[i]) continue;

    let totalEV = 0;
    let hitEV = 0;
    let hitCount = 0;

    for (const board of allBoards) {
      const color = getBoardColorAt(board, i);
      const ev = getOutcomeEV(color);

      totalEV += ev;

      if (color) {
        hitEV += ev;
        hitCount++;
      }
    }

    stats[i] = {
      avgHitEV: hitCount ? hitEV / hitCount : 0,
      weightedEV: allBoards.length ? totalEV / allBoards.length : 0
    };
  }

  return stats;
}

function getCachedBuckets(boardSet, tile, ctx) {
  const key = tile + "|" + boardSet.toString(36);

  if (ctx.bucketCache.has(key)) {
    return ctx.bucketCache.get(key);
  }

  const buckets = bucketBoardSetByOutcome(boardSet, tile, ctx);

  ctx.bucketCache.set(key, buckets);

  return buckets;
}

function getPrecalcContext(allBoards) {
  if (allBoards === appState.allBoards && precalcContextCache) {
    return precalcContextCache;
  }

  const ctx = buildPrecalcContext(allBoards);

  if (allBoards === appState.allBoards) {
    precalcContextCache = ctx;
  }

  return ctx;
}

function buildPrecalcContext(allBoards) {
  let allBoardSet = 0n;

  const hitMasks = [];
  const tileHitBoardSets = Array(25).fill(0n);
  const outcomeBoardSetsByTile = Array.from(
    { length: 25 },
    () => ({})
  );

  for (let b = 0; b < allBoards.length; b++) {
    const board = allBoards[b];
    const boardBit = 1n << BigInt(b);

    allBoardSet |= boardBit;

    let hitMask = 0;

    for (let i = 0; i < 25; i++) {
      const color = getBoardColorAt(board, i);
      const outcome = color || 0;

      if (!outcomeBoardSetsByTile[i][outcome]) {
        outcomeBoardSetsByTile[i][outcome] = 0n;
      }

      outcomeBoardSetsByTile[i][outcome] |= boardBit;

      if (color) {
        hitMask |= cellMask(i);
        tileHitBoardSets[i] |= boardBit;
      }
    }

    hitMasks[b] = hitMask;
  }

const { huntMode } = getGameContext();

return {
  allBoardSet,
  hitMasks,
  tileHitBoardSets,
  outcomeBoardSetsByTile,
  huntMode,
  forceHeuristics: shouldForceHeuristics(),
  earlyGame: isEarlyGame(),
  bitCountCache: new Map(),
  splitScoreCache: new Map(),
  bucketCache: new Map(),
  unknownTilesCache: new Map()
};
}

function getBoardSetCount(boardSet, ctx) {
  const key = boardSet.toString(36);

  if (ctx.bitCountCache.has(key)) {
    return ctx.bitCountCache.get(key);
  }

  const count = bitCountBigInt(boardSet);

  ctx.bitCountCache.set(key, count);

  return count;
}

function bitCountBigInt(value) {
  let count = 0;

  while (value !== 0n) {
    value &= value - 1n;
    count++;
  }

  return count;
}

function getTileSplitScoreForBoardSet(tile, boardSet, ctx) {
  const key = tile + "|" + boardSet.toString(36);

  if (ctx.splitScoreCache.has(key)) {
    return ctx.splitScoreCache.get(key);
  }

  const buckets = getCachedBuckets(boardSet, tile, ctx);

  let score = 0;

  for (const outcome in buckets) {
    const count = getBoardSetCount(buckets[outcome], ctx);
    score += count * count;
  }

  ctx.splitScoreCache.set(key, score);

  return score;
}

function getStrategyCandidatesForBoardSet(
  boardSet,
  knownMask,
  hits,
  misses,
  ctx
) {
  const huntMode = ctx.huntMode;

  );

function dfs(

) {

const stateKey = dfsStateKey(

);

    while (mask) {
      const bit = mask & -mask;
      counts[BIT_INDEX[bit]]++;
      mask &= mask - 1;
    }

    return;
  }

const choice = selectNextShipIndex(
  remainingShips,
  placementsMap,
  board,
  occupiedMask,
  knownMissMask,
  lastRarePlacementKey,
  shipMasks
);

    if(choice.index === -1 || choice.legalCount === 0){

    const ship = remainingShips[choice.index];
const isAnonymousRare = isAnonymousRareShip(ship);

remainingShips.splice(choice.index, 1);

for (const placement of choice.legalPlacements) {
  const keyForPlacement = placementKey(placement);

  shipMasks[ship] = prevShipMask | placementMask;

  dfs(
    remainingShips,

  );

  if (prevShipMask !== 0) {

}

remainingShips.splice(choice.index, 0, ship);

if (valid === validBefore) {

  }

}

if (keys.length === 1) {

function findNoEquivalenceStrategy(allBoards, probs) {
  const knownMask = getCurrentKnownMask();
  const { hits, misses } = getHitMissCounts();

  const ctx = buildPrecalcContext(allBoards);

const memo = new Map();

for (let depthLimit = 1; depthLimit <= PRECALC_MAX_DEPTH; depthLimit++) {

const plan = searchNoEquivalenceStrategy(
  ctx.allBoardSet,
  knownMask,
  hits,
  misses,
  0,
  depthLimit,
  memo,
  ctx
);

        if (plan && plan.length) return plan;

function searchNoEquivalenceStrategy(
  boardSet,
  knownMask,
  hits,
  misses,
  depth,
  depthLimit,
  memo,
  ctx
) {
  const boardCount = getBoardSetCount(boardSet, ctx);

  if (boardCount <= 1) {
    return [];
  }

  if (wouldTriggerEquivalenceForBoardSet(boardSet, knownMask, ctx)) {
    return null;
  }

  if (depth >= depthLimit) {
    return null;
  }

const key =
  boardSet.toString(36) +
  "|" + knownMask +
  "|" + hits +
  "|" + misses +
  "|" + (depthLimit - depth);

  if (memo.has(key)) {
    return memo.get(key);
  }

const candidates = getStrategyCandidatesForBoardSet(
  boardSet,
  knownMask,
  hits,
  misses,
  ctx
).sort((a, b) =>
  getTileSplitScoreForBoardSet(a, boardSet, ctx) -
  getTileSplitScoreForBoardSet(b, boardSet, ctx)
).slice(0, 5);

  for (const tile of candidates) {
    const nextKnownMask = knownMask | cellMask(tile);

    const buckets = bucketBoardSetByOutcome(
      boardSet,
      tile,
      ctx
    );

    const outcomes = Object.keys(buckets);

    if (outcomes.length <= 1) continue;

    let valid = true;
    const branches = {};

    for (const outcome of outcomes) {
      const nextCounts = getNextPathCounts(hits, misses, outcome);

      if (doesPathOutcomeEndGame(hits, misses, outcome)) {
        valid = false;
        break;
      }

      const nextBoardSet = buckets[outcome];

      if (wouldTriggerEquivalenceForBoardSet(nextBoardSet, nextKnownMask, ctx)) {
        valid = false;
        break;
      }

      const branchPlan = searchNoEquivalenceStrategy(
        nextBoardSet,
        nextKnownMask,
        nextCounts.hits,
        nextCounts.misses,
        depth + 1,
        depthLimit,
        memo,
        ctx
      );

      if (!branchPlan) {
        valid = false;
        break;
      }

branches[outcome] = {
  boards: getBoardSetCount(nextBoardSet, ctx),
  plan: branchPlan
};
    }

    if (valid) {
      const plan = [{
        i: tile,
        boards: boardCount,
        branches
      }];

      memo.set(key, plan);
      return plan;
    }
  }

  memo.set(key, null);
  return null;
}

function computeProbabilitiesForKnownMask(boards, knownMask) {

function buildEquivalenceGroupsForKnownMask(boards, knownMask) {

        ) {

      }

      if (samePattern) {
        matchedGroup = group;

      }

function scoreEquivalenceReductionMove(boards, tile, knownMask) {
  const buckets = bucketBoardsByOutcome(boards, tile);
  const total = boards.length;
  const nextKnownMask = knownMask | cellMask(tile);

  let equivalencePressure = 0;
  let expectedRemaining = 0;

  for (const outcome in buckets) {
    const nextBoards = buckets[outcome];
    const weight = nextBoards.length / total;

    equivalencePressure +=
      weight *
      measureEquivalencePressure(nextBoards, nextKnownMask);

    expectedRemaining +=
      weight *
      nextBoards.length;
  }

  return {
    i: tile,
    equivalencePressure,
    expectedRemaining
  };
}

function measureEquivalencePressure(boards, knownMask) {
  const probs = computeProbabilitiesForKnownMask(boards, knownMask);
  const groups = buildEquivalenceGroupsForKnownMask(boards, knownMask);

  let pressure = 0;

  for (const group of groups) {
    if (group.length < 2) continue;
    if (probs[group[0]] >= 1) continue;

    pressure += group.length * boards.length;
  }

  return pressure;
}

function scoreCollapseForTile(allBoards, tile, probs) {
  if (!scoreCollapseForTile._cache) {
    scoreCollapseForTile._cache = new WeakMap();

  let boardCache = scoreCollapseForTile._cache.get(allBoards);

  if (!boardCache) {
    boardCache = new Map();
    scoreCollapseForTile._cache.set(allBoards, boardCache);

  if (boardCache.has(tile)) {
    return boardCache.get(tile);
  }

  let buckets =
    allBoards === appState.allBoards
      ? outcomeBucketsCache?.[tile]
      : null;

  if (!buckets) {
    buckets = {};

    for (const board of allBoards) {
      const key = getOutcomeKey(board, tile);

      if (!buckets[key]) buckets[key] = 0;
      buckets[key]++;
    }
  }

  let expectedRemaining = 0;

  for (const key in buckets) {
    const count = buckets[key];
    const p = count / allBoards.length;

    expectedRemaining += p * count;
  }

  const result = {

    expectedRemaining,
    buckets
  };

function analyzeEquivalence(allBoards, probs) {
  const groups = getEquivalenceGroups(allBoards);

  const groupData = groups.map(group => ({
    group,
    p: probs[group[0]]
  }));

  const maxP = Math.max(...groupData.map(g => g.p));

  const bestGroup = groupData
    .filter(g => g.p === maxP)
    .flatMap(g => g.group);

  const tileShipSizes = getTileShipSizes(allBoards);
  const tileEVStats = getTileEVStats(allBoards);
  const partialTiles = getPartialShipTiles();

  const size2Tiles = Object.keys(tileShipSizes)
    .map(i => parseInt(i))
    .filter(i => {
      if(grid[i] !== null) return false;
      if(bestGroup.includes(i)) return false;

      const isSize2 = tileShipSizes[i].includes(2);
      if(!isSize2) return false;

      if(partialTiles.has(i)) return true;

      return probs[i] >= 0.65;
    });

  return {
    bestGroup,
    groups,
    probs,
    allBoards,
    shipMap: tileShipSizes,
    evMap: tileEVStats,
    size2Tiles
  };
}

function getTileShipSizes(allBoards){
  if (allBoards === appState.allBoards && tileShipSizesCache) {
    return tileShipSizesCache;
  }

  return buildTileShipSizes(allBoards);
}

function applyEquivalenceResult(data, probs) {
  const { huntMode } = getGameContext();

  const isSymmetric =
    huntMode && data.bestGroup.length >= 2;

  appState.probs = probs;
  appState.topMoves = null;
  appState.isTrueEndgame = false;
  appState.isGuaranteed = false;
  appState.collapseMove = data.collapseMove || null;

  if (isSymmetric) {
    appState.specialGroup = {
      tiles: data.bestGroup,
      size2Tiles: data.size2Tiles,
      shipMap: data.shipMap,
      evMap: data.evMap,
      probs,
      collapseMove: data.collapseMove || null
    };
  } else {
    appState.specialGroup = null;
    highlightRecommendations(probs);
  }
}

function makeCollapseScoreGetter(allBoards, probs) {
  const cache = new Map();

  return function(tile) {
    if (!cache.has(tile)) {
      cache.set(tile, scoreCollapseForTile(allBoards, tile, probs));
    }
    return cache.get(tile);
  };
}

function getSafeModeProgressMove(allBoards, probs, options = {}) {
  const {
    requireGuaranteedBlue = true,
    minBlueChance = 0.75,
    maxBluePenalty = 0.04,
    minClarityGain = 2.0
  } = options;

  const unknown = getUnknownTiles();

  const safeBlueChance = i => 1 - probs[i];

  const safestTile = chooseBestSafeCandidate(unknown, allBoards, probs);
  const safestBlueChance = safestTile !== null
    ? safeBlueChance(safestTile)
    : 0;

  const progressTiles = unknown.filter(i => {
    const score = scoreCollapseForTile(allBoards, i, probs);

    if (score.expectedRemaining >= allBoards.length) return false;

    if (requireGuaranteedBlue && safeBlueChance(i) < 1) return false;

    if (!requireGuaranteedBlue) {
      const blueChance = safeBlueChance(i);

      if (blueChance < minBlueChance) return false;
      if (blueChance < safestBlueChance - maxBluePenalty) return false;

      const clarityGain = allBoards.length / score.expectedRemaining;
      if (clarityGain < minClarityGain) return false;
    }

    return true;
  });

  if (!progressTiles.length) return null;

  const partialTiles = getPartialShipTiles();

  const partialCandidates = progressTiles
    .filter(i => partialTiles.has(i));

if (partialCandidates.length) {
  const tile = chooseBestProgressCandidate(partialCandidates, allBoards, probs);

  return withSafeMoveReason(
    makeMoveObject(tile),
    "This tile helps narrow the possible position of an incomplete rare ship."
  );
}

  const rareCandidates = progressTiles
    .map(i => ({
      i,
      rareP: getUnfoundRareProbability(i, allBoards)
    }))
    .filter(x => x.rareP > 0);

if (rareCandidates.length) {
  const getScore = makeCollapseScoreGetter(allBoards, probs);

  let bestRare = null;
  let bestRareP = -Infinity;
  let bestExpectedRemaining = Infinity;

  let baselineExpected = Infinity;

  for (const candidate of rareCandidates) {
    const expectedRemaining =
      getScore(candidate.i).expectedRemaining;

    if (candidate.rareP >= 0.2 && expectedRemaining < baselineExpected) {
      baselineExpected = expectedRemaining;
    }

    if (
      expectedRemaining < bestExpectedRemaining ||
      (
        expectedRemaining === bestExpectedRemaining &&
        candidate.rareP > bestRareP
      )
    ) {
      bestRare = candidate;
      bestRareP = candidate.rareP;
      bestExpectedRemaining = expectedRemaining;
    }
  }
  
  const improvement =
    baselineExpected < Infinity
      ? baselineExpected / bestExpectedRemaining
      : 1;

  if (improvement < 1.6) {
    bestRare = rareCandidates.reduce((best, c) =>
      (c.rareP > (best?.rareP ?? -Infinity)) ? c : best
    , null);
  }

  return withSafeMoveReason(
    makeMoveObject(bestRare.i),
    improvement >= 1.4
      ? `This tile significantly reduces board uncertainty while still offering a ${(bestRare.rareP * 100).toFixed(1)}% rare chance.`
      : `This tile has the best chance to reveal an unfound rare ship (${(bestRare.rareP * 100).toFixed(1)}%).`
  );
}

const tile = chooseBestProgressCandidate(progressTiles, allBoards, probs);
const getScore = makeCollapseScoreGetter(allBoards, probs);
const score = getScore(tile);

return withSafeMoveReason(
  makeMoveObject(tile),
  `This tile reduces board uncertainty the most, from ${allBoards.length} possible boards to about ${score.expectedRemaining.toFixed(1)} expected boards.`
);
}

function withSafeMoveReason(move, reason) {
  return {
    ...move,
    reason
  };
}

function chooseBestProgressCandidate(tiles, allBoards, probs) {
  let bestTile = null;
  let bestScore = Infinity;
  let bestProb = Infinity;

  for (const tile of tiles) {
    const score = scoreCollapseForTile(allBoards, tile, probs).expectedRemaining;
    const p = probs[tile];

    if (
      score < bestScore ||
      (score === bestScore && p < bestProb)
    ) {
      bestTile = tile;
      bestScore = score;
      bestProb = p;
    }
  }

  return bestTile;
}

function chooseBestSafeCandidate(tiles, allBoards, probs) {
  return [...tiles].sort((a, b) => {
    if (probs[a] !== probs[b]) return probs[a] - probs[b];

    return (
      scoreCollapseForTile(allBoards, a, probs).expectedRemaining -
      scoreCollapseForTile(allBoards, b, probs).expectedRemaining
    );
  })[0];
}

function getUnfoundRareProbability(tile, allBoards) {
  const foundColors = getFoundColors();
  let count = 0;

  for (const board of allBoards) {
    const color = getBoardColorAt(board, tile);

    if (!color) continue;

    const isUnfoundRare =
      isAnonymousRareShip(color) ||
      (RARE_COLORS.includes(color) && !foundColors.has(color));

    if (isUnfoundRare) count++;
  }

  return count / allBoards.length;
}

function getCandidateUnfoundColorBonus(tileIndex, allBoards){
  if (allBoards === appState.allBoards && unfoundBonusCache) {
    return unfoundBonusCache[tileIndex] || 0;
  }

  if(!allBoards || allBoards.length === 0) return 0;

  const foundColors = getFoundColors();
  const unfoundHitsByColor = {};

  for(const board of allBoards){
    const color = getBoardColorAt(board, tileIndex);

    if(!color) continue;
    if(isRareShipId(color)) continue;
    if(foundColors.has(color)) continue;

    unfoundHitsByColor[color] =
      (unfoundHitsByColor[color] || 0) + 1;
  }

  let bonus = 0;

  for(const color in unfoundHitsByColor){
    bonus += unfoundHitsByColor[color] / allBoards.length;
  }

  return bonus;
}

function buildCandidates(probs) {
  return probs
    .map((p, i) => {
      const candidate = { p, i };
      const buckets = outcomeBucketsCache?.[i];

      if (buckets && appState.allBoards?.length) {
        let expectedRemaining = 0;

        for (const key in buckets) {
          const count = buckets[key];
          const outcomeChance = count / appState.allBoards.length;

          expectedRemaining += outcomeChance * count;
        }

        candidate.expectedRemaining = expectedRemaining;
      }

      return candidate;
    })
    .filter(c =>
  !grid[c.i] &&
  !(shouldForceHeuristics() && c.p >= 0.999)
);
}

function findGuaranteedMove(candidates, huntMode) {
  const guaranteedHit = candidates.find(c => c.p === 1);
  const guaranteedMiss = candidates.find(c => c.p === 0);

  if(!huntMode){
    return guaranteedMiss;
  }

  if (shouldForceHeuristics()) {
    return null;
  }

  if(isEarlyGame()){
    return null;
  }

  return guaranteedHit;
}

function rankCandidates(candidates, huntMode) {
  const phase = getGamePhase();

  if (!huntMode) {
    const danger = phase === "late";

    candidates.forEach(c => {
      const p = c.p;

      const blueChance = 1 - p;
      const info = 2 * p * (1 - p);

      let score = 0;

      if(danger){
        score += blueChance * 0.9;
        score += info * 0.1;
      } else {
	  
        score += blueChance * 0.45;
        score += info * 0.55;
      }

      score += (c.i % 7) * 0.0001;

      c.score = score;
    });

    candidates.sort((a, b) => b.score - a.score);
    return;
  }

  const partialTiles = getPartialShipTiles();
  const canUseUnfoundBonus = !!appState.allBoards;

  const adjacentCache = {};

  function adjacent(i){
    if(adjacentCache[i] === undefined){
      adjacentCache[i] = isAdjacentToKnown(i);
    }

    return adjacentCache[i];
  }

  const hasNonAdjacentCandidate = candidates.some(c =>
    !adjacent(c.i)
  );

  candidates.forEach(c => {
    const p = c.p;

    const info = 2 * p * (1 - p);
    const blueRisk = 1 - p;

    const unfoundColorBonus = canUseUnfoundBonus
      ? getCandidateUnfoundColorBonus(c.i, appState.allBoards)
      : 0;

    let score = 0;

if(phase === "early"){
  const lowMissAggroExplore =
    huntMode &&
    rareCount >= 4 &&
    getHitMissCounts().misses <= 1;

  if(lowMissAggroExplore){
    score += unfoundColorBonus * 2.5;
    score += info * 1.1;
    score += p * 0.08;
    score -= blueRisk * 0.12;

    if(p >= 0.95){
      score -= 1.0;
    } else if(p >= 0.85){
      score -= 0.45;
    }
  } else {
    score += unfoundColorBonus * 1.2;
    score += info * 0.75;
    score += p * 0.35;
    score -= blueRisk * 0.25;
  }

  if(hasNonAdjacentCandidate && adjacent(c.i)){
    score -= 100;
  }
}

    else if(phase === "mid"){
      score += unfoundColorBonus * 0.8;
      score += info * 0.65;
      score += p * 0.55;
      score -= blueRisk * 0.2;

      if(partialTiles.has(c.i)){
        score -= 0.12;
      }
    }

    else {
      score += p * 0.85;
      score += info * 0.25;
      score += unfoundColorBonus * 0.25;
      score -= blueRisk * 0.1;
    }

    score += (c.i % 7) * 0.0001;

    c.score = score;
  });

  candidates.sort((a, b) => b.score - a.score);
}

function selectTopMoves(candidates, huntMode) {
  let topMoves = candidates.slice(0, 2);

  let safest = !huntMode
    ? [...candidates].sort((a, b) => a.p - b.p)[0]
    : null;

  const best = topMoves[0];

  if (safest && best && safest.i === best.i) {
    topMoves = topMoves.filter(m => m.i !== safest.i);
  }

  topMoves = topMoves.map(m => ({ ...m, type: 'top' }));

  if (safest) {
    safest = { ...safest, type: 'safe' };
  }

  return { topMoves, safest };
}

function updateRecommendationState(probs, topMoves, safest) {
  const allMoves = [...topMoves];
  if (safest) allMoves.push(safest);

  lastProbs = probs;
  lastTopMoves = allMoves;

  appState.probs = probs;
  appState.topMoves = allMoves;
  appState.isGuaranteed = false;
}

  if (appState.safeOverride || appState.isGuaranteed) return;

    (
      context.missEndsGame
        ? null
        : appState.uncertaintyMove
    );

if (grid[move.i] !== null) return;

if (
  appState.uncertaintyMove &&
  move.i === appState.uncertaintyMove.i &&
  !isRareClarifyingTile(move.i)
) {

    appState.uncertaintyMove &&
    move.i === appState.uncertaintyMove.i &&

function getInfoContext() {
  const { hits, misses } = getHitMissCounts();
  const { huntMode } = getGameContext();

  const hasStarted = grid.some(c => c !== null);
  const missEndsGame = hits >= 5 && misses >= 3;

  return { hits, misses, hasStarted, huntMode, missEndsGame };
}

function buildMissEndCard(ctx) {
  if (!ctx.missEndsGame) return "";

  return `
    <div class="info-card info-purple info-alert">
      <div class="info-card-title">Miss Ends The Game</div>
      <div>Any blue tile will end the run.</div>
    </div>
  `;
}

function handleNoEquivalencePlanInfo(messages) {
  const plan = appState.noEquivalencePlan;

  if (!plan || !plan.length) return false;

  const first = plan[0];
  const [r, c] = indexToCoord(first.i);

  messages.push(
    makeCard(
      "No-Equivalence Strategy Found",
      `
        A complete move path was found that avoids equivalence mode.
        This recommendation supersedes normal move ranking.
        <br><br>
        Start with:
        <br>
        <b>Row ${r + 1}, Col ${c + 1}</b>
      `,
      "info-red"
    )
  );

  return true;
}

function getMatchingRecommendationForUncertaintyMove(move) {
  if (!move || move.i === undefined) return null;

  const topMoves = appState.topMoves || [];

  const safeMove = topMoves.find(m => m.type === "safe");
  if (safeMove?.i === move.i) {
    return "Play the Safest Move.";
  }

  const bestMove = topMoves.find(m => m.type !== "safe");
  if (bestMove?.i === move.i) {
    return "Play the Strategically Valuable move.";
  }

  if (appState.collapseMove?.i === move.i) {
    return "Play the 2-Step Collapse move.";
  }

  return null;
}

function isRareClarifyingTile(tile) {
  if (tile === undefined || tile === null) return false;

  const partialTiles = getPartialShipTiles();

  if (partialTiles.has(tile)) {
    return true;
  }

  return getUnfoundRareProbability(tile, appState.allBoards || []) > 0;
}

function appendUncertaintyMoveCard(messages, context) {

 if (
    appState.safeOverride ||
    appState.isGuaranteed ||
    context?.missEndsGame
  ) {
    return;
  }

const move = appState.uncertaintyMove;

if (!move) return;
if (!isRareClarifyingTile(move.i)) return;

  const matchingRecommendation =
    getMatchingRecommendationForUncertaintyMove(move);

  const [r, c] = indexToCoord(move.i);

  messages.push(
    makeCard(
      "Unavoidable Guess",
      `
        All possible move paths eventually reach an equivalence decision.
        <br><br>
        ${
          matchingRecommendation
            ? `
              Best move to reduce that uncertainty:
              <br>
              <b>${matchingRecommendation}</b>
            `
            : `
              Best move to reduce that uncertainty:
              <br>
              <b style="color:#dc2626">Row ${r + 1}, Col ${c + 1}</b>

function getTileColorProbability(tileIndex, color){
  const buckets = outcomeBucketsCache?.[tileIndex];
  const total = appState.allBoards?.length || 0;

  if(!buckets || total === 0) return 0;

  return (buckets[color] || 0) / total;
}

function getRainbowCandidateTiles(probs) {
  const knownRainbowTiles = [];

  for (let i = 0; i < 25; i++) {
    if (grid[i] === "rainbow") {
      knownRainbowTiles.push(i);
    }
  }

  if (knownRainbowTiles.length === 0) return [];

  if (knownRainbowTiles.length >= getShipSize("rainbow")) {
    return [];
  }

  const tiles = new Set();

  for (const i of knownRainbowTiles) {
    for (const ni of getOrthogonalNeighbors(i)) {
      if (grid[ni] === null) {
        tiles.add(ni);
      }
    }
  }

  const candidates = [...tiles]
    .map(i => {
      const [r, c] = indexToCoord(i);
      const forcedColor = appState.forcedTiles?.[i] || null;
      const rainbowChance = getTileColorProbability(i, "rainbow");

      return {
        i,
        row: r + 1,
        col: c + 1,
        p: rainbowChance,
        forcedColor
      };
    })
    .filter(tile => {
      if(tile.forcedColor && tile.forcedColor !== "rainbow") return false;
      return tile.p > 0;
    })
    .sort((a, b) => b.p - a.p);

  const guaranteedRainbow = candidates.filter(tile => tile.p === 1);

  if(guaranteedRainbow.length > 0){
    return guaranteedRainbow;
  }

  return candidates;
}

function canShowHeatmapPreview(tileIndex) {
  return (
    currentMode === MODE.NORMAL &&
    appState.allBoards &&
    appState.allBoards.length > 0 &&

  );

function getScenarioBoardsForSelectedColor(tileIndex) {
  return appState.allBoards.filter(board =>
    boardTileMatchesSelectedColor(board, tileIndex, selectedColor)
  );
}

function boardTileMatchesSelectedColor(board, tileIndex, color) {
  const boardColor = getBoardColorAt(board, tileIndex);

  if (color === 'miss') {
    return !boardColor;
  }

  if (boardColor === color) {
    return true;
  }

  const selectedIsUnfoundRare =
    RARE_COLORS.includes(color) &&
    !getUsedRare().includes(color) &&
    color !== 'orange';

  if (
    selectedIsUnfoundRare &&
    isAnonymousRareShip(boardColor)
  ) {
    return true;
  }

  return false;
}

function buildPreviewHeatmapState(tileIndex, scenarioBoards) {
  const probs = computePreviewProbs(scenarioBoards);
  const context = getPreviewGameContext(tileIndex, scenarioBoards);

  return {
    probs,
    huntMode: context.huntMode,
    mode: context.mode,
    label: context.label
  };
}

function getPreviewGameContext(tileIndex, scenarioBoards) {
  const current = getHitMissCounts();

  const hits =
    selectedColor === 'miss'
      ? current.hits
      : current.hits + 1;

  const misses =
    selectedColor === 'miss'
      ? current.misses + 1
      : current.misses;

  const naturalAggressive = hits >= 5 && misses >= 3;

  let huntMode = naturalAggressive;

  if (rareCount >= 4) {
    const defaultStartMode = "aggressive";
    const startMode = forcedStartMode || defaultStartMode;

    huntMode =
      startMode === "aggressive" ||
      naturalAggressive;
  }

  const remainingBlue =
    getRemainingBlueTiles() - (selectedColor === 'miss' ? 1 : 0);

  const allShipsComplete = scenarioBoards.length > 0 &&
    scenarioBoards.every(board => {
      for (let i = 0; i < 25; i++) {
        if (i === tileIndex) continue;
        if (grid[i] !== null) continue;
        if (getBoardColorAt(board, i)) return false;
      }
      return true;
    });

  const tracking = getShipTracking();
  const allShipsAlreadyComplete =
    tracking.incomplete === 0 &&
    tracking.unfound === 0;

  if (
    selectedColor === 'miss' &&
    !allShipsAlreadyComplete &&
    hits >= 5 &&
    misses > 3
  ) {
    return {
      huntMode,
      mode: MODE.GAME_OVER,
      label: "Preview: Game Over"
    };
  }

  if (!huntMode && remainingBlue === 0) {
    return {
      huntMode,
      mode: MODE.ALL_HITS,
      label: "Preview: All Hits"
    };
  }

  if (huntMode && allShipsComplete) {
    return {
      huntMode,
      mode: MODE.ALL_MISSES,
      label: "Preview: All Misses"
    };
  }

  return {
    huntMode,
    mode: MODE.NORMAL,
    label: huntMode
      ? "Preview Mode: Aggressive (Non-blue Hunting)"
      : "Preview Mode: Safe (Blue Hunting)"
  };
}

function computePreviewProbs(boards) {
  const counts = Array(25).fill(0);

  if (!boards || boards.length === 0) {
    return counts;
  }

  for (const board of boards) {
    for (let i = 0; i < 25; i++) {
      if (getBoardColorAt(board, i)) counts[i]++;
    }
  }

  return counts.map(c => c / boards.length);
}

function renderEVHeatmap() {
  const heat = DOM.heatmap;
  const values = Array(25).fill(0);

  let maxEV = 0;

  for (let i = 0; i < 25; i++) {
    if (grid[i] !== null) continue;

    const ev = tileEVStatsCache?.[i]?.weightedEV || 0;
    values[i] = ev;

    if (ev > maxEV) {
      maxEV = ev;
    }
  }

  for (let i = 0; i < 25; i++) {
    const cell = heat[i];

    if (grid[i] !== null) {
      setBackgroundIfChanged(cell, '');
      setTextIfChanged(cell, '');
      continue;
    }

    const ev = values[i];
    const intensity = maxEV ? ev / maxEV : 0;

    const red = 255;
    const green = Math.round(255 - 160 * intensity);
    const blue = Math.round(255 - 160 * intensity);

    setBackgroundIfChanged(
      cell,
      `rgb(${red}, ${green}, ${blue})`
    );

    setTextIfChanged(
      cell,
      ev ? `EV ${ev.toFixed(0)}` : "EV 0"
    );
  }

  setTextIfChanged(DOM.heatmapTitle, "EV Heatmap");
  setTextIfChanged(
    DOM.heatmapSubtitle,
    "Expected tile value, including blue as EV 10."
  );
}

function renderPreviewEVHeatmap(scenarioBoards) {
  const heat = DOM.heatmap;
  const stats = buildTileEVStats(scenarioBoards);
  const values = Array(25).fill(0);

  let maxEV = 0;

  for (let i = 0; i < 25; i++) {
    if (grid[i] !== null) continue;

    const ev = stats[i]?.weightedEV || 0;
    values[i] = ev;

    if (ev > maxEV) {
      maxEV = ev;
    }
  }

  for (let i = 0; i < 25; i++) {

    const blue = Math.round(255 - 160 * intensity);

    setBackgroundIfChanged(
      cell,

    );

      cell,
      ev ? `EV ${ev.toFixed(0)}` : "EV 0"

  let bestEV = -Infinity;

  for (const tile of tiles) {

    if (ev > bestEV) {
      bestEV = ev;
      bestTiles = [tile];

function clearKnownCellsCache(){
  knownCellsCache = {};
}

function getKnownCellsCached(color){
  if(knownCellsCache[color]) return knownCellsCache[color];

  const cells = getKnownCells(color);
  knownCellsCache[color] = cells;

  return cells;
}

function getColorCounts(){
  let counts = {};
  for(let c in SHIPS) counts[c] = 0;

  for(let i=0;i<25;i++){
    if(grid[i]) counts[grid[i]]++;
  }

  return counts;
}

function getGridStats(){
  if(gridStatsCache) return gridStatsCache;

  const colorCounts = {};
  const colorMasks = {};
  const foundColors = new Set();

  for(const color in SHIPS){
    colorCounts[color] = 0;
    colorMasks[color] = 0;
  }

  let hits = 0;
  let misses = 0;
  let occupiedMask = 0;
  let missMask = 0;

  for(let i = 0; i < 25; i++){
    const color = grid[i];

    if(color === null) continue;

    const mask = cellMask(i);

    if(color === 'miss'){
      misses++;
      missMask |= mask;
      continue;
    }

    hits++;
    occupiedMask |= mask;

    colorCounts[color] = (colorCounts[color] || 0) + 1;
    colorMasks[color] = (colorMasks[color] || 0) | mask;
    foundColors.add(color);
  }

  gridStatsCache = {
    hits,
    misses,
    occupiedMask,
    missMask,
    colorCounts,
    colorMasks,
    foundColors
  };

  return gridStatsCache;
}

function maskToCells(mask){
  const cells = [];

  while(mask){
    const bit = mask & -mask;
    cells.push(BIT_INDEX[bit]);
    mask &= mask - 1;
  }

  return cells;
}

function getOrthogonalNeighbors(i) {
  const [r, c] = indexToCoord(i);

  return [
    [r - 1, c],
    [r + 1, c],
    [r, c - 1],
    [r, c + 1]
  ]
    .filter(([rr, cc]) => rr >= 0 && rr < SIZE && cc >= 0 && cc < SIZE)
    .map(([rr, cc]) => coordToIndex(rr, cc));
}

function coordToIndex(r,c){return r*5+c;}

function indexToCoord(i){return [Math.floor(i/5),i%5];}

function isAdjacentToKnown(i){
  const [r,c] = indexToCoord(i);

  const dirs = [
    [1,0],[-1,0],
    [0,1],[0,-1]
  ];

  for (let [dr,dc] of dirs){
    const rr = r + dr;
    const cc = c + dc;

    if(rr < 0 || cc < 0 || rr >= 5 || cc >= 5) continue;

    const ni = coordToIndex(rr,cc);

    if(grid[ni] && grid[ni] !== 'miss'){
      return true;
    }
  }

  return false;
}

function placementKey(placement){
  return placement.key ?? placementCells(placement)[0];
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function placementCells(placement){
  return placement.cells ?? placement;
}

function cellMask(i){
  return 1 << i;
}

function getPlacementMask(placement){
  return placement.mask;
}

function getKnownMissMask(){
  return getGridStats().missMask;
}

function isRareShipId(cell) {
  return !!cell && (
    RARE_COLORS.includes(cell) ||
    cell.startsWith('rare_')
  );
}

function boardKey(board){
  let key = "";

  for(let i = 0; i < 25; i++){
    const cell = board[i];

    if(!cell){
      key += "x";
    } else if(isRareShipId(cell)){
      key += "R";
    } else {
      key += COLOR_TO_ID[cell];
    }
  }

  return key;
}

function cellsToMask(cells){
  let mask = 0;
  for(const i of cells){
    mask |= (1 << i);
  }
  return mask;
}

function buildShipMasks(board){
  const masks = {};

  for(let i = 0; i < 25; i++){
    const ship = board[i];
    if(!ship) continue;

    masks[ship] = (masks[ship] || 0) | cellMask(i);
  }

  return masks;
}

function canPlaceWithSameShipOverlap(
  placement,
  ship,
  occupiedMask,
  shipMasks,
  knownMissMask = 0
){
  const placementMask = getPlacementMask(placement);
  const ownShipMask = shipMasks[ship] || 0;
  const occupiedByOtherShips = occupiedMask & ~ownShipMask;

  if((placementMask & knownMissMask) !== 0) return false;
  if((placementMask & occupiedByOtherShips) !== 0) return false;

  return true;
}

function makeMaskBoard(shipMasks, hitMask){
  return {
    __maskBoard: true,
    hitMask,
    colorMasks: { ...shipMasks }
  };
}

function isMaskBoard(board){
  return board && board.__maskBoard === true;
}

function maskBoardKey(board){
  let key = "";

  for (let i = 0; i < 25; i++) {
    const color = getBoardColorAt(board, i);

    if (!color) {
      key += "x";
    } else if (isRareShipId(color)) {
      key += "R";
    } else {
      key += COLOR_TO_ID[color];
    }
  }

  return key;
}

function getBoardColorAt(board, i){
  if (!isMaskBoard(board)) {
    return board[i] || null;
  }

  const mask = cellMask(i);

  for (const color in board.colorMasks) {
    if (board.colorMasks[color] & mask) {
      return color;
    }
  }

  return null;
}

function boardToMask(board){
  if (isMaskBoard(board)) {
    return board.hitMask;
  }

  let mask = 0;

  for(let i = 0; i < 25; i++){
    if(board[i]){
      mask |= cellMask(i);
    }
  }

  return mask;
}

function clearColorMaskCache(){
  colorMaskCache = {};
}

function getKnownMaskCached(color){
  return getColorMaskCached(color);
}

function respectsKnownMask(placement, color){
  const knownMask = getKnownMaskCached(color);
  const placementMask = getPlacementMask(placement);

  return (placementMask & knownMask) === knownMask;
}

function getColorMaskCached(color){
  if(colorMaskCache[color] !== undefined){
    return colorMaskCache[color];
  }

  const mask = getGridStats().colorMasks[color] || 0;

  colorMaskCache[color] = mask;
  return mask;
}

function prepareSortedShips() {
  const ships = getShipList();

  ships.sort((a, b) => {
    const scoreA = getPlacementsCached(a).length - getKnownCellsCached(a).length * 5;
    const scoreB = getPlacementsCached(b).length - getKnownCellsCached(b).length * 5;

    if(scoreA !== scoreB) return scoreA - scoreB;

    const aRare = a.startsWith('rare_');
    const bRare = b.startsWith('rare_');

    if(aRare && !bRare) return 1;
    if(bRare && !aRare) return -1;

    return 0;
  });

  return ships;
}

function buildPlacementsMap(ships) {
  const map = {};

  for (let ship of ships) {
    const placements = getPlacementsCached(ship);
    if (placements.length === 0) return null;

    map[ship] = placements;
  }

  return map;
}

function createBitWriter(){
  let bits = [];

  return {
    write(value, bitCount){
      for(let i = bitCount - 1; i >= 0; i--){
        bits.push((value >> i) & 1);
      }
    },

    toBase64(){
      let bytes = [];
	  
      for(let i = 0; i < bits.length; i += 8){
        let byte = 0;
        for(let j = 0; j < 8; j++){
          byte <<= 1;
          if(i + j < bits.length && bits[i + j]) byte |= 1;
        }
        bytes.push(byte);
      }

      return btoa(String.fromCharCode(...bytes));
    }
  };
}

function createBitReader(base64){
  function safeBase64Decode(str){
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while(str.length % 4) str += '=';
  return atob(str);
}

const binary = safeBase64Decode(base64);

  let bits = [];

  for(let i = 0; i < binary.length; i++){
    let byte = binary.charCodeAt(i);
    for(let j = 7; j >= 0; j--){
      bits.push((byte >> j) & 1);
    }
  }

  let index = 0;

  return {
    read(bitCount){
      let value = 0;
      for(let i = 0; i < bitCount; i++){
        value = (value << 1) | bits[index++];
      }
      return value;
    }
  };
}

function encodeGame(){
  const movesToEncode = getMovesForCurrentGrid();
  const writer = createBitWriter();

  writer.write(1, 3);

  writer.write(rareCount, 3);
  const modeBit = forcedStartMode === "aggressive" ? 1 : 0;
writer.write(modeBit, 1);

  writer.write(movesToEncode.length, 5);

movesToEncode.forEach(m => {
  writer.write(m.index, 5);
  writer.write(COLOR_TO_ID[m.newColor], 4);
});

  return writer.toBase64();
}

function decodeGame(hash){
  const reader = createBitReader(hash);

  const version = reader.read(3);
  const rareCountVal = reader.read(3);
  const modeVal = reader.read(1) ? "aggressive" : "safe";

  const moveCount = reader.read(5);

  let moves = [];

  for(let i = 0; i < moveCount; i++){
    const index = reader.read(5);
    const colorId = reader.read(4);

    moves.push({
      index,
      color: ID_TO_COLOR[colorId]
    });
  }

  return { moves, rareCountVal, modeVal };
}

function loadFromHash(hash){
  try {
    isLoadingHash = true;

    const decoded = decodeGame(hash);
    const loadedMoves = decoded.moves;
    const rareCountVal = decoded.rareCountVal;
    const modeVal = decoded.modeVal;

    resetAll();

rareCount = rareCountVal;
forcedStartMode = modeVal || "aggressive";
updateTopInfoVisibility();

    document.querySelectorAll('[onclick^="setRare"]').forEach(b=>{
      b.classList.remove('active-btn');
    });

    document
      .querySelector(`[onclick="setRare(${rareCountVal},this)"]`)
      ?.classList.add('active-btn');

    updateModeButtons();
    updateBoardLock();

    loadedMoves.forEach(m => {
      selectedColor = m.color;
      placeColor(m.index);
    });

    selectedColor = null;
    redoStack = [];

    isLoadingHash = false;

    render();
    updateColorAvailability();
    runSimulation();
    renderUI();
    updateBoardLock();

  } catch(e){
    isLoadingHash = false;
    showError("Invalid code");
  }
}

function getMovesForCurrentGrid(){
  const encoded = [];
  const encodedGrid = Array(25).fill(null);

  for(const move of moves){
    encoded.push(move);
    encodedGrid[move.index] = move.newColor;
  }

  for(let i = 0; i < 25; i++){
    if(grid[i] !== encodedGrid[i]){
      encoded.push({
        index: i,
        prevColor: encodedGrid[i],
        newColor: grid[i]
      });
    }
  }

  return encoded;
}

  if (heatmapPreviewActive) return;

  heatmapMode =
    heatmapMode === "probability"
      ? "ev"
      : "probability";

  renderSelectedHeatmap();
};

window.setRare = function(n,btn){
  if(configLocked) return;

  rareCount = n;
  updateTopInfoVisibility();

forcedStartMode = getDefaultModeForRareCount(n);

updateModeButtons();

  document.querySelectorAll('[onclick^="setRare"]').forEach(b=>b.classList.remove('active-btn'));
  btn.classList.add('active-btn');

  updateBoardLock();

  if(!isStateValid()){
    showError("Too many rare colors placed for this setting.");
    return;
  }

  runSimulation(); 
  renderUI(); 
  updateColorAvailability();
}

window.setMode = function(mode, btn){
  if(rareCount === null) return;

  forcedStartMode = mode;

  clearPlacementsCache();
  appState = createEmptyAppState();

  updateModeButtons();

  runSimulation();
  renderUI();
  updateColorAvailability();
};

window.generateHash = function(){
  const input = document.getElementById('hashInput');
  input.value = encodeGame();
  input.select();
};

window.loadHash = function(){
  const input = document.getElementById('hashInput');
  const hash = input.value.trim();

  if(!hash){
    showError("Enter a code first");
    return;
  }

  loadFromHash(hash);
};

// ===============================
// T.17 INITIALIZATION
// ===============================

function createBoards(){
  const play=document.getElementById('playBoard');
  const heat=document.getElementById('heatmap');

  play.innerHTML='';
  heat.innerHTML='';

for(let i=0;i<25;i++){
  let cell=document.createElement('div');
  cell.className='cell';
  cell.onclick=()=>handleCellClick(i);
cell.addEventListener('mouseenter', () => queueHeatmapPreview(i));
cell.addEventListener('mouseleave', cancelHeatmapPreview);
  play.appendChild(cell);

  let h=document.createElement('div');
  h.className='cell';
  heat.appendChild(h);
}
}

function cacheDomLists(){
  DOM_LISTS.colorButtons = [...document.querySelectorAll('.color-btn')];
  DOM_LISTS.rareButtons = [...document.querySelectorAll('[onclick^="setRare"]')];
  DOM_LISTS.modeButtons = [...document.querySelectorAll('[onclick^="setMode"]')];
}

DOM.playBoard = document.getElementById('playBoard').children;
DOM.heatmap = document.getElementById('heatmap').children;
DOM.heatmapTitle = document.getElementById('heatmapTitle');
DOM.heatmapSubtitle = document.getElementById('heatmapSubtitle');
DOM.heatmapToggleBtn = document.getElementById('heatmapToggleBtn');
DOM.infoBox = document.getElementById('infoBox');
DOM.topInfoBox = document.getElementById('topInfoBox');
DOM.confidence = document.getElementById('confidence');
DOM.modeLabel = document.getElementById('modeLabel');

cacheDomLists();

createBoards();
updateBoardLock();
updateInfoBox();
updateTopInfoVisibility();

};
</script>

<div class="sharebar">
  <div class="section" style="width:100%;">
    <span class="label">Share Code:</span>

    <input id="hashInput" placeholder="Paste or generate code">

    <button class="active-btn" onclick="generateHash()">Generate</button>
    <button onclick="loadHash()">Load</button>
  </div>
</div>

</body>
