<script>
window.onload = function(){

// ===============================
// T.01 CONFIG / CONSTANTS
// ===============================

const SIZE=5;
const SHIPS={
  teal:4,
  green:3,
  yellow:3,

  orange:2,
  red:2,
  black:2,
  white:2,
  rainbow:2,
};
const RARE_COLORS=['orange','red','black','white','rainbow'];

const TILE_EV = {
  miss: 10,
  teal: 20,
  green: 35,
  yellow: 55,
  orange: 90,
  white: 100,
  black: 120,
  red: 150,
  rainbow: 500
};

const MODE = {
  NORMAL: 0,
  ALL_HITS: 1,
  ALL_MISSES: 2,
  TOUCH_GRASS: 3,
  GAME_OVER: 4
};

const MAX_MISSES = 5;

const PRECALC_BOARD_LIMIT = 5000;
const PRECALC_MAX_DEPTH = 14;
const PRECALC_UNKNOWN_TILE_LIMIT = 14;

const CELL_MASKS = Array.from(
  { length: 25 },
  (_, i) => 1 << i
);

const FULL_BOARD_MASK = (1 << 25) - 1;

const COLOR_TO_ID = {
  teal: 0,
  green: 1,
  yellow: 2,
  orange: 3,
  red: 4,
  black: 5,
  white: 6,
  rainbow: 7,
  miss: 8
};

const ID_TO_COLOR = Object.fromEntries(
  Object.entries(COLOR_TO_ID).map(([k,v]) => [v,k])
);

const DOM = {
  playBoard: null,
  heatmap: null,
  heatmapTitle: null,
  heatmapSubtitle: null,
  heatmapToggleBtn: null,
  rareTargetToggleBtn: null,
  infoBox: null,
  topInfoBox: null,
  confidence: null,
  modeLabel: null
};

const FUTURE_COLLAPSE_BOARD_LIMIT = 200;
const FUTURE_COLLAPSE_DEEP_BOARD_LIMIT = 50;
const FUTURE_COLLAPSE_SHORTLIST = 5;

// ===============================
// T.01A CONSTANT BUILDERS
// ===============================

function buildRawPlacements(size){
  const placements = [];

  for(let r = 0; r < SIZE; r++){
    for(let c = 0; c < SIZE; c++){
      for(let horiz of [true, false]){
        const cells = [];

        for(let k = 0; k < size; k++){
          const rr = r + (horiz ? 0 : k);
          const cc = c + (horiz ? k : 0);

          if(rr >= SIZE || cc >= SIZE){
            cells.length = 0;
            break;
          }

          cells.push(coordToIndex(rr, cc));
        }

        if(cells.length === size){
          const mask = cellsToMask(cells);
          let diagonalMask = 0;

          for(const i of cells){
            diagonalMask |= DIAGONAL_MASKS[i];
          }

          placements.push({
            cells,
            horiz,
            key: cells[0],
            mask,
            diagonalMask
          });
        }
      }
    }
  }

  return placements;
}

const DIAGONALS = Array.from({ length: 25 }, (_, i) => {
  const [r, c] = [Math.floor(i / 5), i % 5];

  return [
    [r - 1, c - 1],
    [r - 1, c + 1],
    [r + 1, c - 1],
    [r + 1, c + 1]
  ].filter(([dr, dc]) => dr >= 0 && dc >= 0 && dr < 5 && dc < 5)
   .map(([dr, dc]) => dr * 5 + dc);
});

const BIT_INDEX = {};

for(let i = 0; i < 25; i++){
  BIT_INDEX[1 << i] = i;
}

const DIAGONAL_MASKS = Array(25).fill(0);

for(let i = 0; i < 25; i++){
  let [r,c] = [Math.floor(i / 5), i % 5];

  let mask = 0;

  const dirs = [
    [r-1,c-1],[r-1,c+1],
    [r+1,c-1],[r+1,c+1]
  ];

  for(let [dr,dc] of dirs){
    if(dr>=0 && dc>=0 && dr<5 && dc<5){
      mask |= (1 << (dr * 5 + dc));
    }
  }

  DIAGONAL_MASKS[i] = mask;
}

const RAW_PLACEMENTS = {
  2: buildRawPlacements(2),
  3: buildRawPlacements(3),
  4: buildRawPlacements(4)
};

// ===============================
// T.02 GLOBAL STATE
// ===============================

let currentMode = MODE.NORMAL;

let colorblindMode = false;
let targetRareShipsMode = false;

let grid = Array(25).fill(null);

let appState = createEmptyAppState();

let moves = [];
let redoStack = [];
let history = [];

let rareCount = null;
let selectedColor = null;
let forcedStartMode = null;

let lastProbs = null;
let lastTopMoves = null;
let lastSpecialGroup = null;

let placementsCache = {};
let knownCellsCache = {};
let colorMaskCache = {};
let gridStatsCache = null;
let gridMask = 0;
let outcomeBucketsCache = null;
let tileShipSizesCache = null;
let unfoundBonusCache = null;
let tileEVStatsCache = null;
let hitCountsCache = null;
let rareUnfoundCountsCache = null;
let hitMasksCache = null;
let equivalenceGroupsCache = null;
let precalcContextCache = null;
let exactResultCache = new Map();

let configLocked = false;
let isLoadingHash = false;

let hoverPreviewTimer = null;
let lastHoveredTile = null;
let heatmapPreviewActive = false;
let heatmapMode = "probability";
let lastAutoFillHitCount = 0;

let showGambaHighlight = false;

const DOM_LISTS = {
  colorButtons: null,
  rareButtons: null,
  modeButtons: null
};

let rareRulesCache = null;

// ===============================
// T.03 ACTIONS
// ===============================

function placeColor(i) {
  if (isGameOver()) return;
  if (!canPlaceColor()) return;

const prevSnapshot = {
  currentMode,
  appState: deepClone(appState),
  lastSpecialGroup,
  lastProbs,
  lastTopMoves
};

  const historySnapshot = createHistorySnapshot();

  const prevColor = grid[i];
  const newColor = toggleColor(i);

resetModeAndCache();
ensureConfigLocked();
setGridCell(i, newColor);

targetRareShipsMode = false;

const { hits, misses } = getHitMissCounts();

if (
  !grid.every(cell => cell !== null) &&
  shouldEndGameOnMiss({
    newColor,
    hits,
    misses
  })
) {
  commitAcceptedMove({
    index: i,
    prevColor,
    newColor,
    historySnapshot
  });
  return;
}

if (!isValidPlacement(i, prevColor)) {
    grid[i] = prevColor;

    currentMode = prevSnapshot.currentMode;
    appState = prevSnapshot.appState;
    lastSpecialGroup = prevSnapshot.lastSpecialGroup;
    lastProbs = prevSnapshot.lastProbs;
    lastTopMoves = prevSnapshot.lastTopMoves;

    clearPlacementsCache();
    render();
    renderUI();
    updateColorAvailability();
    return;
  }

  commitAcceptedMove({
  index: i,
  prevColor,
  newColor,
  historySnapshot
});
}

function handleCellClick(i){
  if(currentMode === MODE.GAME_OVER) return;
  if(rareCount === null) return;

  const forced = appState.forcedTiles?.[i];

  const canAutoPlaceForced =
    forced &&
    grid[i] === null &&
    !isAnonymousRareShip(forced);

  if(canAutoPlaceForced){

    const prevSelected = selectedColor;
    const prevGrid = grid[i];

    selectedColor = forced;

    placeColor(i);

    const success = grid[i] !== prevGrid;

    selectedColor = prevSelected;

    if(!success){
      placeColor(i);
    }

    return;
  }

  placeColor(i);
}

function toggleColor(i) {
  const isSameColor = grid[i] === selectedColor;
  return isSameColor ? null : selectedColor;
}

function setGridCell(index, value) {
  grid[index] = value;
}

function recordMove(index, prevColor, newColor) {
  const move = { index, prevColor, newColor };

  moves.push(move);
  redoStack = [];
}

window.autoPlaceGuaranteedHits = function(){
  if (currentMode === MODE.GAME_OVER) return;
  if (rareCount === null) return;
  if (!appState.forcedTiles) return;
  
  const btn = document.getElementById('autoHitsBtn');
btn?.classList.remove('pulse');

  const forcedHits = Object.entries(appState.forcedTiles)
    .map(([index, color]) => ({
      index: Number(index),
      color
    }))
    .filter(({ index, color }) =>
      grid[index] === null &&
      color &&
      color !== 'miss' &&
      !isAnonymousRareShip(color)
    );

  if (forcedHits.length === 0) return;

  isLoadingHash = true;

  try {
    ensureConfigLocked();

for (const { index, color } of forcedHits) {
  const historySnapshot = createHistorySnapshot();
  const prevColor = grid[index];

  grid[index] = color;

  saveHistorySnapshot(historySnapshot);
  recordMove(index, prevColor, color);
}

redoStack = [];
  } finally {
    isLoadingHash = false;
  }

clearPlacementsCache();
render();

currentMode = MODE.NORMAL;
appState = createEmptyAppState();

runSimulation();
updateColorAvailability();
renderUI();
updateBoardLock();
};

window.undoMove = function(){
  if(history.length === 0) return;

  const lastMove = moves.pop();
  if(!lastMove) return;

  redoStack.push(lastMove);

  const prev = history.pop();

  grid = prev ? [...prev.grid] : Array(25).fill(null);
  rareCount = prev?.rareCount ?? null;
  forcedStartMode = prev?.forcedStartMode ?? null;
appState = prev?.appState
  ? deepClone(prev.appState)
  : createEmptyAppState();
  currentMode = prev?.currentMode ?? MODE.NORMAL;

  clearPlacementsCache();

  render();
  updateColorAvailability();
  runSimulation();
  renderUI();
  updateBoardLock();
};

window.redoMove = function(){
  if(redoStack.length === 0) return;

  const move = redoStack.pop();

history.push({
  grid: [...grid],
  rareCount,
  forcedStartMode,
  appState: deepClone(appState),
  currentMode
});

  grid[move.index] = move.newColor;

  moves.push(move);

  clearPlacementsCache();

  render();
  updateColorAvailability();
  runSimulation();
  renderUI();
  updateBoardLock();
};

window.resetAll = function(){

  exactResultCache.clear();

  grid = Array(25).fill(null);
  selectedColor = null;
  rareCount = null;
  forcedStartMode = null;
  history = [];
  updateTopInfoVisibility();
  

DOM_LISTS.colorButtons.forEach(b=>{
  b.classList.remove('selected','disabled');
});

DOM_LISTS.rareButtons.forEach(b=>{
  b.classList.remove('active-btn');
});

document.getElementById('modeSafe')?.classList.remove('active-btn');
document.getElementById('modeAggressive')?.classList.remove('active-btn');

  render();
  const heat = DOM.heatmap;
for(let i=0;i<25;i++){
  heat[i].style.background = '';
  heat[i].textContent = '';
}

setTextIfChanged(DOM.heatmapTitle, "Probability Heatmap");
DOM.heatmapSubtitle.classList.remove('error');

setTextIfChanged(DOM.heatmapSubtitle, "");

heatmapPreviewActive = false;
heatmapMode = "probability";
lastHoveredTile = null;
updateHeatmapToggle();

  DOM.confidence.textContent = "";
  DOM.modeLabel.textContent = "";
currentMode = MODE.NORMAL;

appState = createEmptyAppState();
clearPlacementsCache();

lastSpecialGroup = null;

updateInfoBox();

  updateBoardLock();

clearRecommendations();

lastProbs = null;
lastTopMoves = null;
moves = [];
redoStack = [];

configLocked = false;

updateModeButtons();

DOM_LISTS.rareButtons.forEach(b=>{
  b.classList.remove('disabled');
});

lastAutoFillHitCount = 0;
updateAutoHitsButton();
targetRareShipsMode = false;
showGambaHighlight = false;

}

// ===============================
// T.04 FLOW CONTROLLERS
// ===============================

function isGameOver() {
  const gameOver = currentMode === MODE.GAME_OVER;
  return gameOver;
}

function canPlaceColor() {
  const hasColor = !!selectedColor;
  const hasRareConfig = rareCount !== null;

  const placementLocked =
    currentMode === MODE.GAME_OVER ||
    currentMode === MODE.TOUCH_GRASS;

  return hasColor && hasRareConfig && !placementLocked;
}

function resetModeAndCache() {
  currentMode = MODE.NORMAL;
  clearPlacementsCache();
  
  appState.specialGroup = null;
  appState.forcedTiles = null;
  appState.collapseMove = null;
appState.noEquivalencePlan = null;
appState.uncertaintyMove = null;
appState.clarityMove = null;
}

function ensureConfigLocked() {
  if (configLocked) return;

  configLocked = true;
  lockConfigUI();
}

function commitAcceptedMove(move) {
  saveHistorySnapshot(move.historySnapshot);

  recordMove(move.index, move.prevColor, move.newColor);

  const { hits, misses } = getHitMissCounts();
  const tracking = getShipTracking();

  if (grid.every(cell => cell !== null)) {
    finalizePlacement();
    return;
  }

  if (shouldEndGameOnMiss({
    newColor: move.newColor,
    hits,
    misses,
    tracking
  })) {
    handleGameOver();
    return;
  }

  finalizePlacement();
}

function finalizePlacement() {
  render();

  appState = createEmptyAppState();

  runSimulation();
  updateColorAvailability();
  renderUI();
}

function handleGameOver() {
  currentMode = MODE.GAME_OVER;

  clearSelectedColor();

  appState = {
    ...createEmptyAppState(),
    guaranteedColors: null
  };

  render();
  renderUI();
}

function shouldEndGameOnMiss({ newColor, hits, misses }) {
  return (
    newColor === 'miss' &&
    hits >= 5 &&
    misses > 3
  );
}

function isValidPlacement(i, prevColor) {
  if (!isStateValid()) {
    grid[i] = prevColor;
    return false;
  }

  for (let s of getShipList()) {
    if (getPlacementsCached(s).length === 0) {
      grid[i] = prevColor;
      return false;
    }
  }

  if (!hasAnyValidBoard()) {
    grid[i] = prevColor;
    return false;
  }

  return true;
}

// ===============================
// T.04A STATE / HISTORY / CACHE HELPERS
// ===============================

function saveHistorySnapshot(snapshot = createHistorySnapshot()) {
  history.push(snapshot);
}

function createHistorySnapshot() {
  return {
    grid: [...grid],
    rareCount,
    forcedStartMode,
    appState: deepClone(appState),
    currentMode
  };
}

function deepClone(obj) {
  if (obj === null || obj === undefined) return obj;

  return {
    ...obj,

    probs: obj.probs ? [...obj.probs] : null,

    topMoves: obj.topMoves
      ? obj.topMoves.map(move => ({ ...move }))
      : null,

    specialGroup: obj.specialGroup
      ? {
          ...obj.specialGroup,
          tiles: obj.specialGroup.tiles
            ? [...obj.specialGroup.tiles]
            : obj.specialGroup.tiles
        }
      : null,

    forcedTiles: obj.forcedTiles
      ? { ...obj.forcedTiles }
      : obj.forcedTiles,

    collapseMove: obj.collapseMove
      ? { ...obj.collapseMove }
      : obj.collapseMove,

allBoards: obj.allBoards
  ? obj.allBoards.map(board =>
      isMaskBoard(board)
        ? {
            __maskBoard: true,
            hitMask: board.hitMask,
            colorMasks: { ...board.colorMasks }
          }
        : [...board]
    )
  : obj.allBoards,

    winStrategy: obj.winStrategy
      ? {
          ...obj.winStrategy,
          line: obj.winStrategy.line
            ? [...obj.winStrategy.line]
            : obj.winStrategy.line
        }
      : obj.winStrategy,

    noEquivalencePlan: obj.noEquivalencePlan
      ? JSON.parse(JSON.stringify(obj.noEquivalencePlan))
      : obj.noEquivalencePlan,

clarityMove: obj.clarityMove
  ? { ...obj.clarityMove }
  : obj.clarityMove,

uncertaintyMove: obj.uncertaintyMove
  ? { ...obj.uncertaintyMove }
  : obj.uncertaintyMove
	  
	  
  };
}

function createEmptyAppState(){
  return {
    probs: null,
    topMoves: null,
    isTrueEndgame: false,
    isGuaranteed: false,
    specialGroup: null,
	safeOverride: false,
    collapseMove: null,
    noEquivalencePlan: null,
	safeOverrideSource: null,
    clarityMove: null,
    uncertaintyMove: null,
	solverInfo: null
  };
}

function clearPlacementsCache() {
  placementsCache = {};
  clearKnownCellsCache();
  clearColorMaskCache();
  gridStatsCache = null;
  outcomeBucketsCache = null;
  tileShipSizesCache = null;
  unfoundBonusCache = null;
tileEVStatsCache = null;
hitCountsCache = null;
rareUnfoundCountsCache = null;
hitMasksCache = null;
equivalenceGroupsCache = null;
precalcContextCache = null;
rareRulesCache = null;
}

// ===============================
// T.05 VALIDATION
// ===============================

function isStateValid(){
  const { colorCounts, colorMasks } = getGridStats();

  for(let c in SHIPS){
    if(colorCounts[c] > SHIPS[c]) return false;
  }

 let usedRare = 0;
for(const c of RARE_COLORS){
  if(colorCounts[c] > 0) usedRare++;
}

if(rareCount !== null && usedRare > rareCount) return false;

if (
  rareCount !== null &&
  !isKnownRareStateAllowed()
) {
  return false;
}

if(
  rareCount !== null &&
  colorCounts.orange === 0 &&
  usedRare >= rareCount
){
  return false;
}

  for(let color in SHIPS){
    const colorMask = colorMasks[color] || 0;

    for(let mask = colorMask; mask; mask &= mask - 1){
      const bit = mask & -mask;
      const i = BIT_INDEX[bit];

      if((DIAGONAL_MASKS[i] & colorMask) !== 0){
        return false;
      }
    }

    const cells = maskToCells(colorMask);

    if(cells.length <= 1) continue;

    let rows = cells.map(i => indexToCoord(i)[0]);
    let cols = cells.map(i => indexToCoord(i)[1]);

    let sameRow = rows.every(r => r === rows[0]);
    let sameCol = cols.every(c => c === cols[0]);

    if(!(sameRow || sameCol)) return false;

    if(sameRow){
      let min = Math.min(...cols);
      let max = Math.max(...cols);
      if(max - min + 1 > getShipSize(color)) return false;
    }

    if(sameCol){
      let min = Math.min(...rows);
      let max = Math.max(...rows);
      if(max - min + 1 > getShipSize(color)) return false;
    }
  }

  return true;
}

function isBoardValid(board, final=false){

  if (!matchesKnownGrid(board)) return false;

  let ships = getShipList();

  for (let color of ships){
    let cells = getBoardCells(board, color);

    if (isRare(color)) {
      if (!validateRareCells(cells, final)) return false;
      continue;
    }

    if (!validateShipSize(cells, color, final)) return false;
    if (!validateNoDiagonalTouch(board, cells, color)) return false;
    if (!validateLineShape(board, cells, color)) return false;
  }

  return true;
}

function matchesKnownGrid(board){
  for(let i=0;i<25;i++){
    if(grid[i] && grid[i] !== 'miss'){
      if(board[i] !== grid[i]) return false;
    }
    if(grid[i] === 'miss'){
      if(board[i]) return false;
    }
  }
  return true;
}

function getBoardCells(board, color){
  const cells = [];
for (let i = 0; i < 25; i++) {
  if (board[i] === color) cells.push(i);
}
return cells;
}

function isRare(color){
  return RARE_COLORS.includes(color);
}

function validateRareCells(cells, final){
  if(final && cells.length !== 2) return false;
  if(!final && cells.length > 2) return false;
  return true;
}

function validateShipSize(cells, color, final){
  if(final){
    if(cells.length === 0) return true;
    return cells.length === getShipSize(color);
  }
  return cells.length <= getShipSize(color);
}

function validateNoDiagonalTouch(board, cells, color){
  for(let i of cells){
for (let ni of DIAGONALS[i]) {
  if (board[ni] === color) return false;
}
  }
  return true;
}

function validateLineShape(board, cells, color){
  if(cells.length <= 1) return true;

  let coords = cells.map(i=>indexToCoord(i));
  let rows = coords.map(x=>x[0]);
  let cols = coords.map(x=>x[1]);

  let sameRow = rows.every(r=>r===rows[0]);
  let sameCol = cols.every(c=>c===cols[0]);

  if(!(sameRow||sameCol)) return false;

  if(sameRow){
    let r=rows[0];
    let min=Math.min(...cols);
    let max=Math.max(...cols);

    for(let c=min;c<=max;c++){
      if(board[coordToIndex(r,c)] !== color) return false;
    }

    return (max-min+1) === cells.length;
  }

  if(sameCol){
    let c=cols[0];
    let min=Math.min(...rows);
    let max=Math.max(...rows);

    for(let r=min;r<=max;r++){
      if(board[coordToIndex(r,c)] !== color) return false;
    }

    return (max-min+1) === cells.length;
  }

  return true;
}

function hasAnyValidBoard(){
  let ships = getShipList();

  let placementsMap = {};
  for(let s of ships){
    let p = getPlacementsCached(s);
    if(p.length === 0) return false;
    placementsMap[s] = p;
  }

  let board = Array(25).fill(null);
  const knownMissMask = getKnownMissMask();

  function dfs(index, occupiedMask = 0){
    if(index === ships.length){
      return isBoardValid(board, true);
    }

    let ship = ships[index];

    for(let opt of placementsMap[ship]){
      const placementMask = opt.mask;

      if((placementMask & knownMissMask) !== 0) continue;
      if((placementMask & occupiedMask) !== 0) continue;

      const cells = placementCells(opt);

for (const i of cells) {
  board[i] = ship;
}

if(dfs(index + 1, occupiedMask | placementMask)) return true;

for (const i of cells) {
  board[i] = null;
}
    }

    return false;
  }

  return dfs(0);
}

// ===============================
// T.06 SHIP PLACEMENT
// ===============================

function isAnonymousRareShip(ship){
  return !!ship && ship.startsWith('rare_');
}

function getShipSize(color){
  if(color.startsWith('rare_')) return 2;
  return SHIPS[color];
}

function getShipList(){
  let ships = ['teal','green','yellow'];

  let used = getUsedRare();

  if (!used.includes('orange')) {
    used = ['orange', ...used];
  }

  let remaining = Math.max(0, rareCount - used.length);

  ships.push(...used);

  for(let i = 0; i < remaining; i++){
    ships.push(`rare_${i}`);
  }

  return ships;
}

function isFirstAnonymousRareInList(ship, remainingShips){
  if(!isAnonymousRareShip(ship)) return true;

  for(const s of remainingShips){
    if(isAnonymousRareShip(s)){
      return s === ship;
    }
  }

  return true;
}

function getKnownCells(color){
  if(color.startsWith('rare_')) return [];

  const mask = getGridStats().colorMasks[color] || 0;
  const cells = [];

  for(let m = mask; m; m &= m - 1){
    const bit = m & -m;
    cells.push(BIT_INDEX[bit]);
  }

  return cells;
}

function getDirectionConstraint(cells){
  if(cells.length < 2) return 'any';
  let rows=cells.map(i=>indexToCoord(i)[0]);
  let cols=cells.map(i=>indexToCoord(i)[1]);
  if(rows.every(r=>r===rows[0])) return 'horizontal';
  if(cols.every(c=>c===cols[0])) return 'vertical';
  return 'any';
}

function getValidPlacements(color){
const size = getShipSize(color);
const known = getKnownCellsCached(color);
const direction = getDirectionConstraint(known);

const placements = [];

for(const placement of RAW_PLACEMENTS[size]){
  const { cells, horiz } = placement;

  if(!respectsDirection(direction, horiz)) continue;
  if(!respectsKnownMask(placement, color)) continue;
  if(!isPlacementValid(cells, color)) continue;
  if(!passesDiagonalRulePlacement(placement, color)) continue;

  placements.push(placement);
}

  return placements;
}

function respectsDirection(direction, horiz){
  if(direction==='horizontal' && !horiz) return false;
  if(direction==='vertical' && horiz) return false;
  return true;
}

function isPlacementValid(cells, color){
  for(let i of cells){
    if(grid[i] && grid[i] !== 'miss'){
      if(color.startsWith('rare_')) return false;
      if(grid[i] !== color) return false;
    }
  }
  return true;
}

function passesDiagonalRulePlacement(placement, color){
  const colorMask = getColorMaskCached(color);

  return (placement.diagonalMask & colorMask) === 0;
}

function getPlacementsCached(color){
  if(!placementsCache[color]){
    placementsCache[color] = getValidPlacements(color);
  }
  return placementsCache[color];
}

// ===============================
// T.07 GAME STATE
// ===============================

function canAnonymousRareRepresentColor(color) {
  if (!RARE_COLORS.includes(color)) return false;
  if (color === "orange") return false;
  if (getFoundColors().has(color)) return false;

  return getPossibleRareSetsForMode().some(set =>
    set.includes(color)
  );
}

function getDefaultModeForRareCount(n) {
  return n <= 3 ? "safe" : "aggressive";
}

function getFoundColors(){
  return getGridStats().foundColors;
}

function getGamePhase(){
  const stats = getGridStats();
  const { hits, misses, foundColors } = stats;

  if(hits < 5 && foundColors.size < 3){
    return "early";
  }

  if(hits >= 5 || misses >= 2 || foundColors.size >= 5){
    return "late";
  }

  return "mid";
}

function isEarlyGame(){
  const stats = getGridStats();

  return stats.hits < 5 && stats.foundColors.size < 3;
}

function getFoundShipColorCount(){
  return getFoundColors().size;
}

function isNormalMode() {
  return currentMode === MODE.NORMAL;
}

function getGameContext() {
  const { hits, misses } = getHitMissCounts();

  const naturalAggressive = hits >= 5 && misses >= 3;
  const defaultMode = getDefaultModeForRareCount(rareCount);
  const mode = forcedStartMode || defaultMode;

  const huntMode =
    mode === "aggressive" ||
    naturalAggressive;

  return {
    hits,
    misses,
    huntMode
  };
}

function getHitMissCounts() {
  const { hits, misses } = getGridStats();
  return { hits, misses };
}

function getShipTracking(){
  const { colorCounts } = getGridStats();

  let incomplete = 0;

  for(let color in SHIPS){
    const count = colorCounts[color] || 0;

    if(count > 0 && count < getShipSize(color)){
      incomplete++;
    }
  }

  let ships = getShipList();
  let used = {};

  ships.forEach(s=>{
    used[s] = (used[s] || 0) + 1;
  });

  let unfound = 0;

  for(let ship in used){
    let placed = colorCounts[ship] || 0;

    if(placed === 0){
      unfound += used[ship];
    }
  }

  return { incomplete, unfound };
}

function hasGuaranteedUnknownHits() {
  return appState.probs?.some((p, i) =>
    grid[i] === null &&
    p === 1 &&
    !appState.forcedTiles?.[i]
  );
}

function getRemainingBlueTiles(){
  const totalCells = 25;

let totalShips = 0;
let ships = getShipList();

ships.forEach(s => {
  totalShips += getShipSize(s);
});

  const totalBlue = totalCells - totalShips;

  const { misses: currentMisses } = getHitMissCounts();

  return totalBlue - currentMisses;
}

function getKnownRareColors() {
  const { colorCounts } = getGridStats();

  return RARE_COLORS.filter(color =>
    colorCounts[color] > 0
  );
}

function isKnownRareStateAllowed(knownRareColors = getKnownRareColors()) {
  const set = new Set(knownRareColors);

  if (rareCount === 2) {
    if (set.has("red") || set.has("rainbow")) {
      return false;
    }
  }

  if (rareCount === 3) {
    if (set.has("red") && set.has("rainbow")) {
      return false;
    }
  }

  return true;
}

function isRareColorAllowedByMode(color, knownRareColors = getKnownRareColors()) {
  if (!RARE_COLORS.includes(color)) return true;

  const knownSet = new Set(knownRareColors);

  if (rareCount === 2) {
    return color !== "red" && color !== "rainbow";
  }

  if (rareCount === 3) {
    if (color === "red" && knownSet.has("rainbow")) return false;
    if (color === "rainbow" && knownSet.has("red")) return false;
  }

  return true;
}

function chooseRareCombinations(items, count) {
  if (count === 0) return [[]];
  if (count < 0 || count > items.length) return [];

  const result = [];

  function dfs(start, combo) {
    if (combo.length === count) {
      result.push([...combo]);
      return;
    }

    for (let i = start; i < items.length; i++) {
      combo.push(items[i]);
      dfs(i + 1, combo);
      combo.pop();
    }
  }

  dfs(0, []);
  return result;
}

function isRareSetAllowedForMode(rareSet) {
  const set = new Set(rareSet);

  if (!set.has("orange")) return false;

  if (rareCount === 2) {
    return !set.has("red") && !set.has("rainbow");
  }

  if (rareCount === 3) {
    return !(set.has("red") && set.has("rainbow"));
  }

  return true;
}

function getPossibleRareSetsForMode() {
  if (rareRulesCache?.possibleRareSets) {
    return rareRulesCache.possibleRareSets;
  }

  if (rareCount === null) return [];

  const knownRareColors = getKnownRareColors();

  const required = knownRareColors.includes("orange")
    ? [...knownRareColors]
    : ["orange", ...knownRareColors];

  const uniqueRequired = [...new Set(required)];

  if (uniqueRequired.length > rareCount) return [];
  if (!isRareSetAllowedForMode(uniqueRequired)) return [];

  const remainingCount = rareCount - uniqueRequired.length;

  const available = RARE_COLORS.filter(color =>
    !uniqueRequired.includes(color)
  );

  const result = chooseRareCombinations(available, remainingCount)
    .map(extra => [...uniqueRequired, ...extra])
    .filter(isRareSetAllowedForMode);

  rareRulesCache ??= {};
  rareRulesCache.possibleRareSets = result;

  return result;
}

function getPossibleAnonymousRareColors() {
  if (rareRulesCache?.anonymousRareColors) {
    return rareRulesCache.anonymousRareColors;
  }

  const foundColors = getFoundColors();
  const pool = [];

  for (const rareSet of getPossibleRareSetsForMode()) {
    for (const color of rareSet) {
      if (color === "orange") continue;
      if (foundColors.has(color)) continue;

      pool.push(color);
    }
  }

  rareRulesCache ??= {};
  rareRulesCache.anonymousRareColors = pool;

  return pool;
}

function getAnonymousRareEVByShipId() {
  if (rareRulesCache?.anonymousRareEVByShipId) {
    return rareRulesCache.anonymousRareEVByShipId;
  }

  const anonymousShips = getShipList().filter(isAnonymousRareShip);
  const possibleRareSets = getPossibleRareSetsForMode();
  const foundColors = getFoundColors();

  const totals = {};
  const counts = {};

  for (const ship of anonymousShips) {
    totals[ship] = 0;
    counts[ship] = 0;
  }

  for (const rareSet of possibleRareSets) {
    const hiddenColors = rareSet.filter(color =>
      color !== "orange" &&
      !foundColors.has(color)
    );

    if (!hiddenColors.length) continue;

    const avgHiddenEV =
      hiddenColors.reduce((sum, color) => sum + TILE_EV[color], 0) /
      hiddenColors.length;

    for (const ship of anonymousShips) {
      totals[ship] += avgHiddenEV;
      counts[ship]++;
    }
  }

  const result = {};

  for (const ship of anonymousShips) {
    result[ship] = counts[ship]
      ? totals[ship] / counts[ship]
      : getAverageUnfoundRareEV();
  }

  rareRulesCache ??= {};
  rareRulesCache.anonymousRareEVByShipId = result;

  return result;
}

function getUsedRare(){
  const { colorCounts } = getGridStats();

  return RARE_COLORS.filter(c => colorCounts[c] > 0);
}

// ===============================
// T.08 SIMULATION 
// ===============================

function runSimulation(){

  if (shouldSkipSimulation()) return;

  if (handleFullBoard()) return;

  if (!ensureNormalMode()) return;

  prepareSimulation();

  if (!validateStateOrAbort()) return;

  const context = buildSimulationContext();

  if (handleForcedModes(context)) return;

  resetHeatmapUI();

  if (rareCount === null) return;

  if (shouldRunExactSolver(context)) {
    runExactSolver();
    return;
  }

  const result = runMonteCarlo(context);

  finalizeSimulation(result);
}

function shouldSkipSimulation() {
  const isGameOverMode = currentMode === MODE.GAME_OVER;
  return isLoadingHash || isGameOverMode;
}

function finalizeSimulation({ counts, valid, attempts }) {
  const probs = counts.map(c => (valid ? c / valid : 0));

appState = {
  ...createEmptyAppState(),
  probs,
  solverInfo: {
    type: "mcmc",
    valid,
    attempts
  }
};

  DOM.confidence.textContent =
    `Valid boards: ${valid} (in ${attempts} chains)`;
}

function handleFullBoard() {
  const isFull = grid.every(cell => cell !== null);
  if (!isFull) return false;

  currentMode = MODE.TOUCH_GRASS;
  appState = createEmptyAppState();

  renderUI();
  return true;
}

function ensureNormalMode() {
  const isNormal = currentMode === MODE.NORMAL;

  if (!isNormal) {
    clearPlacementsCache();
    return false;
  }

  return true;
}

function prepareSimulation() {
  lastSpecialGroup = null;
  lastGuaranteed = false;
  
  appState.specialGroup = null; 
  appState.forcedTiles = null;
  
  clearRecommendations();
}

function validateStateOrAbort() {
  if (isLoadingHash) return false;

  const hasStarted = grid.some(cell => cell !== null);
  if (!hasStarted) return false;

  const valid = isStateValid();

  if (!valid) {
    appState = createEmptyAppState();
    showError("Current board is invalid.");
    return false;
  }

  return true;
}

function buildSimulationContext() {
  const { hits, misses, huntMode } = getGameContext();
  const stats = getGridStats();

  const placedTiles = countMaskBits(
    stats.occupiedMask | stats.missMask
  );

  const remainingBlue = getRemainingBlueTiles();
  const tracking = getShipTracking();

  return {
    hits,
    misses,
    huntMode,
    remainingBlue,
    tracking,
    placedTiles
  };
}

function getSolvedOutcomeCounts(probs) {
  const counts = {
    hits: 0,
    blues: 0,
    unresolved: 0
  };

  if (!probs) return counts;

  for (let i = 0; i < 25; i++) {
    if (grid[i] !== null) continue;

    if (probs[i] === 1) {
      counts.hits++;
    } else if (probs[i] === 0) {
      counts.blues++;
    } else {
      counts.unresolved++;
    }
  }

  return counts;
}

function handleForcedModes(ctx) {
  return false;
}

function computeStaticModeForcedTiles() {
  const { ships, placementsMap } = prepareExactSolver();
  if (!ships || !placementsMap) return null;

  const { allBoards } = enumerateAllBoardsMaskNative(ships, placementsMap);
  if (!allBoards || allBoards.length === 0) return null;

  return computeForcedTiles(allBoards);
}

function shouldRunExactSolver(ctx) {
  const { hits, placedTiles } = ctx;
  
  const { colorCounts } = getGridStats();

const rareHits = RARE_COLORS.reduce(
  (sum, color) => sum + (colorCounts[color] || 0),
  0
);

const nonRareHits = hits - rareHits;

  if (rareCount >= 4) {
    return placedTiles >= 4 ||
      (placedTiles === 3 && nonRareHits >= 2);
  }

  if (rareCount <= 2) {
    return placedTiles >= 4 ||
      (placedTiles >= 2 && hits >= 1);
  }

if (placedTiles >= 5) return true;

return (
  (placedTiles === 3 && (
    nonRareHits >= 1 ||
    rareHits >= 2
  )) ||
  (placedTiles === 4 && hits >= 1)
);
}

// ===============================
// T.09 MCMC
// ===============================

function runMonteCarlo(ctx) {
  appState.forcedTiles = null;

  const counts = Array(25).fill(0);
  let valid = 0;
  let attempts = 0;
  const seen = new Set();

  const NUM_CHAINS =
    ctx.placedTiles >= 4 ? 2 : 4;

  const MAX_ATTEMPTS = 7000;
  const TARGET_VALID = 4000;

  const ships = prepareSortedShips();
  const placementsMap = buildPlacementsMap(ships);

  if (!placementsMap) {
    return { counts, valid, attempts };
  }

  while (attempts < MAX_ATTEMPTS && valid < TARGET_VALID) {
    attempts++;

    const chains = initializeChains(ships, placementsMap, NUM_CHAINS);
    if (chains.length === 0) continue;

    runMCMCLoops(chains, ships, placementsMap);

    valid += collectSamples(chains, counts, seen, valid);
  }

  return { counts, valid, attempts };
}

function backtrackPlace(
  ships,
  placementsMap,
  index,
  board,
  occupiedMask = 0,
  knownMissMask = getKnownMissMask()
){
  if(index === ships.length) return true;

  let ship = ships[index];
  let options = shuffle([...placementsMap[ship]]);

  for(let opt of options){
    const cells = placementCells(opt);
    const placementMask = opt.mask;

    if(index > 0 && getShipType(ships[index]) === getShipType(ships[index-1])){
      let prevShip = ships[index-1];
      let minPrev = Infinity;

      for(let i = 0; i < 25; i++){
        if(board[i] === prevShip){
          minPrev = i;
          break;
        }
      }

      if(minPrev !== Infinity){
        let minCurr = placementKey(opt);
        if(minCurr < minPrev) continue;
      }
    }

    if(placementMask & knownMissMask) continue;
    if(placementMask & occupiedMask) continue;

    for (const i of cells) {
      board[i] = ship;
    }

    if(backtrackPlace(
      ships,
      placementsMap,
      index + 1,
      board,
      occupiedMask | placementMask,
      knownMissMask
    )) {
      return true;
    }

    for (const i of cells) {
      board[i] = null;
    }
  }

  return false;
}

function mcmcStep(board, ships, placementsMap, knownMissMask = getKnownMissMask()){
  let newBoard = [...board];

  let k = 2 + Math.floor(Math.random() * 2);
  let chosen = shuffle([...ships]).slice(0, k);

  let occupiedMask = boardToMask(newBoard);
  let shipMasks = buildShipMasks(newBoard);

  for(let ship of chosen){
    let known = getKnownCellsCached(ship);
    let knownMask = cellsToMask(known);

    for(let i=0;i<25;i++){
      if(newBoard[i] === ship && !(knownMask & CELL_MASKS[i])){
        const mask = CELL_MASKS[i];

        newBoard[i] = null;
        occupiedMask &= ~mask;
        shipMasks[ship] &= ~mask;
      }
    }

    let options = shuffle([...placementsMap[ship]]);

    for(let opt of options){
      if(
		!canPlaceWithSameShipOverlap(
		opt,
		ship,
		occupiedMask,
		shipMasks,
		knownMissMask
		)
      ){
        continue;
      }

      const cells = placementCells(opt);
      const placementMask = opt.mask;

      for (const i of cells) {
  newBoard[i] = ship;
}

      occupiedMask |= placementMask;
      shipMasks[ship] = (shipMasks[ship] || 0) | placementMask;

      break;
    }
  }

  return newBoard;
}

function scoreBoard(board){
  let score = 0;
  const stats = getGridStats();

  for (const color in stats.colorMasks) {
    let mask = stats.colorMasks[color];

    while (mask) {
      const bit = mask & -mask;
      const i = BIT_INDEX[bit];

      if(board[i] === color) score += 3;
      else score -= 10;

      mask &= mask - 1;
    }
  }

  let missMask = stats.missMask;

  while (missMask) {
    const bit = missMask & -missMask;
    const i = BIT_INDEX[bit];

    if(board[i]){
      score -= 10;
    }

    missMask &= missMask - 1;
  }

  return score;
}

function initializeChains(ships, placementsMap, numChains) {
  const chains = [];

  for (let c = 0; c < numChains; c++) {
    const board = Array(25).fill(null);

    if (!backtrackPlace(ships, placementsMap, 0, board)) continue;

    chains.push({
      board,
      temperature: 0.7 + Math.random() * 0.6
    });
  }

  return chains;
}

function getShipType(ship){
  return ship.startsWith('rare_') ? 'rare' : ship;
}

function runMCMCLoops(chains, ships, placementsMap) {
  const STEPS = 30;
  const COOLING = 0.98;
  const knownMissMask = getKnownMissMask();

  for (let step = 0; step < STEPS; step++) {
    for (let chain of chains) {
      const newBoard = mcmcStep(
        chain.board,
        ships,
        placementsMap,
        knownMissMask
      );

      const oldScore = chain.score ?? scoreBoard(chain.board);
      const newScore = scoreBoard(newBoard);

      if (newScore >= oldScore) {
        chain.board = newBoard;
        chain.score = newScore;
      } else {
        const prob = Math.exp((newScore - oldScore) / chain.temperature);
        if (Math.random() < prob) {
          chain.board = newBoard;
          chain.score = newScore;
        }
      }

      chain.temperature *= COOLING;
    }
  }
}

function collectSamples(chains, counts, seen, validSoFar) {
  let newValid = 0;

  for (let chain of chains) {
    const board = chain.board;

    if (
  validSoFar > 0 &&
  validSoFar % 500 === 0 &&
  !isBoardValid(board, true)
) continue;

    const key = boardKey(board);
    if (seen.has(key)) continue;

    seen.add(key);
    newValid++;

    for (let i = 0; i < 25; i++) {
      if (board[i]) counts[i]++;
    }
  }

  return newValid;
}

// ===============================
// T.10 EXACT SOLVER
// ===============================

function enumerateAllBoardsMaskNative(ships, placementsMap) {
  const counts = Array(25).fill(0);
  const allBoards = [];
  const seen = new Set();
  const knownMissMask = getKnownMissMask();

  function dfs(
    index,
    occupiedMask,
    hitMask,
    shipMasks,
    lastRarePlacementKey = 0
  ) {
    if (index === ships.length) {
      const snapshot = makeMaskBoard(shipMasks, hitMask);
      const key = maskBoardKey(snapshot);

      if (seen.has(key)) return;
      seen.add(key);

      allBoards.push(snapshot);

for (let mask = hitMask; mask; mask &= mask - 1) {
  const bit = mask & -mask;
  const i = BIT_INDEX[bit];

  counts[i]++;
}

      return;
    }

    const ship = ships[index];
    const placements = placementsMap[ship];
    const remainingShips = ships.slice(index);

    const legal = getLegalPlacementsForShip(
      ship,
      placements,
      null,
      occupiedMask,
      knownMissMask,
      lastRarePlacementKey,
      remainingShips,
      shipMasks
    );

    if (!legal) return;

    for (const placement of legal) {
      const placementMask = placement.mask;
      const nextShipMasks =
        cloneShipMasksWithPlacement(shipMasks, ship, placementMask);

      const nextLastRareKey = isAnonymousRareShip(ship)
        ? placementKey(placement)
        : lastRarePlacementKey;

      dfs(
        index + 1,
        occupiedMask | placementMask,
        hitMask | placementMask,
        nextShipMasks,
        nextLastRareKey
      );
    }
  }

  dfs(0, 0, 0, {});

  return {
    counts,
    valid: allBoards.length,
    allBoards
  };
}

function installExactCaches(exactCaches) {
  outcomeBucketsCache = exactCaches.outcomeBuckets;
  tileShipSizesCache = exactCaches.tileShipSizes;
  unfoundBonusCache = exactCaches.unfoundBonus;
  tileEVStatsCache = exactCaches.tileEVStats;
  hitCountsCache = exactCaches.hitCounts;
  rareUnfoundCountsCache = exactCaches.rareUnfoundCounts;
  hitMasksCache = exactCaches.hitMasks;
  equivalenceGroupsCache = exactCaches.equivalenceGroups;
}

function runExactSolver() {

  resetExactSolverState();
  appState.forcedTiles = null;

  const { ships, placementsMap } = prepareExactSolver();
  if (!ships) return;

const solverKey = getSolverStateKey();

let cached = exactResultCache.get(solverKey);

if (!cached) {
  const { counts, valid, allBoards } =
    enumerateAllBoardsMaskNative(ships, placementsMap);

  const probs = computeProbabilities(counts, valid);

  cached = {
    counts,
    valid,
    allBoards,
    probs,
    exactCaches: null
  };

if(

function buildExactCaches(allBoards) {
  const outcomeBuckets = Array.from({ length: 25 }, () => ({}));
  const tileSizeShipSets = Array.from({ length: 25 }, () => ({}));
  const unfoundCounts = Array.from({ length: 25 }, () => ({}));
  const tileEVTotals = Array(25).fill(0);
const tileHitEVTotals = Array(25).fill(0);
const tileHitCounts = Array(25).fill(0);
const hitMasks = [];
const hitCounts = Array(25).fill(0);
const rareUnfoundCounts = Array(25).fill(0);

  const foundColors = getFoundColors();
  const anonymousRareEVByShipId = getAnonymousRareEVByShipId();

  for (const board of allBoards) {
    const hitMask = boardToMask(board);

    for (let i = 0; i < 25; i++) {
      const color = getBoardColorAt(board, i);
      const key = color || 0;

      if (!outcomeBuckets[i][key]) {
        outcomeBuckets[i][key] = 0;
      }

      outcomeBuckets[i][key]++;

      tileEVTotals[i] += getOutcomeEV(color, anonymousRareEVByShipId);

if (!color) continue;

hitCounts[i]++;

if (
  isRareShipId(color) &&
  (
    isAnonymousRareShip(color) ||
    !foundColors.has(color)
  )
) {
  rareUnfoundCounts[i]++;
}

tileHitEVTotals[i] += getOutcomeEV(color, anonymousRareEVByShipId);
tileHitCounts[i]++;

      if (grid[i]) continue;

      const size = getShipSize(color);

      if (!tileSizeShipSets[i][size]) {
        tileSizeShipSets[i][size] = new Set();
      }

      tileSizeShipSets[i][size].add(color);

      if (
        !isRareShipId(color) &&
        !foundColors.has(color)
      ) {
        unfoundCounts[i][color] =
          (unfoundCounts[i][color] || 0) + 1;
      }
    }

    hitMasks.push(hitMask);
  }

  const tileShipSizes = {};
  const unfoundBonus = Array(25).fill(0);
  const tileEVStats = {};

  for (let i = 0; i < 25; i++) {
    if (grid[i]) continue;

    tileShipSizes[i] = expandTileSizeShipSets(tileSizeShipSets[i]);

    tileEVStats[i] = {
      avgHitEV: tileHitCounts[i]
        ? tileHitEVTotals[i] / tileHitCounts[i]
        : 0,
      weightedEV: allBoards.length
        ? tileEVTotals[i] / allBoards.length
        : 0
    };

    for (const color in unfoundCounts[i]) {
      unfoundBonus[i] += unfoundCounts[i][color] / allBoards.length;
    }
  }

return {
  outcomeBuckets,
  tileShipSizes,
  unfoundBonus,
  tileEVStats,
  hitCounts,
  rareUnfoundCounts,
  hitMasks,
  equivalenceGroups: buildEquivalenceGroupsFromHitMasks(hitMasks)
};
}

function getOutcomeEV(color, anonymousRareEVByShipId = null) {
  if (!color) return TILE_EV.miss;

  if (TILE_EV[color] !== undefined) {
    return TILE_EV[color];
  }

  if (isAnonymousRareShip(color)) {
    return anonymousRareEVByShipId?.[color] ??
      getAverageUnfoundRareEV();
  }

  return 0;
}

function getAverageUnfoundRareEV() {
  const availableRareColors = getPossibleAnonymousRareColors();

  if (!availableRareColors.length) return 0;

  const total = availableRareColors.reduce(
    (sum, color) => sum + TILE_EV[color],
    0
  );

  return total / availableRareColors.length;
}

function getTileEVStats(allBoards) {
  if (allBoards === appState.allBoards && tileEVStatsCache) {

  }

  return buildTileEVStats(allBoards);
}

function buildTileEVStats(allBoards) {
  const stats = {};
  const anonymousRareEVByShipId = getAnonymousRareEVByShipId();

  for (let i = 0; i < 25; i++) {
    if (grid[i]) continue;

    let totalEV = 0;
    let hitEV = 0;
    let hitCount = 0;

    for (const board of allBoards) {
      const color = getBoardColorAt(board, i);
      const ev = getOutcomeEV(color, anonymousRareEVByShipId);

      totalEV += ev;

      if (color) {
        hitEV += ev;
        hitCount++;
      }
    }

    stats[i] = {
      avgHitEV: hitCount ? hitEV / hitCount : 0,
      weightedEV: allBoards.length ? totalEV / allBoards.length : 0
    };
  }

  return stats;
}

function getCachedBuckets(boardSet, tile, ctx) {
  let tileCache = ctx.bucketCache.get(tile);

  if (!tileCache) {
    tileCache = new Map();
    ctx.bucketCache.set(tile, tileCache);
  }

  if (tileCache.has(boardSet)) {
    return tileCache.get(boardSet);
  }

  const buckets = bucketBoardSetByOutcome(boardSet, tile, ctx);

  tileCache.set(boardSet, buckets);

  return buckets;
}

function getStrategyMemo(memo, boardSet, knownMask, hits, misses, remainingDepth) {
  const byBoardSet = memo.get(boardSet);
  if (!byBoardSet) return undefined;

  const key =
    knownMask +
    "|" + hits +
    "|" + misses +
    "|" + remainingDepth;

  return byBoardSet.get(key);
}

function setStrategyMemo(memo, boardSet, knownMask, hits, misses, remainingDepth, value) {
  let byBoardSet = memo.get(boardSet);

  if (!byBoardSet) {
    byBoardSet = new Map();
    memo.set(boardSet, byBoardSet);
  }

  const key =
    knownMask +
    "|" + hits +
    "|" + misses +
    "|" + remainingDepth;

  byBoardSet.set(key, value);
}

function getPrecalcContext(allBoards) {
  if (allBoards === appState.allBoards && precalcContextCache) {
    return precalcContextCache;

  const ctx = buildPrecalcContext(allBoards);

  if (allBoards === appState.allBoards) {

  }

  return ctx;
}

function buildPrecalcContext(allBoards) {
  let allBoardSet = 0n;

  const hitMasks = [];
  const tileHitBoardSets = Array(25).fill(0n);
  const outcomeBoardSetsByTile = Array.from(
    { length: 25 },
    () => ({})
  );

  for (let b = 0; b < allBoards.length; b++) {
    const board = allBoards[b];
    const boardBit = 1n << BigInt(b);

    allBoardSet |= boardBit;

    let hitMask = 0;

    for (let i = 0; i < 25; i++) {
      const color = getBoardColorAt(board, i);
      const outcome = color || 0;

      if (!outcomeBoardSetsByTile[i][outcome]) {
        outcomeBoardSetsByTile[i][outcome] = 0n;
      }

      outcomeBoardSetsByTile[i][outcome] |= boardBit;

if (color) {
  hitMask |= CELL_MASKS[i];
  tileHitBoardSets[i] |= boardBit;
}
    }

    hitMasks[b] = hitMask;
  }

const { huntMode } = getGameContext();

return {
  allBoardSet,
  hitMasks,
  tileHitBoardSets,
  outcomeBoardSetsByTile,
  huntMode,
  forceHeuristics: shouldForceHeuristics(),
  earlyGame: isEarlyGame(),
  bitCountCache: new Map(),
  splitScoreCache: new Map(),
  bucketCache: new Map(),
  unknownTilesCache: new Map()
};
}

function getBoardSetCount(boardSet, ctx) {
  if (ctx.bitCountCache.has(boardSet)) {
    return ctx.bitCountCache.get(boardSet);
  }

  const count = bitCountBigInt(boardSet);

  ctx.bitCountCache.set(boardSet, count);

  return count;
}

function bitCountBigInt(value) {
  let count = 0;

  while (value !== 0n) {
    value &= value - 1n;
    count++;
  }

  return count;
}

function getTileSplitScoreForBoardSet(tile, boardSet, ctx) {
  let tileCache = ctx.splitScoreCache.get(tile);

  if (!tileCache) {
    tileCache = new Map();
    ctx.splitScoreCache.set(tile, tileCache);
  }

  if (tileCache.has(boardSet)) {
    return tileCache.get(boardSet);
  }

  const buckets = getCachedBuckets(boardSet, tile, ctx);

  let score = 0;

  for (const outcome in buckets) {
    const count = getBoardSetCount(buckets[outcome], ctx);
    score += count * count;
  }

  tileCache.set(boardSet, score);

  return score;
}

function getStrategyCandidatesForBoardSet(
  boardSet,
  knownMask,
  hits,
  misses,
  ctx
) {
  const huntMode = ctx.huntMode;
  const boardCount = getBoardSetCount(boardSet, ctx);
  const tiles = [];

  for (let i = 0; i < 25; i++) {
    if ((knownMask & CELL_MASKS[i]) !== 0) continue;

    const hitCount = getBoardSetCount(
      boardSet & ctx.tileHitBoardSets[i],
      ctx
    );

    const p = boardCount ? hitCount / boardCount : 0;

    if (huntMode && p === 0) continue;
    if (!huntMode && p === 1) continue;

    tiles.push(i);
  }

  return tiles;
}

function wouldTriggerEquivalenceForBoardSet(boardSet, knownMask, ctx) {
  const huntMode = ctx.huntMode;

  if (
    ctx.forceHeuristics ||
    !huntMode ||
    ctx.earlyGame ||
    getBoardSetCount(boardSet, ctx) <= 1
  ) {
    return false;
  }

  const patterns = new Set();

  for (let i = 0; i < 25; i++) {
    if ((knownMask & CELL_MASKS[i]) !== 0) continue;

    const pattern = boardSet & ctx.tileHitBoardSets[i];

    if (pattern === boardSet) continue;

    if (patterns.has(pattern)) {
      return true;
    }

    patterns.add(pattern);
  }

  return false;
}

function bucketBoardSetByOutcome(boardSet, tile, ctx) {
  const buckets = {};
  const outcomeSets = ctx.outcomeBoardSetsByTile[tile];

  for (const outcome in outcomeSets) {
    const nextBoardSet = boardSet & outcomeSets[outcome];

    if (nextBoardSet !== 0n) {
      buckets[outcome] = nextBoardSet;
    }
  }

  return buckets;
}

function buildEquivalenceGroupsFromHitMasks(hitMasks) {
  const groups = [];

  for (let i = 0; i < 25; i++) {
    if (grid[i]) continue;

    const mask = CELL_MASKS[i];
    let matchedGroup = null;

    for (const group of groups) {
      const representative = group[0];
      const representativeMask = CELL_MASKS[representative];

      let samePattern = true;

      for (const hitMask of hitMasks) {
        if(Boolean(hitMask & mask) !== Boolean(hitMask & representativeMask)){
          samePattern = false;
          break;
        }
      }

      if(samePattern){
        matchedGroup = group;
        break;
      }
    }

    if(matchedGroup){
      matchedGroup.push(i);
    } else {
      groups.push([i]);
    }
  }

  return groups;
}

function selectNextShipIndex(
  remainingShips,
  placementsMap,
  board,
  occupiedMask,
  knownMissMask,
  lastRarePlacementKey,
  shipMasks
){
  let bestIndex = -1;
  let bestPlacements = null;
  let bestCount = Infinity;

  for(let i = 0; i < remainingShips.length; i++){
    const ship = remainingShips[i];
    const placements = placementsMap[ship];

const legalPlacements = getLegalPlacementsForShip(
  ship,
  placements,
  board,
  occupiedMask,
  knownMissMask,
  lastRarePlacementKey,
  remainingShips,
  shipMasks
);

    if(legalPlacements === null) continue;

    const legalCount = legalPlacements.length;

    if(legalCount === 0){
      return {
        index: i,
        legalCount: 0,
        legalPlacements
      };
    }

    if(legalCount < bestCount){
      bestCount = legalCount;
      bestIndex = i;
      bestPlacements = legalPlacements;
    }
  }

  return {
    index: bestIndex,
    legalCount: bestCount,
    legalPlacements: bestPlacements
  };
}

function enumerateAllBoards(ships, placementsMap) {

  const counts = Array(25).fill(0);
  let valid = 0;
  const seen = new Set();
  const allBoards = [];
  
  const deadStates = new Set();
  
function dfsStateKey(
  remainingShips,
  occupiedMask,
  lastRarePlacementKey,
  shipMasks
){
  const shipMaskKey = Object
    .keys(shipMasks)
    .sort()
    .map(ship => ship + ':' + shipMasks[ship])
    .join(',');

  return (
    remainingShips.join('|') +
    '|' +
    occupiedMask +
    '|' +
    lastRarePlacementKey +
    '|' +
    shipMaskKey
  );
}

  const board = Array(25).fill(null);
  const knownMissMask = getKnownMissMask();

function dfs(
  remainingShips,
  occupiedMask = 0,
  lastRarePlacementKey = -1,
  shipMasks = {}
) {

const stateKey = dfsStateKey(
  remainingShips,
  occupiedMask,
  lastRarePlacementKey,
  shipMasks
);

  if (deadStates.has(stateKey)) {
    return;
  }

  const validBefore = valid;

if (remainingShips.length === 0) {
    const snapshot = makeMaskBoard(shipMasks, occupiedMask);
    const key = maskBoardKey(snapshot);

    if (seen.has(key)) return;

    seen.add(key);
    valid++;

    allBoards.push(snapshot);

    let mask = occupiedMask;
    while (mask) {
      const bit = mask & -mask;
      counts[BIT_INDEX[bit]]++;
      mask &= mask - 1;
    }

    return;
  }

const choice = selectNextShipIndex(
  remainingShips,
  placementsMap,
  board,
  occupiedMask,
  knownMissMask,
  lastRarePlacementKey,
  shipMasks
);

    if(choice.index === -1 || choice.legalCount === 0){
      return;
    }

    const ship = remainingShips[choice.index];
const isAnonymousRare = isAnonymousRareShip(ship);

remainingShips.splice(choice.index, 1);

for (const placement of choice.legalPlacements) {
  const keyForPlacement = placementKey(placement);
  const placementMask = placement.mask;
  const cells = placementCells(placement);

  for(const i of cells){
    board[i] = ship;
  }

  const prevShipMask = shipMasks[ship] || 0;

  shipMasks[ship] = prevShipMask | placementMask;

  dfs(
    remainingShips,
    occupiedMask | placementMask,
    isAnonymousRare ? keyForPlacement : lastRarePlacementKey,
    shipMasks
  );

  if (prevShipMask !== 0) {
    shipMasks[ship] = prevShipMask;
  } else {
    delete shipMasks[ship];
  }

  for(const i of cells){
    board[i] = null;
  }
}

remainingShips.splice(choice.index, 0, ship);

if (valid === validBefore) {
      deadStates.add(stateKey);
    }

  }

  dfs([...ships]);

  return { counts, valid, allBoards };
}

function computeProbabilities(counts, valid) {
  return counts.map(c => (valid ? c / valid : 0));
}

function computeForcedTiles(allBoards) {
  const forcedTiles = {};

  if (allBoards.length === 0) return forcedTiles;

  for (let i = 0; i < 25; i++) {
    if (grid[i] !== null) continue;

    const buckets = outcomeBucketsCache?.[i];

    if (buckets) {
      const keys = Object.keys(buckets);

if (keys.length === 1) {
  const forced = keys[0] === "0" ? "miss" : keys[0];

  if (forced === 'miss' || !isAnonymousRareShip(forced)) {
    forcedTiles[i] = forced;
  }
}

      continue;
    }

    const first = getBoardColorAt(allBoards[0], i);
    const allSame = allBoards.every(
      b => getBoardColorAt(b, i) === first
    );

if (allSame) {
  if (!first) {
    forcedTiles[i] = 'miss';
  } else if (!isAnonymousRareShip(first)) {
    forcedTiles[i] = first;
  }
}
  }

  return forcedTiles;
}

function getOutcomeKey(board, tile) {
  return getBoardColorAt(board, tile) || 0;
}

function getUnknownTiles(){
  const { occupiedMask, missMask } = getGridStats();
  return getUnknownTilesForKnownMask(occupiedMask | missMask);
}

function getEffectiveUnknownTilesForPrecalc(){
  const tiles = [];
  const forcedTiles = appState.forcedTiles || {};
  const probs = appState.probs || [];
  const { occupiedMask, missMask } = getGridStats();

  const unknownMask =
    FULL_BOARD_MASK & ~(occupiedMask | missMask);

  for(let mask = unknownMask; mask; mask &= mask - 1){
    const bit = mask & -mask;
    const i = BIT_INDEX[bit];

    if (
      Object.prototype.hasOwnProperty.call(forcedTiles, i)
    ) {
      continue;
    }

    if (probs[i] >= 0.999999) {
      continue;
    }

    tiles.push(i);
  }

  return tiles;
}

function getCurrentKnownMask() {
  const { occupiedMask, missMask } = getGridStats();
  return occupiedMask | missMask;
}

function getUnknownTilesFromKnownMask(knownMask) {

}

function bucketBoardsByOutcome(boards, tile) {
  const buckets = {};

  for (const board of boards) {
    const key = getOutcomeKey(board, tile);

    if (!buckets[key]) {
      buckets[key] = [];
    }

    buckets[key].push(board);
  }

  return buckets;
}

function findNoEquivalenceStrategy(allBoards, probs) {
  const knownMask = getCurrentKnownMask();
  const { hits, misses } = getHitMissCounts();

  const ctx = buildPrecalcContext(allBoards);

const memo = new Map();

for (let depthLimit = 1; depthLimit <= PRECALC_MAX_DEPTH; depthLimit++) {

const plan = searchNoEquivalenceStrategy(
  ctx.allBoardSet,
  knownMask,
  hits,
  misses,
  0,
  depthLimit,
  memo,
  ctx
);

        if (plan && plan.length) return plan;
  }

  return null;
}

function searchNoEquivalenceStrategy(
  boardSet,
  knownMask,
  hits,
  misses,
  depth,
  depthLimit,
  memo,
  ctx
) {
  const boardCount = getBoardSetCount(boardSet, ctx);

  if (boardCount <= 1) {
    return [];
  }

  if (wouldTriggerEquivalenceForBoardSet(boardSet, knownMask, ctx)) {
    return null;
  }

  if (depth >= depthLimit) {
    return null;
  }

const remainingDepth = depthLimit - depth;

const cached = getStrategyMemo(
  memo,
  boardSet,
  knownMask,
  hits,
  misses,
  remainingDepth
);

if (cached !== undefined) {
  return cached;
}

const candidates = getStrategyCandidatesForBoardSet(
  boardSet,
  knownMask,
  hits,
  misses,
  ctx
).sort((a, b) =>
  getTileSplitScoreForBoardSet(a, boardSet, ctx) -
  getTileSplitScoreForBoardSet(b, boardSet, ctx)
).slice(0, 7);

  for (const tile of candidates) {
    const nextKnownMask = knownMask | CELL_MASKS[tile];

    const buckets = bucketBoardSetByOutcome(
      boardSet,
      tile,
      ctx
    );

    const outcomes = Object.keys(buckets);

    if (outcomes.length <= 1) continue;

    let valid = true;
    const branches = {};

    for (const outcome of outcomes) {
      const nextCounts = getNextPathCounts(hits, misses, outcome);

      if (doesPathOutcomeEndGame(hits, misses, outcome)) {
        valid = false;
        break;
      }

      const nextBoardSet = buckets[outcome];

      if (wouldTriggerEquivalenceForBoardSet(nextBoardSet, nextKnownMask, ctx)) {
        valid = false;
        break;
      }

      const branchPlan = searchNoEquivalenceStrategy(
        nextBoardSet,
        nextKnownMask,
        nextCounts.hits,
        nextCounts.misses,
        depth + 1,
        depthLimit,
        memo,
        ctx
      );

      if (!branchPlan) {
        valid = false;
        break;
      }

branches[outcome] = {
  boards: getBoardSetCount(nextBoardSet, ctx),
  plan: branchPlan
};
    }

    if (valid) {
      const plan = [{
        i: tile,
        boards: boardCount,
        branches
      }];

setStrategyMemo(
  memo,
  boardSet,
  knownMask,
  hits,
  misses,
  remainingDepth,
  plan
);

return plan;
    }
  }

setStrategyMemo(
  memo,
  boardSet,
  knownMask,
  hits,
  misses,
  remainingDepth,
  null
);

return null;
}

function isBlueOutcome(outcome) {
  return outcome === "0" || outcome === 0;
}

function getNextPathCounts(hits, misses, outcome) {
  if (isBlueOutcome(outcome)) {
    return {
      hits,
      misses: misses + 1
    };
  }

  return {
    hits: hits + 1,
    misses
  };
}

function doesPathOutcomeEndGame(hits, misses, outcome) {
  const nextCounts = getNextPathCounts(hits, misses, outcome);

  return shouldEndGameOnMiss({
    newColor: isBlueOutcome(outcome) ? "miss" : "hit",
    hits: nextCounts.hits,
    misses: nextCounts.misses
  });
}

function wouldTriggerEquivalenceWithKnownMask(boards, knownMask) {
  const { huntMode } = getGameContext();

  if (
    shouldForceHeuristics() ||
    !huntMode ||
    isEarlyGame() ||
    boards.length <= 1
  ) {
    return false;
  }

  const probs = computeProbabilitiesForKnownMask(boards, knownMask);
  const groups = buildEquivalenceGroupsForKnownMask(boards, knownMask);

  return groups.some(group =>
    group.length >= 2 &&
    probs[group[0]] < 1
  );
}

function computeProbabilitiesForKnownMask(boards, knownMask) {
  const counts = Array(25).fill(0);

  for (const board of boards) {
    for (let i = 0; i < 25; i++) {
      if ((knownMask & CELL_MASKS[i]) !== 0) continue;
      if (getBoardColorAt(board, i)) counts[i]++;
    }
  }

  return counts.map(count =>
    boards.length ? count / boards.length : 0
  );
}

function buildEquivalenceGroupsForKnownMask(boards, knownMask) {
  const hitMasks = boards.map(boardToMask);
  const groups = [];

  for (let i = 0; i < 25; i++) {
if ((knownMask & CELL_MASKS[i]) !== 0) continue;

const mask = CELL_MASKS[i];
    let matchedGroup = null;

    for (const group of groups) {
      const representative = group[0];
      const representativeMask = CELL_MASKS[representative];

      let samePattern = true;

      for (const hitMask of hitMasks) {
        if (
          Boolean(hitMask & mask) !==
          Boolean(hitMask & representativeMask)
        ) {
          samePattern = false;
          break;
        }
      }

      if (samePattern) {
        matchedGroup = group;
        break;
      }
    }

    if (matchedGroup) {
      matchedGroup.push(i);
    } else {
      groups.push([i]);
    }
  }

  return groups;
}

function applyNoEquivalencePlan(plan, probs, allBoards) {
  const first = plan[0];

  if (!first) return;

  const move = {
    i: first.i,
    p: probs[first.i],
    type: "no-equivalence",
    reason: "This starts a complete move path that avoids equivalence mode."
  };

  appState.probs = probs;
  appState.topMoves = [move];
  appState.isTrueEndgame = false;
  appState.isGuaranteed = false;
  appState.specialGroup = null;
  appState.collapseMove = null;
  appState.noEquivalencePlan = plan;
  appState.uncertaintyMove = null;

  lastProbs = probs;
  lastTopMoves = [move];
  lastGuaranteed = false;

  clearRecommendations();
  DOM.playBoard[first.i].classList.add('recommended-best');
  renderForcedOverlays();
}

function getBestUncertaintyRemovalMove(allBoards, probs) {
  const knownMask = getCurrentKnownMask();
  let best = null;

  for (const tile of getUnknownTilesFromKnownMask(knownMask)) {
    const p = probs[tile];

    if (p <= 0 || p >= 1) {
      continue;
    }

    const score = scoreEquivalenceReductionMove(
      allBoards,
      tile,
      knownMask
    );

    if (
      !best ||
      score.equivalencePressure < best.equivalencePressure ||
      (
        score.equivalencePressure === best.equivalencePressure &&
        score.expectedRemaining < best.expectedRemaining
      )
    ) {
      best = score;
    }
  }

  return best;
}

function scoreEquivalenceReductionMove(boards, tile, knownMask) {
  const buckets = bucketBoardsByOutcome(boards, tile);
  const total = boards.length;
  const nextKnownMask = knownMask | CELL_MASKS[tile];

  let equivalencePressure = 0;
  let expectedRemaining = 0;

  for (const outcome in buckets) {
    const nextBoards = buckets[outcome];
    const weight = nextBoards.length / total;

    equivalencePressure +=
      weight *
      measureEquivalencePressure(nextBoards, nextKnownMask);

    expectedRemaining +=
      weight *
      nextBoards.length;
  }

  return {
    i: tile,
    equivalencePressure,
    expectedRemaining
  };
}

function measureEquivalencePressure(boards, knownMask) {
  const probs = computeProbabilitiesForKnownMask(boards, knownMask);
  const groups = buildEquivalenceGroupsForKnownMask(boards, knownMask);

  let pressure = 0;

  for (const group of groups) {
    if (group.length < 2) continue;
    if (probs[group[0]] >= 1) continue;

    pressure += group.length * boards.length;
  }

  return pressure;
}

function buildTileShipSizes(allBoards) {
  const tileMap = {};

  for (let i = 0; i < 25; i++) {
    if (grid[i]) continue;

    const sizeShipSets = {};

    for (const board of allBoards) {
      const color = getBoardColorAt(board, i);
      if (!color) continue;

      const size = getShipSize(color);

      if (!sizeShipSets[size]) {
        sizeShipSets[size] = new Set();
      }

      sizeShipSets[size].add(color);
    }

    tileMap[i] = expandTileSizeShipSets(sizeShipSets);
  }

  return tileMap;
}

function expandTileSizeShipSets(sizeShipSets) {
  const sizes = [];

  Object.keys(sizeShipSets)
    .map(Number)
    .sort((a, b) => b - a)
    .forEach(size => {
      const count = sizeShipSets[size].size;

      for (let n = 0; n < count; n++) {
        sizes.push(size);
      }
    });

  return sizes;
}

function scoreCollapseForTile(allBoards, tile, probs) {
  if (!scoreCollapseForTile._cache) {
    scoreCollapseForTile._cache = new WeakMap();
  }

  let boardCache = scoreCollapseForTile._cache.get(allBoards);

  if (!boardCache) {
    boardCache = new Map();
    scoreCollapseForTile._cache.set(allBoards, boardCache);
  }

  if (boardCache.has(tile)) {
    return boardCache.get(tile);
  }

  let buckets =
    allBoards === appState.allBoards
      ? outcomeBucketsCache?.[tile]
      : null;

  if (!buckets) {
    buckets = {};

    for (const board of allBoards) {
      const key = getOutcomeKey(board, tile);

      if (!buckets[key]) buckets[key] = 0;
      buckets[key]++;
    }
  }

  let expectedRemaining = 0;

  for (const key in buckets) {
    const count = buckets[key];
    const p = count / allBoards.length;

    expectedRemaining += p * count;
  }

  const result = {
    i: tile,
    p: probs[tile],
    expectedRemaining,
    buckets
  };

  boardCache.set(tile, result);

  return result;
}

function getBestCollapseMove(
  allBoards,
  probs,
  excludedTile = null,
  unknownTiles = getUnknownTiles()
) {
  let best = null;

  for (const i of unknownTiles) {
    if (i === excludedTile) continue;

    const score = scoreCollapseForTile(allBoards, i, probs);

if (
  !best ||
  score.expectedRemaining < best.expectedRemaining
) {
  best = score;
}
  }

  return best;
}

function getFutureCollapseDepth(boardCount) {
  if (boardCount <= FUTURE_COLLAPSE_DEEP_BOARD_LIMIT) return 4;
  if (boardCount <= FUTURE_COLLAPSE_BOARD_LIMIT) return 3;
  return 0;
}

function getUnknownTilesForKnownMask(knownMask) {
  const tiles = [];
  const unknownMask = FULL_BOARD_MASK & ~knownMask;

  for (let mask = unknownMask; mask; mask &= mask - 1) {
    const bit = mask & -mask;
    tiles.push(BIT_INDEX[bit]);
  }

  return tiles;
}

function getFutureCollapseCandidates(boardSet, knownMask, ctx) {
  const boardCount = getBoardSetCount(boardSet, ctx);
  const unknownMask = FULL_BOARD_MASK & ~knownMask;

  const scored = [];
  const maxSplitScore = boardCount * boardCount;

  for (let mask = unknownMask; mask; mask &= mask - 1) {
    const bit = mask & -mask;
    const i = BIT_INDEX[bit];

    const splitScore = getTileSplitScoreForBoardSet(
      i,
      boardSet,
      ctx
    );

    if (splitScore < maxSplitScore) {
      scored.push({ i, splitScore });
    }
  }

  return scored
    .sort((a, b) => a.splitScore - b.splitScore)
    .slice(0, FUTURE_COLLAPSE_SHORTLIST)
    .map(c => c.i);
}

function evaluateFutureCollapseState(
  boardSet,
  knownMask,
  remainingDepth,
  ctx,
  memo
) {
  const boardCount = getBoardSetCount(boardSet, ctx);

  if (boardCount <= 1 || remainingDepth <= 0) {
    return {
      expectedRemaining: boardCount,
      worstRemaining: boardCount,
      riskAdjustedRemaining: boardCount
    };
  }

  const memoValue = getStrategyMemo(
    memo,
    boardSet,
    knownMask,
    0,
    0,
    remainingDepth
  );

  if (memoValue !== undefined) {
    return memoValue;
  }

  const candidates = getFutureCollapseCandidates(boardSet, knownMask, ctx);

  if (!candidates.length) {
    const result = {
      expectedRemaining: boardCount,
      worstRemaining: boardCount,
      riskAdjustedRemaining: boardCount
    };

    setStrategyMemo(
      memo,
      boardSet,
      knownMask,
      0,
      0,
      remainingDepth,
      result
    );

    return result;
  }

  let best = null;

  for (const tile of candidates) {
    const score = evaluateFutureCollapseMove(
      tile,
      boardSet,
      knownMask,
      remainingDepth,
      ctx,
      memo
    );

    if (
      !best ||
      score.riskAdjustedRemaining < best.riskAdjustedRemaining
    ) {
      best = score;
    }
  }

  setStrategyMemo(
    memo,
    boardSet,
    knownMask,
    0,
    0,
    remainingDepth,
    best
  );

  return best;
}

function evaluateFutureCollapseMove(
  tile,
  boardSet,
  knownMask,
  remainingDepth,
  ctx,
  memo
) {
  const boardCount = getBoardSetCount(boardSet, ctx);
  const buckets = getCachedBuckets(boardSet, tile, ctx);
  const nextKnownMask = knownMask | CELL_MASKS[tile];

  let expectedRemaining = 0;
  let worstRemaining = 0;

  for (const outcome in buckets) {
    const childSet = buckets[outcome];
    const childCount = getBoardSetCount(childSet, ctx);
    const branchChance = childCount / boardCount;

    const childScore = evaluateFutureCollapseState(
      childSet,
      nextKnownMask,
      remainingDepth - 1,
      ctx,
      memo
    );

    expectedRemaining += branchChance * childScore.expectedRemaining;
    worstRemaining = Math.max(
      worstRemaining,
      childScore.worstRemaining
    );
  }

  const riskAdjustedRemaining =
    expectedRemaining + worstRemaining * 0.35;

  return {
    i: tile,
    expectedRemaining,
    worstRemaining,
    riskAdjustedRemaining,
    futureDepth: remainingDepth
  };
}

function getBestFutureCollapseMove(allBoards, probs, depth) {
  const ctx = getPrecalcContext(allBoards);
  
const stats = getGridStats();

const knownMask =
  stats.occupiedMask |
  stats.missMask;

  const memo = new Map();

  const candidates = getFutureCollapseCandidates(
    ctx.allBoardSet,
    knownMask,
    ctx
  );

  let best = null;

  for (const tile of candidates) {
    const score = evaluateFutureCollapseMove(
      tile,
      ctx.allBoardSet,
      knownMask,
      depth,
      ctx,
      memo
    );

    score.p = probs[tile];

    if (
      !best ||
      score.riskAdjustedRemaining < best.riskAdjustedRemaining
    ) {
      best = score;
    }
  }
  if (!best) return null;
  best.isFutureCollapse = true;
  return best;
}

function scoreTwoStepCollapse(allBoards, firstTile, probs, unknownTiles) {
  if (allBoards !== appState.allBoards) {
    return scoreTwoStepCollapseArrayFallback(
      allBoards,
      firstTile,
      probs,
      unknownTiles
    );
  }

  const ctx = getPrecalcContext(allBoards);
  const firstBuckets = ctx.outcomeBoardSetsByTile[firstTile];

  let expectedRemaining = 0;
  let worstRemaining = 0;

  const totalBoards = allBoards.length;

  for (const outcome in firstBuckets) {
    const boardSet = firstBuckets[outcome];
    const firstCount = getBoardSetCount(boardSet, ctx);
    const pFirst = firstCount / totalBoards;

    let bestSecondScore = Infinity;

    for (const secondTile of unknownTiles) {
      if (secondTile === firstTile) continue;

      const splitScore =
        getTileSplitScoreForBoardSet(secondTile, boardSet, ctx);

      const expectedAfterSecond = splitScore / firstCount;

      if (expectedAfterSecond < bestSecondScore) {
        bestSecondScore = expectedAfterSecond;
      }
    }

    if (bestSecondScore < Infinity) {
      expectedRemaining += pFirst * bestSecondScore;
      worstRemaining = Math.max(worstRemaining, bestSecondScore);
    }
  }

  const riskAdjustedRemaining =
    expectedRemaining + worstRemaining * 0.35;

  return {
    i: firstTile,
    p: probs[firstTile],
    expectedRemaining,
    worstRemaining,
    riskAdjustedRemaining
  };
}

function scoreTwoStepCollapseArrayFallback(
  allBoards,
  firstTile,
  probs,
  unknownTiles
) {
  const firstBuckets = {};

  for (const board of allBoards) {
    const key = getOutcomeKey(board, firstTile);

    if (!firstBuckets[key]) firstBuckets[key] = [];
    firstBuckets[key].push(board);
  }

  let expectedRemaining = 0;
  let worstRemaining = 0;

  for (const key in firstBuckets) {
    const boardsAfterFirst = firstBuckets[key];
    const pFirst = boardsAfterFirst.length / allBoards.length;

    const bestSecond = getBestCollapseMove(
      boardsAfterFirst,
      probs,
      firstTile,
      unknownTiles
    );

    if (!bestSecond) continue;

    expectedRemaining += pFirst * bestSecond.expectedRemaining;
    worstRemaining = Math.max(worstRemaining, bestSecond.expectedRemaining);
  }

  const riskAdjustedRemaining =
    expectedRemaining + worstRemaining * 0.35;

  return {
    i: firstTile,
    p: probs[firstTile],
    expectedRemaining,
    worstRemaining,
    riskAdjustedRemaining
  };
}

function getBestTwoStepCollapseMove(allBoards, probs) {
  if (allBoards.length > 5000) {
    return null;
  }

  const futureDepth = getFutureCollapseDepth(allBoards.length);

  if (futureDepth > 0) {
    const futureMove = getBestFutureCollapseMove(
      allBoards,
      probs,
      futureDepth
    );

    if (futureMove) return futureMove;
  }

  const unknownTiles = getUnknownTiles();
  const getScore = makeCollapseScoreGetter(allBoards, probs);

  const candidates = [];

  for (const i of unknownTiles) {
    candidates.push(getScore(i));
  }

  candidates.sort((a, b) => a.expectedRemaining - b.expectedRemaining);

  const shortlist = candidates.slice(0, 6);

  let best = null;

  for (const candidate of shortlist) {
    const score = scoreTwoStepCollapse(
      allBoards,
      candidate.i,
      probs,
      unknownTiles
    );

    if (
      !best ||
      score.riskAdjustedRemaining < best.riskAdjustedRemaining
    ) {
      best = score;
    }
  }

  return best;
}

function getGambaOption(data, shownRareTiles = null) {
  if (!data || !data.allBoards || !data.probs) return null;

  const bestTiles = data.tiles || [];
  const bestSet = new Set(bestTiles);
  const shownSet = shownRareTiles || new Set();

  const bestDisplayedEV = bestTiles.reduce((max, tile) => {
    const ev = data.evMap?.[tile]?.weightedEV || 0;
    return Math.max(max, ev);
  }, -Infinity);

  const candidates = [];

  for (let i = 0; i < 25; i++) {
    if (grid[i] !== null) continue;
    if (bestSet.has(i)) continue;
    if (shownSet.has(i)) continue;

    const rareP = getUnfoundRareProbability(i, data.allBoards);
    if (rareP <= 0) continue;

    const ev = data.evMap?.[i]?.weightedEV || 0;

    if (ev <= bestDisplayedEV) continue;

    candidates.push({
      i,
      p: data.probs[i] || 0,
      rareP,
      ev
    });
  }

  if (!candidates.length) return null;

  candidates.sort((a, b) => {
    if (b.ev !== a.ev) return b.ev - a.ev;
    if (b.rareP !== a.rareP) return b.rareP - a.rareP;
    return b.p - a.p;
  });

  const best = candidates[0];
  const second = candidates[1];

  if (
    second &&
    Math.abs(best.ev - second.ev) < 0.000001 &&
    Math.abs(best.rareP - second.rareP) < 0.000001 &&
    Math.abs(best.p - second.p) < 0.000001
  ) {
    return null;
  }

  return best;
}

function analyzeEquivalence(allBoards, probs) {
  const groups = getEquivalenceGroups(allBoards);

  const groupData = groups.map(group => ({
    group,
    p: probs[group[0]]
  }));

  const maxP = Math.max(...groupData.map(g => g.p));

  const bestGroup = groupData
    .filter(g => g.p === maxP)
    .flatMap(g => g.group);

  const tileShipSizes = getTileShipSizes(allBoards);
  const tileEVStats = getTileEVStats(allBoards);
  const partialTiles = getPartialShipTiles();

const bestGroupSet = new Set(bestGroup);

const size2Tiles = Object.keys(tileShipSizes)
  .map(i => parseInt(i))
  .filter(i => {
    if(grid[i] !== null) return false;
    if(bestGroupSet.has(i)) return false;

      const isSize2 = tileShipSizes[i].includes(2);
      if(!isSize2) return false;

      if(partialTiles.has(i)) return true;

      return probs[i] >= 0.65;
    });

  return {
    bestGroup,
    groups,
    probs,
    allBoards,
    shipMap: tileShipSizes,
    evMap: tileEVStats,
    size2Tiles
  };
}

function makeCollapseScoreGetter(allBoards, probs) {
  const cache = new Map();

  return function(tile) {
    if (!cache.has(tile)) {

    }
    return cache.get(tile);
  };
}

function getPartialShipTiles(){
  let partialTiles = new Set();
  const { occupiedMask, missMask } = getGridStats();
  const knownMask = occupiedMask | missMask;

  for(let color in SHIPS){
    if(getShipSize(color) !== 2) continue;

    let known = getKnownCellsCached(color);

    if(known.length === 1){
      let placements = getPlacementsCached(color);

      placements.forEach(p => {
        const unknownPlacementMask =
  p.mask & (FULL_BOARD_MASK & ~knownMask);

        for(let mask = unknownPlacementMask; mask; mask &= mask - 1){
          const bit = mask & -mask;
          partialTiles.add(BIT_INDEX[bit]);
        }
      });
    }
  }

  return partialTiles;
}

function makeMoveObject(i) {
  return {
    i,
    p: appState.probs ? appState.probs[i] : 0
  };
}

function shouldForceHeuristics() {
  const { misses, huntMode } = getGameContext();

  return (
    huntMode &&

function getTargetRareShipMove(allBoards, probs) {
  if (!allBoards || allBoards.length === 0) return null;

  const getScore = makeCollapseScoreGetter(allBoards, probs);
  const { occupiedMask, missMask } = getGridStats();
  const unknownMask = FULL_BOARD_MASK & ~(occupiedMask | missMask);

  const candidates = [];

  for (let mask = unknownMask; mask; mask &= mask - 1) {
    const bit = mask & -mask;
    const i = BIT_INDEX[bit];

    const rareP = getUnfoundRareProbability(i, allBoards);
    if (rareP <= 0) continue;

    const collapse = getScore(i);

    candidates.push({
      i,
      p: probs[i],
      rareP,
      expectedRemaining: collapse.expectedRemaining
    });
  }

  if (!candidates.length) return null;

  const maxRareP = Math.max(
    ...candidates.map(c => c.rareP)
  );

  const rareNearTieWindow = 0.005;

  const nearBestRare = candidates.filter(c =>
    c.rareP >= maxRareP - rareNearTieWindow
  );

  nearBestRare.sort((a, b) => {
    if (a.expectedRemaining !== b.expectedRemaining) {
      return a.expectedRemaining - b.expectedRemaining;
    }

    if (b.p !== a.p) {
      return b.p - a.p;
    }

    return a.i - b.i;
  });

  const best = nearBestRare[0];

  return withSafeMoveReason(
    makeMoveObject(best.i),
    `This tile is tied or nearly tied for rare ship chance (${(best.rareP * 100).toFixed(1)}%) and gives the best board collapse among those rare-targeting options.`
  );
}
